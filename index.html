<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Mark Andrew Boudoir</title>
  <meta name="description" content="Stories, sessions, and behind-the-scenes from Mark Andrew Boudoir." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Great+Vibes&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #0c1322;
      color: #eef0f5;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }
    em { font-style: italic; }
    ::selection { background: rgba(240,154,105,0.28); }

    /* NAV */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 18px 48px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(16, 22, 38, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .nav-logo {
      display: flex;
      align-items: center;
    }
    .nav-logo img {
      height: 44px;
      width: auto;
      display: block;
      mix-blend-mode: screen;
    }
    .nav-links { display: flex; gap: 32px; }
    .nav-link {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.85;
      transition: opacity 0.2s, color 0.2s;
    }
    .nav-link:hover { opacity: 1; color: #f09a69; }
    .nav-cta {
      padding: 10px 22px;
      border: 1px solid #f09a69;
      color: #f09a69;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-weight: 500;
      transition: background 0.2s, color 0.2s;
      border-radius: 2px;
    }
    .nav-cta:hover { background: #f09a69; color: #101626; }

    /* HERO */
    .hero {
      padding: 180px 48px 70px;
      max-width: 1280px;
      margin: 0 auto;
      text-align: center;
    }
    .hero .eyebrow {
      font-family: 'Great Vibes', cursive;
      font-size: 38px;
      color: #f09a69;
      margin-bottom: 6px;
      line-height: 1;
    }
    .hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 72px;
      font-weight: 400;
      letter-spacing: 0.01em;
      line-height: 1.05;
      margin-bottom: 22px;
    }
    .hero h1 em { color: #f09a69; }
    .hero .tagline {
      font-size: 16px;
      letter-spacing: 0.04em;
      opacity: 0.78;
      max-width: 620px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* FILTERS */
    .filters { max-width: 1280px; margin: 0 auto; padding: 0 48px 32px; }
    .search-wrap { position: relative; margin-bottom: 24px; }
    .search {
      width: 100%;
      padding: 18px 22px 18px 52px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 4px;
      color: #eef0f5;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 14px;
      letter-spacing: 0.04em;
      outline: none;
      transition: border-color 0.2s;
    }
    .search:focus { border-color: rgba(240,154,105,0.6); }
    .search::placeholder { color: rgba(238,240,245,0.4); }
    .search-icon {
      position: absolute;
      left: 22px; top: 50%;
      transform: translateY(-50%);
      opacity: 0.55;
      pointer-events: none;
    }
    .pills { display: flex; flex-wrap: wrap; gap: 10px; }
    .pill {
      padding: 10px 18px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      color: #eef0f5;
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.2s;
    }
    .pill:hover { border-color: rgba(240,154,105,0.5); color: #f09a69; }
    .pill.active {
      background: #f09a69;
      border-color: #f09a69;
      color: #101626;
    }

    /* GRID */
    .grid {
      max-width: 1280px;
      margin: 0 auto;
      padding: 16px 48px 100px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
    }
    .card {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      overflow: hidden;
      transition: transform 0.25s, border-color 0.25s;
      display: flex;
      flex-direction: column;
    }
    .card:hover { border-color: rgba(240,154,105,0.3); }
    .card:hover .card-image img { transform: scale(1.04); }
    .card > a, .card > .card-inner {
      display: flex;
      flex-direction: column;
      flex: 1;
      height: 100%;
    }
    .card-image {
      position: relative;
      aspect-ratio: 16 / 10;
      overflow: hidden;
    }
    .card-image img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.5s ease;
    }
    .tag {
      position: absolute;
      top: 14px; left: 14px;
      padding: 6px 12px;
      background: rgba(16, 22, 38, 0.8);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #f09a69;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      border-radius: 3px;
      border: 1px solid rgba(240,154,105,0.4);
    }
    .card-body {
      padding: 24px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
      line-height: 1.2;
      margin-bottom: 12px;
      color: #f2f4f8;
    }
    .card-excerpt {
      font-size: 14px;
      line-height: 1.6;
      opacity: 0.7;
      margin-bottom: 24px;
      flex: 1;
    }
    .card-excerpt.coming-text {
      opacity: 0.45;
      font-style: italic;
    }
    .card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.7;
    }
    .card-read { color: #f09a69; opacity: 1; }
    .card-read::after { content: ' →'; }
    .coming-badge { color: #f09a69; opacity: 1; }

    /* Featured */
    .card.featured { grid-column: 1 / -1; }
    .card.featured > a { flex-direction: row; min-height: 440px; }
    .card.featured .card-image { flex: 1.25; aspect-ratio: auto; }
    .card.featured .card-body { flex: 1; padding: 56px 56px; justify-content: center; }
    .card.featured .card-title { font-size: 38px; line-height: 1.1; margin-bottom: 18px; }
    .card.featured .card-excerpt { font-size: 16px; max-width: 480px; }
    .card.featured .tag { top: 22px; left: 22px; padding: 8px 14px; font-size: 11px; }

    /* Coming soon */
    .card.coming { opacity: 0.6; cursor: default; }
    .card.coming:hover { border-color: rgba(255,255,255,0.06); }
    .card.coming:hover .card-image img { transform: none; }
    .card.coming .card-image::after {
      content: '';
      position: absolute; inset: 0;
      background: rgba(16, 22, 38,0.35);
    }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 24px;
      opacity: 0.5;
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
    }

    /* FOOTER */
    .footer {
      padding: 60px 48px 40px;
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.5;
    }

    /* Responsive */
    @media (max-width: 1100px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
      .card.featured > a { flex-direction: column; min-height: 0; }
      .card.featured .card-image { aspect-ratio: 16/9; }
      .card.featured .card-body { padding: 32px; }
      .card.featured .card-title { font-size: 32px; }
    }
    @media (max-width: 720px) {
      .nav { padding: 14px 20px; }
      .nav-links { display: none; }
      .nav-logo { font-size: 14px; }
      .hero { padding: 130px 24px 50px; }
      .hero h1 { font-size: 44px; }
      .hero .eyebrow { font-size: 28px; }
      .hero .tagline { font-size: 14px; }
      .filters, .grid { padding-left: 24px; padding-right: 24px; }
      .grid { grid-template-columns: 1fr; gap: 24px; }
      .card.featured .card-title { font-size: 26px; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-logo"><img src="/uploads/Boudoir PNG.png" alt="Mark Andrew Boudoir" /></a>
    <div class="nav-links">
      <a href="https://www.markandrewboudoir.com" class="nav-link">Home</a>
      <a href="/" class="nav-link">Blog</a>
      <a href="https://www.markandrewboudoir.com/portfolio" class="nav-link">Portfolio</a>
      <a href="https://www.markandrewboudoir.com/about" class="nav-link">About</a>
    </div>
    <a href="https://www.markandrewboudoir.com/contact" class="nav-cta">Work With Me</a>
  </nav>

  <header class="hero">
    <div class="eyebrow">the journal</div>
    <h1>Stories from <em>the studio</em></h1>
    <p class="tagline">Sessions, behind-the-scenes, and prep for your boudoir, glamour, couples and bridal portrait experience.</p>
  </header>

  <section class="filters">
    <div class="search-wrap">
      <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <circle cx="11" cy="11" r="7"/>
        <line x1="16.5" y1="16.5" x2="21" y2="21"/>
      </svg>
      <input class="search" type="text" placeholder="Search posts by keyword, topic, or tag..." aria-label="Search posts" />
    </div>
    <div class="pills" id="pills">
      <button class="pill active" data-cat="all">All</button>
      <button class="pill" data-cat="boudoir">Boudoir</button>
      <button class="pill" data-cat="glamour">Glamour</button>
      <button class="pill" data-cat="couples">Couples</button>
      <button class="pill" data-cat="bridal-boudoir">Bridal Boudoir</button>
      <button class="pill" data-cat="behind-the-scenes">Behind the Scenes</button>
      <button class="pill" data-cat="tips-and-prep">Tips &amp; Prep</button>
      <button class="pill" data-cat="featured-sessions">Featured Sessions</button>
    </div>
  </section>

  <main class="grid" id="grid"></main>

  <footer class="footer">© Mark Andrew Boudoir · Beaufort, SC</footer>

  <script>
    const POSTS = [
      {
        slug: 'what-is-boudoir-photography',
        title: 'What Is Boudoir Photography Like for First Timers?',
        excerpt: 'A walk-through of your first boudoir session — what to expect, what to wear, and how it really feels in the studio.',
        category: 'boudoir',
        categoryLabel: 'Boudoir',
        date: 'Apr 28, 2026',
        image: '/uploads/pearl-fringe-shawl-bouquet-floral-backdrop-tulle-boudoir-portraits-hilton-head-sc.jpg',
        url: '/posts/what-is-boudoir-photography/',
        featured: true
      },
      {
        slug: 'glamour-session-wardrobe',
        title: 'Five Pieces to Pack for Your Glamour Session',
        category: 'glamour',
        categoryLabel: 'Glamour',
        image: '/uploads/silver-hair-velvet-bra-tulle-robe-vanity-lipstick-boudoir-photography-hilton-head-sc.jpg',
        coming: true
      },
      {
        slug: 'couples-boudoir-intimate-portraits',
        title: 'Couples Boudoir: Capturing Connection in the Studio',
        category: 'couples',
        categoryLabel: 'Couples',
        image: '/uploads/wine-lace-bodysuit-fur-coat-red-curtains-diamond-necklace-intimate-portraits-summerville-sc.jpg',
        coming: true
      },
      {
        slug: 'bridal-boudoir-album-gift',
        title: 'The Bridal Boudoir Album — A Wedding-Day Gift',
        category: 'bridal-boudoir',
        categoryLabel: 'Bridal Boudoir',
        image: '/uploads/pearl-fringe-halter-rainbow-prism-flare-intimate-portraits-hilton-head-sc.jpg',
        coming: true
      },
      {
        slug: 'inside-the-studio-bts',
        title: 'Inside the Studio: A Boudoir Session, Behind the Scenes',
        category: 'behind-the-scenes',
        categoryLabel: 'Behind the Scenes',
        image: '/uploads/navy-blazer-paintbrush-palette-artist-boudoir-photographer-west-ashley-sc.jpg',
        coming: true
      },
      {
        slug: 'how-to-prepare-boudoir-session',
        title: 'How to Prepare for Your Boudoir Session',
        category: 'tips-and-prep',
        categoryLabel: 'Tips & Prep',
        image: '/uploads/red-lace-bra-tattooed-arms-laying-red-light-intimate-portraits-west-ashley-sc.jpg',
        coming: true
      },
      {
        slug: 'featured-liberation-series',
        title: 'Featured Session: The Liberation Series',
        category: 'featured-sessions',
        categoryLabel: 'Featured Sessions',
        image: '/uploads/velvet-curtain-dramatic-lighting-standing-pose-boudoir-session-mount-pleasant-sc.jpg',
        coming: true
      }
    ];

    const grid = document.getElementById('grid');
    const pills = document.getElementById('pills');
    const search = document.querySelector('.search');

    let activeCat = 'all';
    let query = '';

    const escapeHtml = (str) => String(str).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

    function cardInner(p) {
      const excerpt = p.excerpt
        ? `<p class="card-excerpt">${escapeHtml(p.excerpt)}</p>`
        : `<p class="card-excerpt coming-text">A new post is on the way.</p>`;
      const metaLeft = p.date ? escapeHtml(p.date) : 'Coming Soon';
      const metaRight = p.coming
        ? ''
        : `<span class="card-read">Read</span>`;
      return `
        <div class="card-image">
          <img src="${escapeHtml(p.image)}" alt="${escapeHtml(p.title)}" loading="lazy" />
          <span class="tag">${escapeHtml(p.categoryLabel)}</span>
        </div>
        <div class="card-body">
          <h2 class="card-title">${escapeHtml(p.title)}</h2>
          ${excerpt}
          <div class="card-meta">
            <span>${metaLeft}</span>
            ${metaRight}
          </div>
        </div>
      `;
    }

    function render() {
      const filtered = POSTS.filter(p => {
        const catMatch = activeCat === 'all' || p.category === activeCat;
        const q = query.toLowerCase();
        const qMatch = !q ||
          p.title.toLowerCase().includes(q) ||
          (p.excerpt || '').toLowerCase().includes(q) ||
          p.categoryLabel.toLowerCase().includes(q);
        return catMatch && qMatch;
      });

      if (!filtered.length) {
        grid.innerHTML = '<div class="empty-state">No posts match — try another category or search term.</div>';
        return;
      }

      grid.innerHTML = filtered.map(p => {
        const classes = ['card'];
        if (p.featured) classes.push('featured');
        if (p.coming) classes.push('coming');
        const inner = cardInner(p);
        const wrapped = p.coming
          ? `<div class="card-inner">${inner}</div>`
          : `<a href="${escapeHtml(p.url)}">${inner}</a>`;
        return `<article class="${classes.join(' ')}" data-cat="${escapeHtml(p.category)}">${wrapped}</article>`;
      }).join('');
    }

    pills.addEventListener('click', (e) => {
      const btn = e.target.closest('.pill');
      if (!btn) return;
      pills.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      activeCat = btn.dataset.cat;
      render();
    });

    search.addEventListener('input', (e) => {
      query = e.target.value.trim();
      render();
    });

    render();
  </script>

</body>
</html>
