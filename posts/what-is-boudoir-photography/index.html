<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What Is Boudoir Photography Like for First Timers? — Mark Andrew Boudoir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Great+Vibes&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="/tweaks-panel.jsx"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: #0c1322;
      color: #eef0f5;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }
    ::selection { background: rgba(240,154,105,0.28); }
    #progress-bar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      background: linear-gradient(90deg, #f09a69, #ffbf8f, #f09a69);
      z-index: 1000;
      transition: width 0.1s linear;
      pointer-events: none;
    }
    em { font-style: italic; }
    strong { font-weight: 500; color: #f2f4f8; }
  </style>
</head>
<body>
  <div id="progress-bar" style="width:0%"></div>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "#f09a69",
      "showRelatedPosts": true,
      "showCTA": true,
      "heroStyle": "tall"
    }/*EDITMODE-END*/;

    const Diamond = ({ size = 16, color = "#f09a69", style = {} }) => (
      <svg width={size} height={size * 1.1} viewBox="0 0 20 22" fill="none" style={style}>
        <polygon points="10,1 19,10 10,21 1,10" fill={color} opacity="0.9" />
      </svg>
    );

    const IMG = {
      hero:      "/uploads/pearl-fringe-shawl-bouquet-floral-backdrop-tulle-boudoir-portraits-hilton-head-sc.jpg",
      velvet:    "/uploads/velvet-curtain-dramatic-lighting-standing-pose-boudoir-session-mount-pleasant-sc.jpg",
      redLace:   "/uploads/red-lace-bra-tattooed-arms-laying-red-light-intimate-portraits-west-ashley-sc.jpg",
      rainbow:   "/uploads/pearl-fringe-halter-rainbow-prism-flare-intimate-portraits-hilton-head-sc.jpg",
      vanity:    "/uploads/silver-hair-velvet-bra-tulle-robe-vanity-lipstick-boudoir-photography-hilton-head-sc.jpg",
      wine:      "/uploads/wine-lace-bodysuit-fur-coat-red-curtains-diamond-necklace-intimate-portraits-summerville-sc.jpg",
      artist:    "/uploads/navy-blazer-paintbrush-palette-artist-boudoir-photographer-west-ashley-sc.jpg",
      lsu:       "/uploads/lsu-sweatshirt-black-lace-shorts-purple-studio-boudoir-session-charleston-sc.jpg",
    };

    function Nav() {
      const [scrolled, setScrolled] = useState(false);
      useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 60);
        window.addEventListener("scroll", fn);
        return () => window.removeEventListener("scroll", fn);
      }, []);
      const linkStyle = { fontFamily: "'Jost'", fontSize: 11, fontWeight: 500, letterSpacing: "0.2em", textTransform: "uppercase", color: "#eef0f5", textDecoration: "none", opacity: 0.88, transition: "opacity 0.2s" };
      return (
        <nav style={{
          position: "fixed", top: 2, left: 0, right: 0, zIndex: 900,
          padding: "18px 48px",
          display: "flex", alignItems: "center", justifyContent: "space-between",
          background: scrolled ? "rgba(16, 22, 38,0.96)" : "transparent",
          backdropFilter: scrolled ? "blur(8px)" : "none",
          borderBottom: scrolled ? "1px solid rgba(240,154,105,0.12)" : "1px solid transparent",
          transition: "all 0.4s ease",
        }}>
          <div style={{ display: "flex", gap: 32, alignItems: "center" }}>
            {["Contact","Gallery","About","Testimonials"].map(item => (
              <a key={item} href="#" style={linkStyle}
                onMouseEnter={e => e.target.style.opacity = 1}
                onMouseLeave={e => e.target.style.opacity = 0.7}>{item}</a>
            ))}
          </div>
          <div style={{ position: "absolute", left: "50%", transform: "translateX(-50%)" }}>
            <img src="/uploads/Boudoir PNG.png" alt="Mark Andrew Boudoir" style={{ height: 52, width: "auto", display: "block", mixBlendMode: "screen" }} />
          </div>
          <div style={{ display: "flex", gap: 32, alignItems: "center" }}>
            <a href="#" style={{ ...linkStyle, color: "#f09a69", opacity: 1, fontWeight: 500 }}>VIP Group</a>
            <a href="#" style={linkStyle}
              onMouseEnter={e => e.target.style.opacity = 1}
              onMouseLeave={e => e.target.style.opacity = 0.7}>FAQ</a>
          </div>
        </nav>
      );
    }

    function Hero({ tweaks }) {
      const heroHeight = tweaks.heroStyle === "tall" ? "92vh" : "65vh";
      return (
        <header style={{ position: "relative", height: heroHeight, overflow: "hidden", display: "flex", alignItems: "flex-end" }}>
          <img
            src={IMG.hero}
            alt="Boudoir portrait — pearl fringe shawl with floral backdrop, Hilton Head SC"
            style={{ position: "absolute", inset: 0, width: "100%", height: "100%", objectFit: "cover", objectPosition: "center 20%" }}
          />
          <div style={{
            position: "absolute", inset: 0,
            background: "linear-gradient(to bottom, rgba(16, 22, 38,0.15) 0%, rgba(16, 22, 38,0.0) 35%, rgba(16, 22, 38,0.6) 70%, rgba(16, 22, 38,1) 100%)"
          }} />
          <div style={{ position: "relative", zIndex: 2, width: "100%", maxWidth: 860, margin: "0 auto", padding: "0 40px 72px" }}>
            <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 22 }}>
              <Diamond size={10} color={tweaks.accentColor} />
              <span style={{ fontFamily: "'Jost'", fontSize: 11, letterSpacing: "0.3em", textTransform: "uppercase", color: tweaks.accentColor }}>First-Timer's Guide</span>
              <span style={{ color: "rgba(240,230,211,0.3)" }}>—</span>
              <span style={{ fontFamily: "'Jost'", fontSize: 11, letterSpacing: "0.15em", color: "rgba(240,230,211,0.45)" }}>April 28, 2026</span>
            </div>
            <h1 style={{
              fontFamily: "'Cormorant Garamond', serif",
              fontSize: "clamp(34px, 5vw, 64px)",
              fontWeight: 300, lineHeight: 1.1,
              color: "#f2f4f8",
              textWrap: "pretty",
              marginBottom: 28,
            }}>What Is Boudoir Photography Like<br/>for First Timers?</h1>
            <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
              <div style={{ width: 36, height: 36, borderRadius: "50%", background: "linear-gradient(135deg, #202b45, #252e4b)", border: `1px solid ${tweaks.accentColor}44`, flexShrink: 0 }} />
              <div>
                <div style={{ fontFamily: "'Cormorant Garamond'", fontSize: 15, fontStyle: "italic", color: "#eef0f5" }}>Mark & Christina</div>
                <div style={{ fontFamily: "'Jost'", fontSize: 11, letterSpacing: "0.15em", color: "rgba(240,230,211,0.4)", marginTop: 1 }}>12 min read</div>
              </div>
            </div>
          </div>
        </header>
      );
    }

    const pStyle = {
      fontFamily: "'Jost', sans-serif",
      fontWeight: 300,
      fontSize: "clamp(15px, 1.4vw, 17px)",
      lineHeight: 1.9,
      color: "rgba(240,230,211,0.82)",
      marginBottom: 26,
      textWrap: "pretty",
    };

    const h2Style = {
      fontFamily: "'Cormorant Garamond', serif",
      fontSize: "clamp(24px, 2.8vw, 36px)",
      fontWeight: 400,
      color: "#f2f4f8",
      lineHeight: 1.2,
      letterSpacing: "0.01em",
    };

    function SectionHead({ accent, title }) {
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 18, margin: "56px 0 24px" }}>
          <Diamond size={9} color={accent} style={{ flexShrink: 0 }} />
          <h2 style={h2Style}>{title}</h2>
        </div>
      );
    }

    // Double-line gold frame wrapper
    function GoldFrame({ children, style = {} }) {
      return (
        <div style={{ position: "relative", border: "1px solid rgba(240,154,105,0.75)", ...style }}>
          {children}
          {/* Inner line */}
          <div style={{ position: "absolute", inset: 5, border: "1px solid rgba(240,154,105,0.45)", pointerEvents: "none", zIndex: 3 }} />
        </div>
      );
    }

    function FullImg({ src, alt, caption, height = 500, position = "center" }) {
      return (
        <figure style={{ margin: "52px -20px 8px" }}>
          <GoldFrame>
            <img src={src} alt={alt} style={{ width: "100%", height, objectFit: "cover", objectPosition: position, display: "block" }} />
          </GoldFrame>
          {caption && <figcaption style={{ fontFamily: "'Jost'", fontSize: 11, letterSpacing: "0.12em", color: "rgba(240,230,211,0.32)", textAlign: "center", marginTop: 14, textTransform: "uppercase" }}>{caption}</figcaption>}
        </figure>
      );
    }

    function TwoCol({ imgs }) {
      return (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16, margin: "44px 0" }}>
          {imgs.map((img, i) => (
            <GoldFrame key={i}>
              <img src={img.src} alt={img.alt} style={{ width: "100%", height: img.height || 420, objectFit: "cover", objectPosition: img.pos || "center", display: "block" }} />
            </GoldFrame>
          ))}
        </div>
      );
    }

    function PullQuote({ accent, text, attribution }) {
      return (
        <blockquote style={{ margin: "52px 0", padding: "0 0 0 28px", borderLeft: `2px solid ${accent}` }}>
          <p style={{ fontFamily: "'Cormorant Garamond'", fontStyle: "italic", fontSize: "clamp(20px, 2.2vw, 26px)", fontWeight: 300, lineHeight: 1.65, color: "#f2f4f8" }}>{text}</p>
          {attribution && <cite style={{ display: "block", marginTop: 14, fontFamily: "'Jost'", fontSize: 11, letterSpacing: "0.2em", textTransform: "uppercase", color: "rgba(240,230,211,0.4)", fontStyle: "normal" }}>{attribution}</cite>}
        </blockquote>
      );
    }

    function ScriptQuote({ accent, text }) {
      return (
        <div style={{ textAlign: "center", margin: "56px 0" }}>
          <p style={{ fontFamily: "'Great Vibes', cursive", fontSize: "clamp(30px, 4vw, 48px)", color: accent, lineHeight: 1.4 }}>{text}</p>
        </div>
      );
    }

    function BulletList({ items }) {
      return (
        <ul style={{ listStyle: "none", paddingLeft: 0, marginBottom: 26, display: "flex", flexDirection: "column", gap: 10 }}>
          {items.map((item, i) => (
            <li key={i} style={{ display: "flex", gap: 14, alignItems: "flex-start" }}>
              <Diamond size={7} color="#f09a69" style={{ marginTop: 7, flexShrink: 0 }} />
              <span style={{ fontFamily: "'Jost'", fontWeight: 300, fontSize: "clamp(14px, 1.3vw, 16px)", lineHeight: 1.8, color: "rgba(240,230,211,0.78)" }}>{item}</span>
            </li>
          ))}
        </ul>
      );
    }

    function FAQ({ accent, items }) {
      const [open, setOpen] = useState(null);
      return (
        <div style={{ margin: "32px 0 44px", display: "flex", flexDirection: "column", gap: 2 }}>
          {items.map((item, i) => (
            <div key={i} style={{ borderBottom: "1px solid rgba(240,154,105,0.12)" }}>
              <button
                onClick={() => setOpen(open === i ? null : i)}
                style={{
                  width: "100%", background: "none", border: "none",
                  display: "flex", justifyContent: "space-between", alignItems: "center",
                  padding: "20px 0", cursor: "pointer", gap: 16, textAlign: "left"
                }}
              >
                <span style={{ fontFamily: "'Cormorant Garamond'", fontSize: "clamp(17px, 1.8vw, 22px)", fontWeight: 400, color: "#f2f4f8", lineHeight: 1.3 }}>{item.q}</span>
                <span style={{ fontFamily: "'Jost'", fontSize: 18, color: accent, flexShrink: 0, transition: "transform 0.3s", transform: open === i ? "rotate(45deg)" : "rotate(0)" }}>+</span>
              </button>
              {open === i && (
                <p style={{ ...pStyle, paddingBottom: 20, marginBottom: 0 }}>{item.a}</p>
              )}
            </div>
          ))}
        </div>
      );
    }

    function BlogBody({ tweaks }) {
      const acc = tweaks.accentColor;
      const faqs = [
        { q: "Is boudoir photography only for certain body types?", a: "No. We photograph real women — every age, every size, every background. Boudoir is not about fitting a mold. It's about celebrating exactly who you are, right now." },
        { q: "Do I need any modeling experience?", a: "None whatsoever. We direct every single pose. Your only job is to show up." },
        { q: "Will I have to do anything I'm uncomfortable with?", a: "Never. You are completely in control of your session from start to finish. We follow your lead on comfort level, and nothing is ever pushed or assumed." },
        { q: "How long does a full boudoir session take?", a: "Our experience is a full-day event. Hair and makeup begins at 9am and runs approximately 90 minutes. The photoshoot runs another 90 minutes. After a lunch break, you return at 1pm for your image reveal and ordering appointment, which typically wraps up by 4pm." },
        { q: "What is included in the session fee?", a: "Every session includes professional hair and makeup with Aletheia Jean, a personalized style consultation and wardrobe walk-through, expert posing guidance throughout the entire shoot, and a private image reveal and ordering appointment with 130–160 fully edited images." },
        { q: "Where is your studio located?", a: "We're based in Beaufort, SC and serve clients throughout the Lowcountry — including Bluffton, Hilton Head Island, Savannah, and Charleston." },
        { q: "How do I book a session?", a: "The first step is a free consultation. We'll talk through your vision, answer every question you have, and make sure we're the right fit. Call or text us at (904) 576-3155 or visit markandrewboudoir.com to get started." },
      ];

      return (
        <article style={{ maxWidth: 720, margin: "0 auto", padding: "64px 40px 80px" }}>

          {/* Intro */}
          <PullQuote accent={acc} text="If you've been thinking about booking a boudoir session but have no idea what to actually expect — you're in the right place." />

          <p style={pStyle}>Most women who walk through our studio door in Beaufort say the same thing: <em>"I've never done anything like this before, and I'm a little nervous."</em> That's not just normal — that's nearly everyone. In over 7 years of photographing women across the Lowcountry, we can count on one hand the number of clients who showed up completely relaxed on their first session.</p>
          <p style={pStyle}>The nerves are part of it. And so is what happens next.</p>
          <p style={pStyle}>This guide will walk you through exactly what a boudoir session looks like from start to finish — the real version, not the highlight reel.</p>

          {/* Full-bleed image 1 */}
          <FullImg src={IMG.velvet} alt="Velvet curtain dramatic lighting boudoir session, Mount Pleasant SC" caption="Mark Andrew Boudoir — Beaufort, SC Studio" height={520} position="center 30%" />

          <SectionHead accent={acc} title="What Is Boudoir Photography, Really?" />
          <p style={pStyle}>Boudoir photography is an intimate portrait experience where the focus is entirely on you — how you feel, how you look, and how you see yourself. It's not a glamour shoot. It's not a lingerie catalog. And it's definitely not only for certain body types, ages, or relationship statuses.</p>
          <p style={pStyle}>At its core, boudoir is about creating images that show you the way the people who love you already see you — confident, beautiful, and worthy of being celebrated.</p>
          <p style={pStyle}>Boudoir is about bringing to light a version of yourself you may not have seen in a long time — or have never seen before. Traditionally it's been labeled as "photos in your underwear," but over the last two decades it has evolved into something much more meaningful. It's an experience that allows you to feel truly free, comfortable, and confident in your own skin.</p>

          <SectionHead accent={acc} title="Who Actually Books Boudoir Sessions?" />
          <p style={pStyle}>This is one of the biggest misconceptions we run into. Women assume boudoir is for a certain "type" — younger, a certain size, someone already confident.</p>
          <p style={pStyle}>The truth? Our clients are:</p>
          <BulletList items={[
            "Women celebrating a milestone birthday — 30s, 40s, 50s, and beyond are some of our most powerful sessions",
            "Brides who want a gift for their partner, or simply for themselves",
            "Moms who are ready to reclaim a sense of themselves outside of being a caregiver",
            "Women navigating a major life transition — a divorce, a health journey, a personal reinvention",
            "Women who simply decided today is the day with zero occasion needed",
          ]} />
          <p style={pStyle}>Most of our clients in Beaufort and the Lowcountry are women in their mid-thirties to late fifties — professionals and business owners who have spent years pouring themselves into everyone else and are finally ready to do something for themselves. Our clients are sizes 0–26, with diverse skin tones, textures, and backgrounds. There is no "boudoir body." There is only yours.</p>

          {/* Two-column portraits */}
          <TwoCol imgs={[
            { src: IMG.wine, alt: "Wine lace bodysuit fur coat red curtains boudoir portrait", height: 460, pos: "center 15%" },
            { src: IMG.artist, alt: "Navy blazer artist boudoir photographer west ashley", height: 460, pos: "center 10%" },
          ]} />

          <SectionHead accent={acc} title="What Happens Before Your Session Day" />
          <p style={pStyle}>A great boudoir session doesn't start when you walk in the door. It starts weeks before with a conversation.</p>

          <p style={{ ...pStyle, fontFamily: "'Cormorant Garamond'", fontSize: "clamp(17px, 1.8vw, 22px)", fontWeight: 400, color: "#f2f4f8", fontStyle: "italic" }}>The Consultation</p>
          <p style={pStyle}>Before your session, we have a full consultation — in person or by phone — where we get to know you. What makes you feel most like yourself? What are you nervous about? What do you want to feel when you look at these images five years from now? This isn't small talk. It's how we make sure your session is built around you, not a generic template.</p>

          <p style={{ ...pStyle, fontFamily: "'Cormorant Garamond'", fontSize: "clamp(17px, 1.8vw, 22px)", fontWeight: 400, color: "#f2f4f8", fontStyle: "italic" }}>The Style Guide</p>
          <p style={pStyle}>Once you book, you'll receive our complete Style Guide. This covers everything: what to bring, how to prepare your skin, what outfits photograph best, and how to get a good night's sleep so you feel your best on session day. You will never show up wondering "did I do this right?"</p>

          <p style={{ ...pStyle, fontFamily: "'Cormorant Garamond'", fontSize: "clamp(17px, 1.8vw, 22px)", fontWeight: 400, color: "#f2f4f8", fontStyle: "italic" }}>Hair and Makeup — Included in Every Session</p>
          <p style={pStyle}>Every session at Mark Andrew Boudoir begins with professional hair and makeup. We exclusively work with Aletheia Jean, an international makeup artist who has worked with Mark both on location in multiple cities and in-studio since 2024. Aletheia specializes in camera-ready soft glam and maximalism for clients who want a bold, avant-garde look. Her work is designed specifically for photography lighting — natural and polished on camera, and completely stunning in your final images.</p>

          <SectionHead accent={acc} title="What Your Session Day Actually Looks Like" />

          {/* Vanity image — centered portrait */}
          <div style={{ margin: "32px auto 44px", maxWidth: 460, display: "block" }}>
            <GoldFrame>
            <img src={IMG.vanity} alt="Silver hair vanity mirror lipstick boudoir photography Hilton Head" style={{ width: "100%", height: 580, objectFit: "cover", objectPosition: "center 10%", display: "block" }} />
            </GoldFrame>
            <p style={{ fontFamily: "'Jost'", fontSize: 11, letterSpacing: "0.12em", color: "rgba(240,230,211,0.32)", textAlign: "center", marginTop: 14, textTransform: "uppercase" }}>The transformation begins in the chair</p>
          </div>

          <p style={{ ...pStyle, fontFamily: "'Cormorant Garamond'", fontSize: "clamp(17px, 1.8vw, 22px)", fontWeight: 400, color: "#f2f4f8", fontStyle: "italic" }}>You Arrive and Settle In</p>
          <p style={pStyle}>When you walk in, the first thing we want you to do is relax. We'll offer you something to drink, you'll meet the team, and you'll have time to breathe before anything starts. There's no rushing here. Our studio is one large, open space — you'll see our backdrops and lighting setup, the makeup station ready for you, and you'll hear chill house music that keeps the energy moving while the vibe stays grounded and down to earth.</p>

          <p style={{ ...pStyle, fontFamily: "'Cormorant Garamond'", fontSize: "clamp(17px, 1.8vw, 22px)", fontWeight: 400, color: "#f2f4f8", fontStyle: "italic" }}>The Wardrobe Walk-Through</p>
          <p style={pStyle}>Before we touch a camera, we go through everything you brought and build a plan together. What are we starting with? What order do we shoot? What mood are we going for with each look? We talk through color schemes, textures, props, and any final details before you sit down for hair and makeup. You are never thrown in front of a camera without a clear, intentional plan.</p>

          <p style={{ ...pStyle, fontFamily: "'Cormorant Garamond'", fontSize: "clamp(17px, 1.8vw, 22px)", fontWeight: 400, color: "#f2f4f8", fontStyle: "italic" }}>Hair and Makeup — 1 to 1.5 Hours</p>
          <p style={pStyle}>This is where the transformation begins — and where most of the nerves start to settle. There's something about sitting in that chair, having someone take care of you for once, and watching yourself come together that shifts the whole energy of the day. By the time hair and makeup is done, most women are relaxed and ready to go.</p>

          <p style={{ ...pStyle, fontFamily: "'Cormorant Garamond'", fontSize: "clamp(17px, 1.8vw, 22px)", fontWeight: 400, color: "#f2f4f8", fontStyle: "italic" }}>The Photoshoot — 90 Minutes</p>
          <p style={pStyle}>Here's what most people don't realize going in: <strong>you don't need to know how to pose.</strong> That's our job entirely. We guide every single position — where your hands go, how to angle your body, where to look, how to breathe. We start simple and slow, and we build from there. Most clients tell us that within the first 10–15 minutes, they forget the camera is even there.</p>
          <p style={pStyle}>Each session includes up to 3 outfit and set changes, with 15–20 poses per look. The shooting portion of your day is 90 minutes — focused, intentional, and completely guided from start to finish.</p>

          <p style={{ ...pStyle, fontFamily: "'Cormorant Garamond'", fontSize: "clamp(17px, 1.8vw, 22px)", fontWeight: 400, color: "#f2f4f8", fontStyle: "italic" }}>The Image Reveal</p>
          <p style={pStyle}>After a lunch break, you'll return for your private image reveal and ordering appointment — and this is one of our favorite moments of the entire day. We'll show you between 130 and 160 unique, fully edited images from your session. Every single one will surprise you. We hear clients say things like <em>"Is that really me?"</em> and <em>"I can't believe I actually look like that."</em> Some are speechless. Many cry — because seeing yourself in such a powerful new light for the first time is an emotional experience. It quietly dismantles every negative thing anyone has ever said to you about yourself, and replaces it with something true.</p>

          <ScriptQuote accent={acc} text='"Is that really me?"' />

          <SectionHead accent={acc} title="What to Wear to a Boudoir Session" />
          <p style={pStyle}>This is the question we get asked more than almost any other. The honest answer: less is more, and comfort beats everything. You don't have to wear lingerie. Some of our most stunning images have been shot in an oversized button-down, a simple robe, or a fitted bralette and underwear set. What matters is that you feel like yourself in it — not like you're wearing a costume.</p>

          <TwoCol imgs={[
            { src: IMG.lsu, alt: "LSU sweatshirt black lace shorts purple studio boudoir session Charleston SC", height: 440, pos: "center 20%" },
            { src: IMG.rainbow, alt: "Pearl fringe halter rainbow prism flare intimate portraits Hilton Head SC", height: 440, pos: "center 15%" },
          ]} />

          <p style={{ ...pStyle, fontWeight: 400, color: "#f2f4f8" }}>What photographs beautifully:</p>
          <BulletList items={[
            "Classic lingerie — push-up bras, high-waisted bottoms, bodysuits",
            "A fitted dress or skirt",
            "An oversized men's shirt, unbuttoned or tied",
            "A silk or satin robe",
            "Simple bralette and underwear sets",
          ]} />

          <p style={{ ...pStyle, fontWeight: 400, color: "#f2f4f8" }}>What to avoid:</p>
          <BulletList items={[
            "Loose, flowy lingerie — babydoll styles will photograph poofy rather than showing off your shape",
            "Overly busy patterns that pull focus away from you",
            "Anything with tight elastic — wear loose clothing on your way to the studio so your skin is mark-free when we start",
          ]} />

          <p style={pStyle}>Our clients consistently say their favorite images are the ones in bodysuits. A bodysuit shapes your figure, shows off curves, smooths the midsection, and photographs with a luxurious, high-end look. We often pair them with one of our long fluffy robes, fur coats, shawls, chiffon, angel wings, and other accessories we keep at the studio.</p>

          <SectionHead accent={acc} title="What If I'm Not Comfortable With My Body Right Now?" />

          {/* Full-bleed landscape */}
          <FullImg src={IMG.redLace} alt="Red lace bra tattooed arms laying intimate portrait west ashley sc" height={480} position="center 30%" />

          <p style={pStyle}>We hear this more than almost anything else. And our answer is always the same: <strong>this is exactly why you should do this.</strong> Every woman who has walked into our studio — every age, every size, every story — has left with images that surprised her. Not because we edited her into someone else, but because the right light, the right posing, and the right environment reveal something that was always there.</p>
          <p style={pStyle}>You don't need to wait until you lose weight. You don't need to be a certain age. You don't need to feel confident before you arrive — that's what the session is for.</p>

          <PullQuote accent={acc} text="A few years ago, a woman contacted us to book a session. After our initial conversation, she went quiet — no response, no follow-up. Years later, she reached back out and explained: she had wanted to book more than anything, but she didn't believe in herself enough to go through with it. She arrived to her session visibly shaking. When it was over, she said: 'Amazing. I don't know why I was so nervous. That was so much fun and so easy.'" />

          <p style={pStyle}>When she saw her images at the reveal, she cried. She told us she had been picked on and called names growing up because of her looks — and that every time she looked in the mirror, she still heard those words. Seeing her images was the first time in her life she felt truly beautiful. She left our studio a different person than the one who walked in.</p>

          <SectionHead accent={acc} title="Frequently Asked Questions" />
          <FAQ accent={acc} items={faqs} />

          <SectionHead accent={acc} title="What Our Clients Tell Us After Their Session" />
          <p style={pStyle}>The three things we hear most after a session wraps: how easy it was, how much they love their images, and how they wish they had booked years ago.</p>
          <p style={pStyle}>Booking might feel intimidating right now. That's normal. But from the moment you contact us to the moment you walk out with your images, Mark and the team are with you every single step — walking you through every decision, every pose, and every choice. You are never alone in this process.</p>
          <p style={pStyle}>Our clients leave feeling confident, beautiful, powerful, and ready to show themselves to the world. Not a different version of themselves. Just the truest one.</p>

          {/* Closing signature */}
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 16, margin: "64px 0 0", textAlign: "center" }}>
            <Diamond size={14} color={acc} />
            <p style={{ fontFamily: "'Cormorant Garamond'", fontStyle: "italic", fontSize: 18, color: "rgba(240,230,211,0.55)", letterSpacing: "0.05em" }}>
              With love,<br />
              <span style={{ fontFamily: "'Great Vibes'", fontSize: 34, color: acc, lineHeight: 1.6 }}>Mark & Christina</span>
            </p>
          </div>
        </article>
      );
    }

    function AuthorBio({ tweaks }) {
      return (
        <div style={{
          borderTop: "1px solid rgba(240,154,105,0.15)",
          borderBottom: "1px solid rgba(240,154,105,0.15)",
          maxWidth: 720, margin: "0 auto",
          padding: "48px 40px",
          display: "flex", gap: 32, alignItems: "flex-start",
        }}>
          <div style={{ flexShrink: 0, width: 90, height: 90, borderRadius: "50%", overflow: "hidden", border: `2px solid ${tweaks.accentColor}44` }}>
            <img src={IMG.hero} alt="Mark Andrew" style={{ width: "100%", height: "100%", objectFit: "cover", objectPosition: "center 10%" }} />
          </div>
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
              <Diamond size={8} color={tweaks.accentColor} />
              <span style={{ fontFamily: "'Jost'", fontSize: 10, letterSpacing: "0.3em", textTransform: "uppercase", color: tweaks.accentColor }}>Written by</span>
            </div>
            <div style={{ fontFamily: "'Cormorant Garamond'", fontSize: 22, fontStyle: "italic", color: "#f2f4f8", marginBottom: 10 }}>Mark & Christina</div>
            <p style={{ fontFamily: "'Jost'", fontWeight: 300, fontSize: 13.5, lineHeight: 1.8, color: "rgba(240,230,211,0.5)", maxWidth: 480 }}>
              We're a husband-and-wife photography team based in Beaufort, SC. Our mission is to help every woman see herself the way we see her — powerful, beautiful, and worthy of being celebrated.
            </p>
          </div>
        </div>
      );
    }

    function RelatedPosts({ tweaks }) {
      if (!tweaks.showRelatedPosts) return null;
      const posts = [
        { category: "Styling Tips", title: "What to Wear to Your Boudoir Session: A Complete Guide", date: "March 12, 2026", img: IMG.lsu },
        { category: "Client Stories", title: "Her Story: How One Shoot Changed Everything", date: "February 4, 2026", img: IMG.wine },
        { category: "Behind the Lens", title: "A Day in the Studio: What Your Session Actually Looks Like", date: "January 18, 2026", img: IMG.vanity },
      ];
      return (
        <section style={{ padding: "80px 40px", maxWidth: 1100, margin: "0 auto" }}>
          <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 8, marginBottom: 56 }}>
            <Diamond size={12} color={tweaks.accentColor} />
            <h3 style={{ fontFamily: "'Cormorant Garamond'", fontSize: 36, fontWeight: 300, fontStyle: "italic", color: "#f2f4f8" }}>More from the Blog</h3>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 28 }}>
            {posts.map((p, i) => (
              <article key={i} style={{ cursor: "pointer" }}>
                <GoldFrame>
                  <img src={p.img} alt={p.title} style={{ width: "100%", height: 260, objectFit: "cover", objectPosition: "center 20%", display: "block" }} />
                </GoldFrame>
                <div style={{ padding: "24px 0 0" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12 }}>
                    <Diamond size={7} color={tweaks.accentColor} />
                    <span style={{ fontFamily: "'Jost'", fontSize: 10, letterSpacing: "0.25em", textTransform: "uppercase", color: tweaks.accentColor }}>{p.category}</span>
                  </div>
                  <h4 style={{ fontFamily: "'Cormorant Garamond'", fontSize: 20, fontWeight: 400, color: "#f2f4f8", lineHeight: 1.35, marginBottom: 12, textWrap: "pretty" }}>{p.title}</h4>
                  <span style={{ fontFamily: "'Jost'", fontSize: 11, letterSpacing: "0.1em", color: "rgba(240,230,211,0.3)" }}>{p.date}</span>
                </div>
              </article>
            ))}
          </div>
        </section>
      );
    }

    function CTA({ tweaks }) {
      if (!tweaks.showCTA) return null;
      const acc = tweaks.accentColor;
      return (
        <section style={{
          position: "relative", overflow: "hidden",
          padding: "100px 40px",
          textAlign: "center",
          borderTop: "1px solid rgba(240,154,105,0.12)",
          background: "linear-gradient(180deg, #101626 0%, #1c2440 50%, #101626 100%)",
        }}>
          <div style={{ position: "absolute", top: 40, left: "50%", transform: "translateX(-50%)", display: "flex", flexDirection: "column", alignItems: "center", gap: 6, opacity: 0.15 }}>
            <div style={{ width: 1, height: 40, background: acc }} />
            <Diamond size={8} color={acc} />
          </div>
          <div style={{ position: "relative", zIndex: 1 }}>
            <p style={{ fontFamily: "'Great Vibes'", fontSize: "clamp(36px, 5vw, 56px)", color: acc, lineHeight: 1.2, marginBottom: 16 }}>Ready to experience it for yourself?</p>
            <h2 style={{ fontFamily: "'Cormorant Garamond'", fontSize: "clamp(20px, 2.6vw, 34px)", fontWeight: 300, color: "#f2f4f8", letterSpacing: "0.03em", marginBottom: 14 }}>Sessions are limited. We'd love to hold the right time for you.</h2>
            <p style={{ fontFamily: "'Jost'", fontWeight: 300, fontSize: 13, letterSpacing: "0.15em", color: "rgba(240,230,211,0.4)", marginBottom: 10, textTransform: "uppercase" }}>Beaufort · Bluffton · Hilton Head · Savannah · Charleston</p>
            <p style={{ fontFamily: "'Jost'", fontWeight: 300, fontSize: 14, color: "rgba(240,230,211,0.5)", marginBottom: 48 }}>Call or text: <a href="tel:9045763155" style={{ color: acc, textDecoration: "none" }}>(904) 576-3155</a></p>
            <a href="https://markandrewboudoir.com" target="_blank" rel="noopener noreferrer" style={{
              display: "inline-block",
              fontFamily: "'Jost'", fontSize: 11, fontWeight: 500,
              letterSpacing: "0.3em", textTransform: "uppercase",
              color: "#101626",
              background: acc,
              padding: "16px 48px",
              textDecoration: "none",
              transition: "all 0.3s ease",
            }}
              onMouseEnter={e => { e.target.style.background = "#e08050"; e.target.style.letterSpacing = "0.38em"; }}
              onMouseLeave={e => { e.target.style.background = acc; e.target.style.letterSpacing = "0.3em"; }}>
              Schedule Your Free Consultation
            </a>
          </div>
        </section>
      );
    }

    function Footer({ tweaks }) {
      return (
        <footer style={{ borderTop: "1px solid rgba(240,154,105,0.1)", padding: "48px 40px", display: "flex", flexDirection: "column", alignItems: "center", gap: 24, background: "#0f1424" }}>
          <Diamond size={10} color={tweaks.accentColor} />
          <div style={{ fontFamily: "'Great Vibes'", fontSize: 28, color: tweaks.accentColor }}>Mark Andrew</div>
          <div style={{ display: "flex", gap: 32, flexWrap: "wrap", justifyContent: "center" }}>
            {["Blog","Gallery","About","Contact","FAQ"].map(l => (
              <a key={l} href="#" style={{ fontFamily: "'Jost'", fontSize: 10, letterSpacing: "0.25em", textTransform: "uppercase", color: "rgba(240,230,211,0.3)", textDecoration: "none", transition: "color 0.2s" }}
                onMouseEnter={e => e.target.style.color = tweaks.accentColor}
                onMouseLeave={e => e.target.style.color = "rgba(240,230,211,0.3)"}>{l}</a>
            ))}
          </div>
          <p style={{ fontFamily: "'Jost'", fontSize: 11, letterSpacing: "0.15em", color: "rgba(240,230,211,0.18)" }}>mark andrew photography © 2026</p>
        </footer>
      );
    }

    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      useEffect(() => {
        const bar = document.getElementById("progress-bar");
        const fn = () => {
          const pct = (window.scrollY / (document.documentElement.scrollHeight - window.innerHeight)) * 100;
          if (bar) bar.style.width = Math.min(pct, 100) + "%";
        };
        window.addEventListener("scroll", fn);
        return () => window.removeEventListener("scroll", fn);
      }, []);

      return (
        <>
          <Nav />
          <Hero tweaks={tweaks} />
          <BlogBody tweaks={tweaks} />
          <AuthorBio tweaks={tweaks} />
          <RelatedPosts tweaks={tweaks} />
          <CTA tweaks={tweaks} />
          <Footer tweaks={tweaks} />

          <TweaksPanel>
            <TweakColor id="accentColor" label="Accent Color" value={tweaks.accentColor} onChange={v => setTweak("accentColor", v)} />
            <TweakRadio id="heroStyle" label="Hero Height" value={tweaks.heroStyle} options={[{value:"tall",label:"Tall"},{value:"short",label:"Short"}]} onChange={v => setTweak("heroStyle", v)} />
            <TweakToggle id="showRelatedPosts" label="Show Related Posts" value={tweaks.showRelatedPosts} onChange={v => setTweak("showRelatedPosts", v)} />
            <TweakToggle id="showCTA" label="Show Book CTA" value={tweaks.showCTA} onChange={v => setTweak("showCTA", v)} />
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
