<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Daily Reel Scripts — Mark Andrew</title></head><body>
<style>
  :root{
    --navy:#0c1322; --navy2:#161d30; --card:#1a2340; --line:#2b3557;
    --gold:#ffbf8f; --gold-deep:#e0a878; --cream:#eef0f5; --muted:#94a0bb;
    --ok:#7fd1a6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:linear-gradient(178deg,#0c1322 0%,#161d30 60%,#131a2c 100%);
    color:var(--cream); -webkit-font-smoothing:antialiased;
    min-height:100vh; padding:22px 16px 60px;
  }
  .wrap{max-width:620px;margin:0 auto}
  .eyebrow{
    font-size:12px;letter-spacing:.32em;color:var(--gold-deep);
    text-transform:uppercase;font-weight:600;text-align:center;margin-bottom:8px;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;font-weight:600;
    font-size:34px;line-height:1.05;text-align:center;color:var(--cream);
    letter-spacing:.01em;text-wrap:balance;
  }
  .date{text-align:center;color:var(--muted);font-size:14px;margin-top:10px}
  .howto{
    text-align:center;color:var(--muted);font-size:13.5px;line-height:1.5;
    margin:14px auto 26px;max-width:440px;
  }
  .howto b{color:var(--cream);font-weight:600}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:20px 18px;margin-bottom:20px;
  }
  .card.bts{border-color:var(--gold-deep)}
  .rhead{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .rnum{
    font-family:Georgia,serif;font-size:26px;color:var(--gold);
    line-height:1;font-variant-numeric:tabular-nums;
  }
  .rtitle{font-family:Georgia,serif;font-size:21px;color:var(--cream);line-height:1.15}
  .chip{
    display:inline-block;margin:8px 0 16px;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--gold-deep);border:1px solid var(--line);
    border-radius:100px;padding:4px 11px;font-weight:600;
  }
  .lbl{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin:2px 0 8px;
  }
  .text{
    background:#111834;border:1px solid var(--line);border-radius:12px;
    padding:14px 15px;font-size:16px;line-height:1.62;color:#e7ebf6;
    white-space:pre-line;
  }
  .text.cap{color:#d2d9ec;font-size:15px}
  .btn{
    -webkit-appearance:none;appearance:none;border:none;cursor:pointer;
    width:100%;min-height:54px;border-radius:13px;margin:11px 0 4px;
    font-size:16px;font-weight:700;letter-spacing:.01em;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:transform .08s ease,background .2s ease,color .2s ease;
  }
  .btn:active{transform:scale(.985)}
  .btn.primary{background:var(--gold);color:#241608}
  .btn.ghost{background:transparent;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .btn.copied{background:var(--ok)!important;color:#0b2417!important;border-color:var(--ok)!important}
  .btn:focus-visible{outline:3px solid #6f8fe0;outline-offset:2px}
  .divider{height:1px;background:var(--line);border:none;margin:16px 0}
  img.cardcover{
    width:100%;max-width:250px;height:auto;display:block;margin:8px auto 0;
    border-radius:12px;border:1px solid var(--line);background:var(--navy);
  }
  .btn.save{background:#20304f;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .foot{text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;margin-top:30px}
  .foot b{color:var(--gold-deep)}
  @media (prefers-reduced-motion:reduce){.btn{transition:none}}
</style>

<div class="wrap">
  <div class="eyebrow">Mark Andrew Photography</div>
  <h1>Daily Reel Scripts</h1>
  <div class="date" id="date"></div>
  <p class="howto">Tap <b>Copy Script</b> → paste into your teleprompter. Tap <b>Copy Caption</b> → paste into Instagram. No selecting, no fighting your phone.</p>
  <div id="cards"></div>
  <p class="foot">Refreshes every morning at <b>5:30</b>. Add this page to your home screen so it opens like an app.<br>— Pickles</p>
</div>

<script>
const DATE = "Tuesday, July 14, 2026 — film any 2";
// Each DATA item may carry an optional `cover:"data:image/png;base64,..."` that the routine fills daily;
// it renders as a tap-to-save image directly under that reel's caption.
const DATA = [
  {
    "n": "1",
    "title": "You Don't Have a Bad Side",
    "cover": "covers/face-1.jpg",
    "format": "Studio Rule · Ep. 8",
    "script": "I will not photograph your good side. Studio rule number eight, and it makes people bristle.\nBecause the second you tell me your good side, you've told me the other one is bad. And I refuse to spend three hours agreeing with you about a body I already think is beautiful.\nHere's what's actually happening. Somewhere along the way a bad photo caught you off guard, and you decided a whole half of your face was the problem. So now you tilt, you hide, you angle away — in every picture, for years.\nI don't work like that. I light both sides. I shoot both sides. And at the reveal, the image that stops you cold is almost always the one from the side you swore you'd never show.\nYou don't have a bad side. You have a side nobody ever bothered to light.\nLet me photograph all of you.",
    "caption": "Studio rule number eight: I won't photograph your \"good side.\" The moment you name it, you've decided the other half of you is a flaw to hide — and I refuse to spend three hours agreeing with you. You don't have a bad side. You have one nobody ever bothered to light right. Let me photograph all of you. The form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #womenover40 #selfconfidence"
  },
  {
    "n": "2",
    "title": "Three Weeks to Edit",
    "cover": "covers/face-2.jpg",
    "format": "Unpopular Opinion",
    "script": "Unpopular opinion: if your photographer needs three weeks to edit your photos, they didn't get the shot.\nLet me say it plainer. Editing is not where a great image is made. It's where a mediocre one gets rescued. The light, the pose, the expression — that's all decided in the room, in the moment, when the shutter clicks. Get it right there and editing takes minutes. Get it wrong and no amount of Photoshop, and no three-week turnaround, is going to save it.\nThat's the whole reason I do a same-day reveal. You watch a hundred and thirty finished images three hours after we shoot, on a sixty-five-inch screen, over lunch. Not because I'm fast — because I got it right in the camera, so there's nothing to hide behind and nothing to stall for.\nA long wait isn't craftsmanship. It's a shot that didn't land the first time.\nAsk any photographer what happens the same day. That one answer tells you everything.",
    "caption": "Unpopular opinion: if editing takes three weeks, they didn't get the shot. Editing rescues a mediocre image — it doesn't make a great one. The light, the pose, the expression all happen in the room. That's why you see 130 finished photos three hours after we shoot, over lunch, on a 65-inch screen. Nothing to hide behind. Ask what happens the same day. The form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #samedayreveal #luxuryportraits"
  },
  {
    "n": "3",
    "title": "Stop Apologizing",
    "cover": "covers/face-3.jpg",
    "format": "Overheard in the Studio",
    "script": "The one thing women apologize for most in my studio is their stomach. Every single session. And I've finally stopped letting them.\nIt's usually in the first ten minutes. \"Sorry, ignore my stomach.\" \"Sorry, I meant to lose some of this first.\" Said quietly, to a man holding a camera, about the same body that carried their kids and got them into that room.\nFor years I'd just reassure her and keep shooting. Now I stop. I put the camera down and tell her the truth: nobody at the reveal is going to be looking at your stomach. They'll be looking at your eyes — because for once you look like you're not sorry to be there.\nAnd by outfit three, the apologizing is gone. Not because her stomach changed. Because she finally saw the whole picture and realized it was never the problem.\nYou've apologized enough. Come let me prove there was never anything to be sorry for.",
    "caption": "The thing women apologize for most in my studio is their stomach — the same body that carried their kids and got them into the room. For years I just reassured them and kept shooting. Now I stop and tell them the truth: at the reveal, nobody's looking at your stomach. They're looking at your eyes. By outfit three, the \"sorry\" is gone. You've apologized enough. The form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #bodyconfidence #selflove"
  },
  {
    "n": "4",
    "title": "The 15 Pounds Was Never It",
    "cover": "covers/face-4.jpg",
    "format": "The Waiting List",
    "script": "The fifteen pounds was never the reason. It's just the excuse that feels the most responsible.\nI've heard it from hundreds of women. \"I'll do it once I lose the weight.\" And it sounds so sensible that nobody ever questions it. But I've watched what actually happens. She loses the weight — and the finish line just moves. Now it's twenty pounds. Now it's her arms. Now it's a better year. The line was never really about the scale.\nHere's the quiet truth underneath it. Waiting until you're smaller isn't discipline. It's permission you keep refusing to give yourself.\nAnd in thirty years, when your daughter is holding the only photographs that exist of you, she is not going to wish you'd been fifteen pounds lighter. She's going to be grateful you finally let yourself be seen.\nThe weight was never the thing standing in your way.\nYou're allowed to stop waiting today.",
    "caption": "The fifteen pounds was never the reason — it's just the excuse that feels the most responsible. I've watched it a hundred times: the weight comes off and the finish line simply moves. Twenty pounds. Then the arms. Then a better year. Waiting until you're smaller isn't discipline — it's permission you keep refusing to give yourself. In thirty years your daughter won't wish you'd been lighter. She'll be grateful you let yourself be seen. The form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #womenover40 #selflove"
  },
  {
    "n": "★",
    "title": "She Brought a Suitcase",
    "format": "BTS Overlay · Prep List",
    "cover": "covers/reel-5.jpg",
    "screenTrial": "She showed up to her shoot with an entire suitcase. She only needed it for one thing — and it's not what you'd guess. The whole story is in the caption.",
    "screenGrid": "After 850 shoots, the outfit a woman almost leaves at home is the one that makes her cry at the reveal. There's a reason I tell everyone to overpack — it's all in the description 👇",
    "caption": "The suitcase? She'd packed nine outfits because she was terrified of choosing wrong. Eight were \"safe.\" The ninth she almost left on the bed — too bold, too much, \"not really me.\"\n\nThat ninth outfit is the one she's putting on her wall.\n\nIt happens constantly. The piece you feel silly bringing is almost always the one that stops your breath at the reveal. So here's the only prep rule that actually matters: overpack. Bring the safe things and the scary thing. Bring the dress you bought and never wore. You don't have to decide anything at home — that's my job once you're here.\n\nShow up with too much. We'll find the one together. The form's in my bio when you're ready for your day.\n\n#southbendphotographer #boudoirphotography #michiana #photoshootprep #womenover40",
    "bts": true
  }
];

function copy(text, btn, label){
  const done = () => {
    btn.classList.add("copied");
    const prev = btn.dataset.label;
    btn.textContent = "Copied ✓";
    setTimeout(()=>{ btn.classList.remove("copied"); btn.textContent = prev; }, 1400);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallback(text,done));
  } else { fallback(text,done); }
}
function fallback(text, done){
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{document.execCommand("copy");}catch(e){}
  document.body.removeChild(ta); done();
}
// Build a File synchronously from a data URI (no await — keeps iOS "user gesture" alive for share)
function b64ToFile(dataUri, filename){
  const c=dataUri.indexOf(","), meta=dataUri.slice(0,c), b64=dataUri.slice(c+1);
  const mime=(meta.match(/data:(.*?);/)||[,"image/jpeg"])[1];
  const bin=atob(b64), arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new File([arr], filename, {type:mime});
}
function saveImg(dataUri, name){
  const slug=(name||"reel").replace(/[^a-z0-9]+/gi,"-").toLowerCase();
  let file=null;
  try{ file=b64ToFile(dataUri, slug+"-cover.jpg"); }catch(e){}
  // Primary: iOS share sheet → "Save Image" to Photos. Called synchronously in the tap.
  if(file && navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file]}).catch(err=>{ if(!err||err.name!=="AbortError") openFull(dataUri); });
    return;
  }
  openFull(dataUri);
}
// Fallback: blow the image up full-screen so a long-press gives Save to Photos
function openFull(dataUri){
  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;z-index:99;background:#0c1322;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;gap:12px";
  const tip=document.createElement("div");
  tip.style.cssText="color:#eef0f5;font-size:15px;text-align:center;line-height:1.4";
  tip.innerHTML="Press &amp; hold the image → <b>Save to Photos</b>.<br>Tap the dark area to close.";
  const img=document.createElement("img"); img.src=dataUri;
  img.style.cssText="max-width:100%;max-height:80vh;border-radius:10px";
  ov.appendChild(tip); ov.appendChild(img);
  ov.addEventListener("click",e=>{ if(e.target===ov) document.body.removeChild(ov); });
  document.body.appendChild(ov);
}

document.getElementById("date").textContent = DATE;

const host = document.getElementById("cards");
DATA.forEach(d=>{
  const card=document.createElement("div");
  card.className="card"+(d.bts?" bts":"");
  card.innerHTML = `<div class="rhead"><span class="rnum">${d.n}</span><span class="rtitle">${d.title}</span></div><span class="chip">${d.format}</span>`;
  // BTS reels carry TWO on-screen texts (Trial + Grid); everything else is script + caption
  let blocks;
  if(d.bts && d.screenTrial && d.screenGrid){
    blocks=[
      {lbl:"On-screen text — TRIAL reel", txt:d.screenTrial, btn:"Copy Trial Text"},
      {lbl:"On-screen text — GRID post", txt:d.screenGrid, btn:"Copy Grid Text"},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  } else {
    blocks=[
      {lbl:(d.bts?"On-screen text":"Script"), txt:d.script, btn:(d.bts?"Copy On-Screen Text":"Copy Script")},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  }
  blocks.forEach((b,i)=>{
    if(i>0){ const hr=document.createElement("hr"); hr.className="divider"; card.appendChild(hr); }
    const lbl=document.createElement("div"); lbl.className="lbl"; lbl.textContent=b.lbl; card.appendChild(lbl);
    const txt=document.createElement("div"); txt.className="text"+(b.cap?" cap":""); txt.textContent=b.txt; card.appendChild(txt);
    const btn=document.createElement("button"); btn.className="btn "+(b.cap?"ghost":"primary");
    btn.dataset.label=b.btn; btn.textContent=b.btn;
    btn.addEventListener("click", ()=>copy(b.txt, btn));
    card.appendChild(btn);
  });
  if(d.cover){
    const cl=document.createElement("div"); cl.className="lbl"; cl.style.marginTop="16px";
    cl.innerHTML="Cover — press &amp; hold → Save to Photos"; card.appendChild(cl);
    const img=document.createElement("img"); img.className="cardcover"; img.src=d.cover; img.alt=d.title+" cover";
    card.appendChild(img);
  }
  host.appendChild(card);
});
</script>

</body></html>
