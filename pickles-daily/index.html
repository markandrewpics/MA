<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Daily Reel Scripts — Mark Andrew</title></head><body>
<style>
  :root{
    --navy:#0c1322; --navy2:#161d30; --card:#1a2340; --line:#2b3557;
    --gold:#ffbf8f; --gold-deep:#e0a878; --cream:#eef0f5; --muted:#94a0bb;
    --ok:#7fd1a6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:linear-gradient(178deg,#0c1322 0%,#161d30 60%,#131a2c 100%);
    color:var(--cream); -webkit-font-smoothing:antialiased;
    min-height:100vh; padding:22px 16px 60px;
  }
  .wrap{max-width:620px;margin:0 auto}
  .eyebrow{
    font-size:12px;letter-spacing:.32em;color:var(--gold-deep);
    text-transform:uppercase;font-weight:600;text-align:center;margin-bottom:8px;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;font-weight:600;
    font-size:34px;line-height:1.05;text-align:center;color:var(--cream);
    letter-spacing:.01em;text-wrap:balance;
  }
  .date{text-align:center;color:var(--muted);font-size:14px;margin-top:10px}
  .howto{
    text-align:center;color:var(--muted);font-size:13.5px;line-height:1.5;
    margin:14px auto 26px;max-width:440px;
  }
  .howto b{color:var(--cream);font-weight:600}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:20px 18px;margin-bottom:20px;
  }
  .card.bts{border-color:var(--gold-deep)}
  .rhead{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .rnum{
    font-family:Georgia,serif;font-size:26px;color:var(--gold);
    line-height:1;font-variant-numeric:tabular-nums;
  }
  .rtitle{font-family:Georgia,serif;font-size:21px;color:var(--cream);line-height:1.15}
  .chip{
    display:inline-block;margin:8px 0 16px;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--gold-deep);border:1px solid var(--line);
    border-radius:100px;padding:4px 11px;font-weight:600;
  }
  .lbl{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin:2px 0 8px;
  }
  .text{
    background:#111834;border:1px solid var(--line);border-radius:12px;
    padding:14px 15px;font-size:16px;line-height:1.62;color:#e7ebf6;
    white-space:pre-line;
  }
  .text.cap{color:#d2d9ec;font-size:15px}
  .btn{
    -webkit-appearance:none;appearance:none;border:none;cursor:pointer;
    width:100%;min-height:54px;border-radius:13px;margin:11px 0 4px;
    font-size:16px;font-weight:700;letter-spacing:.01em;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:transform .08s ease,background .2s ease,color .2s ease;
  }
  .btn:active{transform:scale(.985)}
  .btn.primary{background:var(--gold);color:#241608}
  .btn.ghost{background:transparent;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .btn.copied{background:var(--ok)!important;color:#0b2417!important;border-color:var(--ok)!important}
  .btn:focus-visible{outline:3px solid #6f8fe0;outline-offset:2px}
  .divider{height:1px;background:var(--line);border:none;margin:16px 0}
  img.cardcover{
    width:100%;max-width:250px;height:auto;display:block;margin:8px auto 0;
    border-radius:12px;border:1px solid var(--line);background:var(--navy);
  }
  .btn.save{background:#20304f;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .foot{text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;margin-top:30px}
  .foot b{color:var(--gold-deep)}
  @media (prefers-reduced-motion:reduce){.btn{transition:none}}
</style>

<div class="wrap">
  <div class="eyebrow">Mark Andrew Photography</div>
  <h1>Daily Reel Scripts</h1>
  <div class="date" id="date"></div>
  <p class="howto">Tap <b>Copy Script</b> → paste into your teleprompter. Tap <b>Copy Caption</b> → paste into Instagram. No selecting, no fighting your phone.</p>
  <div id="cards"></div>
  <p class="foot">Refreshes every morning at <b>5:30</b>. Add this page to your home screen so it opens like an app.<br>— Pickles</p>
</div>

<script>
const DATE = "Thursday, July 16, 2026 — film any 2";
// Each DATA item may carry an optional `cover:"data:image/png;base64,..."` that the routine fills daily;
// it renders as a tap-to-save image directly under that reel's caption.
const DATA = [
  {
    "n": "1",
    "title": "Don't Look at the Camera",
    "cover": "covers/face-1.jpg",
    "format": "Studio Rule · Ep. 10",
    "script": "You don't get to look at the back of my camera during your session. That's studio rule number ten — and it's the one that saves your favorite photo.\nThe second I turn that screen around, you stop being in the room. You start judging a half-second frozen version of yourself on a two-inch screen, in bad light, with your chin at the worst possible angle. And now you're chasing that. Now you're stiff. Now you're performing instead of being.\nI've watched it happen. One peek at the back of the camera and a woman who was glowing thirty seconds ago is suddenly apologizing for her arm.\nSo we don't do it. You trust me for ninety minutes, and I'll hand you the whole thing at once — a hundred and thirty finished images on a sixty-five inch screen the same afternoon.\nThe photo you'd have talked yourself out of at frame one? That's the one you cry over at three o'clock.\nLook at me. Not the screen.",
    "caption": "Studio rule number ten: you don't get to see the back of my camera during your session. Not because I'm hiding anything — because I'm protecting the exact woman you came here to meet.\n\nOne peek at a frozen frame in bad light and you start chasing a version of yourself that doesn't exist. You get stiff. You start apologizing for your arm.\n\nSo we don't do it. Trust me for ninety minutes and you'll see all 130 finished images the same afternoon, on a 65-inch screen. The photo you'd have deleted at frame one is the one you'll cry over at 3 o'clock.\n\nLook at me — not the screen. The form's in my bio, South Bend.\n\n#southbendphotographer #boudoirphotography #michiana #womenover40 #selfconfidence"
  },
  {
    "n": "2",
    "title": "Confidence Isn't the Ticket Price",
    "cover": "covers/face-2.jpg",
    "format": "Unpopular Opinion",
    "script": "Unpopular opinion: you do not need to be confident to book me.\nSomewhere along the way, women got sold the idea that confidence is the ticket price — that you have to already feel good in your skin before you're allowed to be photographed like this. Backwards. Completely backwards.\nConfidence isn't what you bring to the session. It's what I hand you at the end of it.\nAlmost every woman walks into my South Bend studio nervous. Sweaty palms, rehearsed excuses, \"I don't know how to pose,\" \"I don't photograph well.\" Ninety minutes later she's watching herself on a sixty-five inch screen, and I get to watch the exact moment the story she's told about herself for twenty years just… breaks.\nThat's the product. Not the photos — the photos are proof. The product is her seeing it.\nSo stop waiting to feel ready. Ready is the thing you leave with.\nYou don't book this because you're confident. You get confident because you booked it.",
    "caption": "Unpopular opinion: you don't need to be confident to book me.\n\nConfidence isn't what you bring — it's what I hand you at the reveal. Almost every woman walks into my studio nervous, rehearsing \"I don't photograph well.\" Ninety minutes later she's watching herself on a 65-inch screen and the story she's carried for twenty years just breaks.\n\nThat's the whole point. You don't do this because you're confident. You get confident because you did it.\n\nStop waiting to feel ready — ready is the thing you leave with. When you're done waiting, the form's in my bio.\n\n#southbendphotographer #boudoirphotographer #michiana #selfworth #confidenceafter40"
  },
  {
    "n": "3",
    "title": "The Consult Is a Red-Flag Test",
    "cover": "covers/face-3.jpg",
    "format": "Prep List",
    "script": "Before you book any photographer, listen to how they talk about your body on the consult call.\nNot their portfolio. Not their pricing. The words they use about you, in the first five minutes, when you're just a voice on the phone.\nBecause that five minutes tells you exactly how the photos are going to feel.\nIf a photographer spends the call listing what they'll \"fix\" — slim you here, smooth you there, hide this, minimize that — believe them. That's the shoot you're going to have. You'll spend the whole day feeling like a problem being managed.\nHere's what you should hear instead. What do you want to feel when you see these? What's the version of you that never gets photographed? Where do you light up?\nThe right photographer is curious about the woman, not the flaws.\nSo on that call, don't just ask what they charge. Listen to how they talk about you.\nThe consult is the shoot before the shoot. Pay attention to it.",
    "caption": "A prep tip nobody gives you: before you book any photographer, listen to how they talk about your body on the consult call.\n\nNot the portfolio. Not the price. The words they use about YOU in the first five minutes. If they're already listing what they'll \"fix\" and \"hide,\" that's the shoot you'll have — a whole day feeling like a problem being managed.\n\nThe right one asks what you want to FEEL, and where you light up. They're curious about the woman, not the flaws.\n\nThe consult is the shoot before the shoot. Screenshot this before you book anyone in Michiana. Form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #photoshootprep #womenover40"
  },
  {
    "n": "4",
    "title": "You Made Yourself Invisible",
    "cover": "covers/face-4.jpg",
    "format": "The Waiting List",
    "script": "You think you became invisible, and that it just happened to you. It didn't.\nNobody turned you invisible. You did it — one skipped photo at a time.\nYou stepped out of the frame at the birthday because you didn't like your arms. You handed the camera to someone else at the reunion. You said \"delete that one\" so many times that eventually there was nothing left to delete.\nTwenty years of small exits. And one day you look up and you're not in the story of your own life anymore. You're the one who took the picture.\nHere's the part nobody tells the woman at fifty, at sixty. It happened one decision at a time, which means it comes back one decision at a time.\nYou don't need to be younger. You don't need to be smaller. You need one afternoon where you decide to be seen again.\nYou didn't disappear all at once. You don't have to come back all at once either.\nStart with one photograph.",
    "caption": "For the woman who feels invisible now: it didn't just happen to you. You did it — one skipped photo at a time.\n\nOut of the frame at the birthday. Camera handed off at the reunion. \"Delete that one\" until there was nothing left. Twenty years of small exits, and one day you're not in the story of your own life. You're the one who took the picture.\n\nBut here's the part nobody tells you at 50, at 60: it happened one decision at a time, so it comes back one decision at a time. You don't need to be younger or smaller. You need one afternoon to be seen again.\n\nStart with one photograph. The form's in my bio, Michiana.\n\n#southbendphotographer #boudoirphotography #michiana #womenover50 #worthiness"
  },
  {
    "n": "★",
    "title": "My Daughter Needs to See These",
    "format": "BTS Overlay · Overheard",
    "cover": "covers/reel-5.jpg",
    "screenTrial": "She booked this terrified her daughter would ever find out. Ninety minutes later she was begging me to send the photos to her. What changed is in the caption 👇",
    "screenGrid": "The same sentence comes out of almost every mom at the reveal — and it's never about her. It's about her daughter. I put the exact words in the description 👇",
    "caption": "At 9 a.m. she told me, \"I don't want my daughter to ever see these.\" She meant it. She was embarrassed before we'd taken a single frame.\n\nAt 3 o'clock, sitting in front of the reveal screen, she said seven words I've now heard from hundreds of mothers: \"My daughter NEEDS to see these.\"\n\nSame woman. Same afternoon. Nothing about her body changed in six hours.\n\nWhat changed is that she finally saw herself the way the rest of us always have — and realized the most powerful thing she could hand her daughter isn't a smaller mom or a \"fixed\" one. It's proof that a woman is allowed to think she's beautiful out loud.\n\nYour daughter is learning how to talk about her own body by watching how you talk about yours. Show her the one who decided to be seen. The form's in my bio, South Bend.\n\n#southbendphotographer #boudoirphotography #michiana #motherdaughter #womenover40",
    "bts": true
  }
];

function copy(text, btn, label){
  const done = () => {
    btn.classList.add("copied");
    const prev = btn.dataset.label;
    btn.textContent = "Copied ✓";
    setTimeout(()=>{ btn.classList.remove("copied"); btn.textContent = prev; }, 1400);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallback(text,done));
  } else { fallback(text,done); }
}
function fallback(text, done){
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{document.execCommand("copy");}catch(e){}
  document.body.removeChild(ta); done();
}
// Build a File synchronously from a data URI (no await — keeps iOS "user gesture" alive for share)
function b64ToFile(dataUri, filename){
  const c=dataUri.indexOf(","), meta=dataUri.slice(0,c), b64=dataUri.slice(c+1);
  const mime=(meta.match(/data:(.*?);/)||[,"image/jpeg"])[1];
  const bin=atob(b64), arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new File([arr], filename, {type:mime});
}
function saveImg(dataUri, name){
  const slug=(name||"reel").replace(/[^a-z0-9]+/gi,"-").toLowerCase();
  let file=null;
  try{ file=b64ToFile(dataUri, slug+"-cover.jpg"); }catch(e){}
  // Primary: iOS share sheet → "Save Image" to Photos. Called synchronously in the tap.
  if(file && navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file]}).catch(err=>{ if(!err||err.name!=="AbortError") openFull(dataUri); });
    return;
  }
  openFull(dataUri);
}
// Fallback: blow the image up full-screen so a long-press gives Save to Photos
function openFull(dataUri){
  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;z-index:99;background:#0c1322;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;gap:12px";
  const tip=document.createElement("div");
  tip.style.cssText="color:#eef0f5;font-size:15px;text-align:center;line-height:1.4";
  tip.innerHTML="Press &amp; hold the image → <b>Save to Photos</b>.<br>Tap the dark area to close.";
  const img=document.createElement("img"); img.src=dataUri;
  img.style.cssText="max-width:100%;max-height:80vh;border-radius:10px";
  ov.appendChild(tip); ov.appendChild(img);
  ov.addEventListener("click",e=>{ if(e.target===ov) document.body.removeChild(ov); });
  document.body.appendChild(ov);
}

document.getElementById("date").textContent = DATE;

const host = document.getElementById("cards");
DATA.forEach(d=>{
  const card=document.createElement("div");
  card.className="card"+(d.bts?" bts":"");
  card.innerHTML = `<div class="rhead"><span class="rnum">${d.n}</span><span class="rtitle">${d.title}</span></div><span class="chip">${d.format}</span>`;
  // BTS reels carry TWO on-screen texts (Trial + Grid); everything else is script + caption
  let blocks;
  if(d.bts && d.screenTrial && d.screenGrid){
    blocks=[
      {lbl:"On-screen text — TRIAL reel", txt:d.screenTrial, btn:"Copy Trial Text"},
      {lbl:"On-screen text — GRID post", txt:d.screenGrid, btn:"Copy Grid Text"},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  } else {
    blocks=[
      {lbl:(d.bts?"On-screen text":"Script"), txt:d.script, btn:(d.bts?"Copy On-Screen Text":"Copy Script")},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  }
  blocks.forEach((b,i)=>{
    if(i>0){ const hr=document.createElement("hr"); hr.className="divider"; card.appendChild(hr); }
    const lbl=document.createElement("div"); lbl.className="lbl"; lbl.textContent=b.lbl; card.appendChild(lbl);
    const txt=document.createElement("div"); txt.className="text"+(b.cap?" cap":""); txt.textContent=b.txt; card.appendChild(txt);
    const btn=document.createElement("button"); btn.className="btn "+(b.cap?"ghost":"primary");
    btn.dataset.label=b.btn; btn.textContent=b.btn;
    btn.addEventListener("click", ()=>copy(b.txt, btn));
    card.appendChild(btn);
  });
  if(d.cover){
    const cl=document.createElement("div"); cl.className="lbl"; cl.style.marginTop="16px";
    cl.innerHTML="Cover — press &amp; hold → Save to Photos"; card.appendChild(cl);
    const img=document.createElement("img"); img.className="cardcover"; img.src=d.cover; img.alt=d.title+" cover";
    card.appendChild(img);
  }
  host.appendChild(card);
});
</script>

</body></html>
