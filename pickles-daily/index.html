<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Daily Reel Scripts — Mark Andrew</title></head><body>
<style>
  :root{
    --navy:#0c1322; --navy2:#161d30; --card:#1a2340; --line:#2b3557;
    --gold:#ffbf8f; --gold-deep:#e0a878; --cream:#eef0f5; --muted:#94a0bb;
    --ok:#7fd1a6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:linear-gradient(178deg,#0c1322 0%,#161d30 60%,#131a2c 100%);
    color:var(--cream); -webkit-font-smoothing:antialiased;
    min-height:100vh; padding:22px 16px 60px;
  }
  .wrap{max-width:620px;margin:0 auto}
  .eyebrow{
    font-size:12px;letter-spacing:.32em;color:var(--gold-deep);
    text-transform:uppercase;font-weight:600;text-align:center;margin-bottom:8px;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;font-weight:600;
    font-size:34px;line-height:1.05;text-align:center;color:var(--cream);
    letter-spacing:.01em;text-wrap:balance;
  }
  .date{text-align:center;color:var(--muted);font-size:14px;margin-top:10px}
  .howto{
    text-align:center;color:var(--muted);font-size:13.5px;line-height:1.5;
    margin:14px auto 26px;max-width:440px;
  }
  .howto b{color:var(--cream);font-weight:600}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:20px 18px;margin-bottom:20px;
  }
  .card.bts{border-color:var(--gold-deep)}
  .rhead{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .rnum{
    font-family:Georgia,serif;font-size:26px;color:var(--gold);
    line-height:1;font-variant-numeric:tabular-nums;
  }
  .rtitle{font-family:Georgia,serif;font-size:21px;color:var(--cream);line-height:1.15}
  .chip{
    display:inline-block;margin:8px 0 16px;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--gold-deep);border:1px solid var(--line);
    border-radius:100px;padding:4px 11px;font-weight:600;
  }
  .lbl{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin:2px 0 8px;
  }
  .text{
    background:#111834;border:1px solid var(--line);border-radius:12px;
    padding:14px 15px;font-size:16px;line-height:1.62;color:#e7ebf6;
    white-space:pre-line;
  }
  .text.cap{color:#d2d9ec;font-size:15px}
  .btn{
    -webkit-appearance:none;appearance:none;border:none;cursor:pointer;
    width:100%;min-height:54px;border-radius:13px;margin:11px 0 4px;
    font-size:16px;font-weight:700;letter-spacing:.01em;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:transform .08s ease,background .2s ease,color .2s ease;
  }
  .btn:active{transform:scale(.985)}
  .btn.primary{background:var(--gold);color:#241608}
  .btn.ghost{background:transparent;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .btn.copied{background:var(--ok)!important;color:#0b2417!important;border-color:var(--ok)!important}
  .btn:focus-visible{outline:3px solid #6f8fe0;outline-offset:2px}
  .divider{height:1px;background:var(--line);border:none;margin:16px 0}
  img.cardcover{
    width:100%;max-width:250px;height:auto;display:block;margin:8px auto 0;
    border-radius:12px;border:1px solid var(--line);background:var(--navy);
  }
  .btn.save{background:#20304f;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .foot{text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;margin-top:30px}
  .foot b{color:var(--gold-deep)}
  @media (prefers-reduced-motion:reduce){.btn{transition:none}}
</style>

<div class="wrap">
  <div class="eyebrow">Mark Andrew Photography</div>
  <h1>Daily Reel Scripts</h1>
  <div class="date" id="date"></div>
  <p class="howto">Tap <b>Copy Script</b> → paste into your teleprompter. Tap <b>Copy Caption</b> → paste into Instagram. No selecting, no fighting your phone.</p>
  <div id="cards"></div>
  <p class="foot">Refreshes every morning at <b>5:30</b>. Add this page to your home screen so it opens like an app.<br>— Pickles</p>
</div>

<script>
const DATE = "Thursday, July 9, 2026 — film any 2";
// Each DATA item may carry an optional `cover:"data:image/png;base64,..."` that the routine fills daily;
// it renders as a tap-to-save image directly under that reel's caption.
const DATA = [
  {
    n:"1", title:"The One Shot I Refuse", format:"Studio Rule · Ep. 5",
    cover:"covers/face-1.jpg",
    script:`There's one thing I won't photograph in my studio. No matter what you pay me.
I won't photograph you the way you see yourself on your worst day.
Sucked in. Chin tucked to hide the one you swear you have. Arm pinned to your side so it looks smaller. I've had women walk in already posing for the mirror in their head — the cruel one.
And I'll stop the whole shoot to say it: not in here.
In here you don't get to perform the smaller, quieter, more apologetic version of yourself. That woman isn't real. She's a habit you picked up from thirty years of bad angles and worse comments.
I photograph the other one. Shoulders back. Taking up her whole frame. Looking dead into the lens like she owns the place — because for these three hours, she does.
So that's the rule. I won't shoot the woman you've been told to be.
Only the one you actually are.`,
    caption:`There's one thing I flat-out refuse to photograph: the smaller, sucked-in, apologizing version of you that thirty years of bad angles taught you to perform. That woman isn't real. I only shoot the one who takes up her whole frame. When you're ready to meet her, the form's in my bio.

#southbendphotographer #michianawomen #confidenceunlocked #over40andfabulous #womensportraits`
  },
  {
    n:"2", title:"Photogenic Isn't Real", format:"Unpopular Opinion",
    cover:"covers/face-2.jpg",
    script:`Unpopular opinion: 'photogenic' isn't a real thing. And I've proven it eight hundred and fifty times.
Nobody is born photogenic. Nobody is born un-photogenic either. What you call 'not photogenic' is just every bad photo anyone ever took of you — under a kitchen light, at a bad angle, by someone who wasn't paying attention.
You decided that was the truth about your face. It wasn't. It was the truth about the lighting.
I've photographed over 850 women who swore the camera hated them. Every single one has sat on my couch at the reveal, hand over her mouth, going 'that's me?'
Yeah. That's you. That was always you. Nobody had ever built the light for your face before.
'Photogenic' isn't a gift some women get. It's a job. My job.
So the next time you say you're not photogenic — you're not describing your face. You're describing every photographer who never bothered.`,
    caption:`'I'm just not photogenic' might be the most expensive lie women tell themselves. Photogenic isn't a gift you're born with — it's lighting, angle, and a photographer who's actually paying attention. I've watched 850 women who 'hated the camera' cover their mouths at the reveal. Your turn's in my bio.

#southbendphotographer #boudoirphotography #michiana #womenover40 #photogenic`
  },
  {
    n:"3", title:"She Waited Six Years", format:"The Waiting List",
    cover:"covers/face-3.jpg",
    script:`She waited six years to feel beautiful. Her body never changed. Her mind changed in one afternoon.
When she booked, she told me she'd been 'fifteen pounds away' since her youngest started school. Six years of that same fifteen pounds. Six years of skipping the beach photo, standing behind the camera at every birthday, buying the dress in the size she was going to be.
She almost cancelled on me twice.
Then she showed up. Hair, makeup, three outfits, a whole afternoon where nobody needed anything from her.
And at the reveal she got quiet. Not crying yet — just quiet. Then she said, 'She was here the whole time. I just kept telling her to wait.'
Her body on the screen was the exact body that walked in that morning. Nothing about it had changed.
The only thing that lost fifteen pounds that day was the story she'd been carrying about herself.
You don't have to wait six years. You don't have to wait at all.`,
    caption:`She spent six years 'fifteen pounds away' — skipping the beach photos, hiding behind the camera at every party. Her body didn't change before her session. The story she told about it did. That's the whole thing. If you've been telling yourself to wait, the form's in my bio.

#southbendphotographer #boudoirphotography #michianawomen #worthiness #everybodyisbeautiful`
  },
  {
    n:"4", title:"Ask These 4 Questions", format:"The Prep List",
    cover:"covers/face-4.jpg",
    script:`Don't book a photoshoot with anyone until you've asked these four questions. Most women skip all four and regret it.
One: 'Do you do the hair and makeup, or am I on my own?' If you're doing your own, you'll spend the whole shoot worried about your face instead of being in front of the camera.
Two: 'How many outfits, and how long do I actually get?' Fifteen rushed minutes is not a session. You want time to relax into it.
Three: 'When do I see my photos?' If the answer is two to four weeks, ask why they can't get it right in the room. You'll see 130 of yours the same afternoon.
Four — and this is the one nobody asks: 'Have you photographed a woman who looks like me and felt like I feel right now?'
Because posing you is easy. Making you believe what you're seeing — that's the entire job.
Ask the four. The right photographer will love that you did.`,
    caption:`Before you book a shoot with anyone — ask these four questions. The first three are logistics. The fourth is the one nobody asks, and it's the one that decides whether you'll actually like your photos. Screenshot this. And when you're ready, the form's in my bio.

#southbendphotographer #boudoirphotography #michiana #photoshootprep #womenover40`
  },
  {
    n:"★", title:"3 Things Women Say After Booking", format:"BTS Overlay · text over you working", bts:true,
    cover:"covers/reel-5.jpg",
    screenTrial:`There are 3 things women say right after they book me. The third one is why I do this job — all three are in the caption.`,
    screenGrid:`I've heard the same 3 sentences from women the minute they book. One of them is probably already in your head — I put all three in the description 👇`,
    caption:`The 3 things women say right after they book:

1. "Okay — I can't believe I actually did that." (Half-laughing, half-terrified, usually out loud.)
2. "Don't let me chicken out." (I never do. That's part of the job.)
3. "It's about time I did something for me." — and that's the one that gets me every single time. Because it's never really about the photos. It's about a woman finally taking her own turn.

Eight hundred and fifty women. Same three sentences. If one of them just went through your head, that's not an accident. The form's in my bio.

#southbendphotographer #boudoirphotography #michianawomen #somethingforyou #womenover40`
  }
];

function copy(text, btn, label){
  const done = () => {
    btn.classList.add("copied");
    const prev = btn.dataset.label;
    btn.textContent = "Copied ✓";
    setTimeout(()=>{ btn.classList.remove("copied"); btn.textContent = prev; }, 1400);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallback(text,done));
  } else { fallback(text,done); }
}
function fallback(text, done){
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{document.execCommand("copy");}catch(e){}
  document.body.removeChild(ta); done();
}
// Build a File synchronously from a data URI (no await — keeps iOS "user gesture" alive for share)
function b64ToFile(dataUri, filename){
  const c=dataUri.indexOf(","), meta=dataUri.slice(0,c), b64=dataUri.slice(c+1);
  const mime=(meta.match(/data:(.*?);/)||[,"image/jpeg"])[1];
  const bin=atob(b64), arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new File([arr], filename, {type:mime});
}
function saveImg(dataUri, name){
  const slug=(name||"reel").replace(/[^a-z0-9]+/gi,"-").toLowerCase();
  let file=null;
  try{ file=b64ToFile(dataUri, slug+"-cover.jpg"); }catch(e){}
  // Primary: iOS share sheet → "Save Image" to Photos. Called synchronously in the tap.
  if(file && navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file]}).catch(err=>{ if(!err||err.name!=="AbortError") openFull(dataUri); });
    return;
  }
  openFull(dataUri);
}
// Fallback: blow the image up full-screen so a long-press gives Save to Photos
function openFull(dataUri){
  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;z-index:99;background:#0c1322;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;gap:12px";
  const tip=document.createElement("div");
  tip.style.cssText="color:#eef0f5;font-size:15px;text-align:center;line-height:1.4";
  tip.innerHTML="Press &amp; hold the image → <b>Save to Photos</b>.<br>Tap the dark area to close.";
  const img=document.createElement("img"); img.src=dataUri;
  img.style.cssText="max-width:100%;max-height:80vh;border-radius:10px";
  ov.appendChild(tip); ov.appendChild(img);
  ov.addEventListener("click",e=>{ if(e.target===ov) document.body.removeChild(ov); });
  document.body.appendChild(ov);
}

document.getElementById("date").textContent = DATE;

const host = document.getElementById("cards");
DATA.forEach(d=>{
  const card=document.createElement("div");
  card.className="card"+(d.bts?" bts":"");
  card.innerHTML = `<div class="rhead"><span class="rnum">${d.n}</span><span class="rtitle">${d.title}</span></div><span class="chip">${d.format}</span>`;
  // BTS reels carry TWO on-screen texts (Trial + Grid); everything else is script + caption
  let blocks;
  if(d.bts && d.screenTrial && d.screenGrid){
    blocks=[
      {lbl:"On-screen text — TRIAL reel", txt:d.screenTrial, btn:"Copy Trial Text"},
      {lbl:"On-screen text — GRID post", txt:d.screenGrid, btn:"Copy Grid Text"},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  } else {
    blocks=[
      {lbl:(d.bts?"On-screen text":"Script"), txt:d.script, btn:(d.bts?"Copy On-Screen Text":"Copy Script")},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  }
  blocks.forEach((b,i)=>{
    if(i>0){ const hr=document.createElement("hr"); hr.className="divider"; card.appendChild(hr); }
    const lbl=document.createElement("div"); lbl.className="lbl"; lbl.textContent=b.lbl; card.appendChild(lbl);
    const txt=document.createElement("div"); txt.className="text"+(b.cap?" cap":""); txt.textContent=b.txt; card.appendChild(txt);
    const btn=document.createElement("button"); btn.className="btn "+(b.cap?"ghost":"primary");
    btn.dataset.label=b.btn; btn.textContent=b.btn;
    btn.addEventListener("click", ()=>copy(b.txt, btn));
    card.appendChild(btn);
  });
  if(d.cover){
    const cl=document.createElement("div"); cl.className="lbl"; cl.style.marginTop="16px";
    cl.innerHTML="Cover — press &amp; hold → Save to Photos"; card.appendChild(cl);
    const img=document.createElement("img"); img.className="cardcover"; img.src=d.cover; img.alt=d.title+" cover";
    card.appendChild(img);
  }
  host.appendChild(card);
});
</script>

</body></html>
