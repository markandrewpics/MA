<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Daily Reel Scripts — Mark Andrew</title></head><body>
<style>
  :root{
    --navy:#0c1322; --navy2:#161d30; --card:#1a2340; --line:#2b3557;
    --gold:#ffbf8f; --gold-deep:#e0a878; --cream:#eef0f5; --muted:#94a0bb;
    --ok:#7fd1a6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:linear-gradient(178deg,#0c1322 0%,#161d30 60%,#131a2c 100%);
    color:var(--cream); -webkit-font-smoothing:antialiased;
    min-height:100vh; padding:22px 16px 60px;
  }
  .wrap{max-width:620px;margin:0 auto}
  .eyebrow{
    font-size:12px;letter-spacing:.32em;color:var(--gold-deep);
    text-transform:uppercase;font-weight:600;text-align:center;margin-bottom:8px;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;font-weight:600;
    font-size:34px;line-height:1.05;text-align:center;color:var(--cream);
    letter-spacing:.01em;text-wrap:balance;
  }
  .date{text-align:center;color:var(--muted);font-size:14px;margin-top:10px}
  .howto{
    text-align:center;color:var(--muted);font-size:13.5px;line-height:1.5;
    margin:14px auto 26px;max-width:440px;
  }
  .howto b{color:var(--cream);font-weight:600}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:20px 18px;margin-bottom:20px;
  }
  .card.bts{border-color:var(--gold-deep)}
  .rhead{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .rnum{
    font-family:Georgia,serif;font-size:26px;color:var(--gold);
    line-height:1;font-variant-numeric:tabular-nums;
  }
  .rtitle{font-family:Georgia,serif;font-size:21px;color:var(--cream);line-height:1.15}
  .chip{
    display:inline-block;margin:8px 0 16px;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--gold-deep);border:1px solid var(--line);
    border-radius:100px;padding:4px 11px;font-weight:600;
  }
  .lbl{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin:2px 0 8px;
  }
  .text{
    background:#111834;border:1px solid var(--line);border-radius:12px;
    padding:14px 15px;font-size:16px;line-height:1.62;color:#e7ebf6;
    white-space:pre-line;
  }
  .text.cap{color:#d2d9ec;font-size:15px}
  .btn{
    -webkit-appearance:none;appearance:none;border:none;cursor:pointer;
    width:100%;min-height:54px;border-radius:13px;margin:11px 0 4px;
    font-size:16px;font-weight:700;letter-spacing:.01em;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:transform .08s ease,background .2s ease,color .2s ease;
  }
  .btn:active{transform:scale(.985)}
  .btn.primary{background:var(--gold);color:#241608}
  .btn.ghost{background:transparent;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .btn.copied{background:var(--ok)!important;color:#0b2417!important;border-color:var(--ok)!important}
  .btn:focus-visible{outline:3px solid #6f8fe0;outline-offset:2px}
  .divider{height:1px;background:var(--line);border:none;margin:16px 0}
  img.cardcover{
    width:100%;max-width:250px;height:auto;display:block;margin:8px auto 0;
    border-radius:12px;border:1px solid var(--line);background:var(--navy);
  }
  .btn.save{background:#20304f;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .foot{text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;margin-top:30px}
  .foot b{color:var(--gold-deep)}
  @media (prefers-reduced-motion:reduce){.btn{transition:none}}
</style>

<div class="wrap">
  <div class="eyebrow">Mark Andrew Photography</div>
  <h1>Daily Reel Scripts</h1>
  <div class="date" id="date"></div>
  <p class="howto">Tap <b>Copy Script</b> → paste into your teleprompter. Tap <b>Copy Caption</b> → paste into Instagram. No selecting, no fighting your phone.</p>
  <div id="cards"></div>
  <p class="foot">Refreshes every morning at <b>5:30</b>. Add this page to your home screen so it opens like an app.<br>— Pickles</p>
</div>

<script>
const DATE = "Tuesday, July 14, 2026 — film any 2";
// Each DATA item may carry an optional `cover:"data:image/png;base64,..."` that the routine fills daily;
// it renders as a tap-to-save image directly under that reel's caption.
const DATA = [
  {
    "n": "1",
    "title": "No Such Thing As A Bad Side",
    "cover": "covers/face-1.jpg",
    "format": "Studio Rule · Ep. 8",
    "script": "I will not photograph your good side. You don't have a bad one — and I refuse to teach you that you do.\nEvery session, someone tips her chin and says, \"this is my good side, shoot me from here.\" And I get it. Somewhere along the way a bad photo, a bad angle, a bad ex convinced you half your face is a liability.\nHere's what's actually true. There's no bad side. There's bad light and lazy posing — and both of those are my job, not yours.\nThe second I start hunting for your \"good side,\" I've agreed with the lie that the rest of you needs hiding. I won't do it.\nSo we shoot all of you. Chin down, chin up, laughing, quiet, straight into the lens. And by the reveal you'll be pointing at the frames you swore you'd hate.\nYou didn't come here to be edited down to one safe angle. You came here to be seen — all the way around.\nThe form's in my bio when you're ready.",
    "caption": "'Shoot me from my good side' is the one request I turn down every single week. Not because I'm difficult — because there is no bad side, only bad light, and the light is my job. I photograph all of you, and you leave loving the frames you were sure you'd hate. Form's in my bio, South Bend.\n\n#southbendphotographer #boudoirphotography #michiana #womenover40 #selfworth"
  },
  {
    "n": "2",
    "title": "3 Weeks To Edit? They Missed It",
    "cover": "covers/face-2.jpg",
    "format": "Unpopular Opinion",
    "script": "Unpopular opinion: if your photographer needs three weeks to edit, they didn't get the shot.\nI'll make people mad with that one. Good.\nHere's the thing nobody says out loud. Weeks of editing is usually weeks of fixing — the light that was wrong, the pose that was off, the angle that didn't work. All the stuff that should've been handled in the room, while you were standing right there.\nI get it right when it happens. So there's nothing to rescue later.\nThat's why you see your photos the same afternoon. A hundred and thirty finished images, on a sixty-five-inch screen, hours after your last outfit — while most studios are still telling clients to hang tight for a month.\nFast isn't the flex. Fast is just what happens when the work was actually done in front of you, instead of behind a computer three weeks later.\nYou walk in nervous at nine. You're crying at your own photos by two.\nForm's in my bio.",
    "caption": "Three weeks to edit isn't craftsmanship — it's damage control for a shot that didn't land in the room. I light it, pose it, and nail it live, so you watch 130 finished images the same afternoon you shoot. That's the South Bend standard. Form's in my bio.\n\n#southbendphotographer #boudoirphotography #samedayreveal #michiana #luxuryportraits"
  },
  {
    "n": "3",
    "title": "Stop Apologizing For Your Stomach",
    "cover": "covers/face-3.jpg",
    "format": "Overheard in the Studio",
    "script": "The thing women apologize for most in my studio isn't being late. It's their stomach. And I've stopped letting them.\nIt happens almost every session. She'll get into the first pose, glance down, and go, \"sorry — ignore my stomach.\" Like it's a mess she tracked in on her shoes.\nSix out of ten women name their stomach as the thing they hate most. Six out of ten. That's not a coincidence — that's a script somebody handed them a long time ago.\nSo now, the first time it comes up, we stop. No apology accepted. Not because I'm being sweet — because I'm not photographing an apology. I'm photographing a woman.\nAnd every single time, by the reveal, that same stomach is in her favorite frame. The one she wants blown up on the wall.\nThe body was never the problem. The apology was.\nYou don't owe your own photos a disclaimer.\nForm's in my bio.",
    "caption": "Six out of ten women apologize for their stomach the second the first pose starts — like it's something they tracked in on their shoes. I've stopped accepting the apology, because I'm not here to photograph one. Every time, that same stomach ends up in her favorite frame. Form's in my bio, Michiana.\n\n#southbendphotographer #boudoirphotography #bodyconfidence #michiana #everybodyisworthy"
  },
  {
    "n": "4",
    "title": "The 15 Pounds Was Never It",
    "cover": "covers/face-4.jpg",
    "format": "The Waiting List",
    "script": "The fifteen pounds isn't the reason. It's the excuse that feels the most responsible.\nBecause \"I'll do it when I lose the weight\" sounds like discipline. It sounds like a woman with standards. Nobody argues with it — not even you.\nBut I've photographed more than 850 women, and I need to tell you something honest. Almost none of them lost the weight first. And not one of them, standing at the reveal, wished she had waited longer.\nThe fifteen pounds was never really about your body. It was permission — a number you gave yourself so you'd finally be allowed to take up space in your own life.\nHere's the truth the scale won't tell you: you don't have to earn this by shrinking. The woman you're waiting to become already deserves the photographs.\nIn thirty years you won't remember what you weighed this afternoon. You'll only wish you had proof of how you looked.\nStop waiting to be smaller to be seen.",
    "caption": "'When I lose the weight' is the most responsible-sounding excuse there is — which is exactly why it costs women years. In 850 sessions, almost no one lost it first, and no one ever wished she'd waited longer. You don't earn this by shrinking. When you're ready to stop waiting, the form's in my bio.\n\n#southbendphotographer #boudoir #bodyconfidence #michiana #everybodyisworthy"
  },
  {
    "n": "★",
    "title": "The Suitcase",
    "format": "BTS Overlay · Prep List",
    "bts": true,
    "screenTrial": "She showed up to her shoot with a full suitcase. She only needed it for one thing — and it's not what you'd pack. The whole list is in the caption.",
    "screenGrid": "The one thing I tell every woman to pack that has nothing to do with clothes. I put the full night-before list in the description 👇",
    "caption": "Here's the thing about the suitcase: she packed six outfits, three pairs of shoes, and a curling iron. She needed exactly one item in there — the pair of heels she almost left at home because they \"felt like too much.\"\nEverything else? I handle it. Hair and makeup is done here. Steaming, styling, and outfit order — mine. The set, the lighting, the posing — you never think about any of it.\nSo the real prep list is short:\n1. Bring the heels that feel like too much. Those are the right ones.\n2. Bring one thing that's just yours — the necklace, the ring, the perfume.\n3. Eat a real breakfast. It's a long, good day.\n4. Show up. That's the whole job.\nThe suitcase makes you feel ready. The truth is you already are.\n\n#southbendphotographer #boudoirphotography #michiana #photoshootprep #luxuryexperience"
  }
];

function copy(text, btn, label){
  const done = () => {
    btn.classList.add("copied");
    const prev = btn.dataset.label;
    btn.textContent = "Copied ✓";
    setTimeout(()=>{ btn.classList.remove("copied"); btn.textContent = prev; }, 1400);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallback(text,done));
  } else { fallback(text,done); }
}
function fallback(text, done){
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{document.execCommand("copy");}catch(e){}
  document.body.removeChild(ta); done();
}
// Build a File synchronously from a data URI (no await — keeps iOS "user gesture" alive for share)
function b64ToFile(dataUri, filename){
  const c=dataUri.indexOf(","), meta=dataUri.slice(0,c), b64=dataUri.slice(c+1);
  const mime=(meta.match(/data:(.*?);/)||[,"image/jpeg"])[1];
  const bin=atob(b64), arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new File([arr], filename, {type:mime});
}
function saveImg(dataUri, name){
  const slug=(name||"reel").replace(/[^a-z0-9]+/gi,"-").toLowerCase();
  let file=null;
  try{ file=b64ToFile(dataUri, slug+"-cover.jpg"); }catch(e){}
  // Primary: iOS share sheet → "Save Image" to Photos. Called synchronously in the tap.
  if(file && navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file]}).catch(err=>{ if(!err||err.name!=="AbortError") openFull(dataUri); });
    return;
  }
  openFull(dataUri);
}
// Fallback: blow the image up full-screen so a long-press gives Save to Photos
function openFull(dataUri){
  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;z-index:99;background:#0c1322;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;gap:12px";
  const tip=document.createElement("div");
  tip.style.cssText="color:#eef0f5;font-size:15px;text-align:center;line-height:1.4";
  tip.innerHTML="Press &amp; hold the image → <b>Save to Photos</b>.<br>Tap the dark area to close.";
  const img=document.createElement("img"); img.src=dataUri;
  img.style.cssText="max-width:100%;max-height:80vh;border-radius:10px";
  ov.appendChild(tip); ov.appendChild(img);
  ov.addEventListener("click",e=>{ if(e.target===ov) document.body.removeChild(ov); });
  document.body.appendChild(ov);
}

document.getElementById("date").textContent = DATE;

const host = document.getElementById("cards");
DATA.forEach(d=>{
  const card=document.createElement("div");
  card.className="card"+(d.bts?" bts":"");
  card.innerHTML = `<div class="rhead"><span class="rnum">${d.n}</span><span class="rtitle">${d.title}</span></div><span class="chip">${d.format}</span>`;
  // BTS reels carry TWO on-screen texts (Trial + Grid); everything else is script + caption
  let blocks;
  if(d.bts && d.screenTrial && d.screenGrid){
    blocks=[
      {lbl:"On-screen text — TRIAL reel", txt:d.screenTrial, btn:"Copy Trial Text"},
      {lbl:"On-screen text — GRID post", txt:d.screenGrid, btn:"Copy Grid Text"},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  } else {
    blocks=[
      {lbl:(d.bts?"On-screen text":"Script"), txt:d.script, btn:(d.bts?"Copy On-Screen Text":"Copy Script")},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  }
  blocks.forEach((b,i)=>{
    if(i>0){ const hr=document.createElement("hr"); hr.className="divider"; card.appendChild(hr); }
    const lbl=document.createElement("div"); lbl.className="lbl"; lbl.textContent=b.lbl; card.appendChild(lbl);
    const txt=document.createElement("div"); txt.className="text"+(b.cap?" cap":""); txt.textContent=b.txt; card.appendChild(txt);
    const btn=document.createElement("button"); btn.className="btn "+(b.cap?"ghost":"primary");
    btn.dataset.label=b.btn; btn.textContent=b.btn;
    btn.addEventListener("click", ()=>copy(b.txt, btn));
    card.appendChild(btn);
  });
  if(d.cover){
    const cl=document.createElement("div"); cl.className="lbl"; cl.style.marginTop="16px";
    cl.innerHTML="Cover — press &amp; hold → Save to Photos"; card.appendChild(cl);
    const img=document.createElement("img"); img.className="cardcover"; img.src=d.cover; img.alt=d.title+" cover";
    card.appendChild(img);
  }
  host.appendChild(card);
});
</script>

</body></html>
