<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Daily Reel Scripts — Mark Andrew</title></head><body>
<style>
  :root{
    --navy:#0c1322; --navy2:#161d30; --card:#1a2340; --line:#2b3557;
    --gold:#ffbf8f; --gold-deep:#e0a878; --cream:#eef0f5; --muted:#94a0bb;
    --ok:#7fd1a6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:linear-gradient(178deg,#0c1322 0%,#161d30 60%,#131a2c 100%);
    color:var(--cream); -webkit-font-smoothing:antialiased;
    min-height:100vh; padding:22px 16px 60px;
  }
  .wrap{max-width:620px;margin:0 auto}
  .eyebrow{
    font-size:12px;letter-spacing:.32em;color:var(--gold-deep);
    text-transform:uppercase;font-weight:600;text-align:center;margin-bottom:8px;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;font-weight:600;
    font-size:34px;line-height:1.05;text-align:center;color:var(--cream);
    letter-spacing:.01em;text-wrap:balance;
  }
  .date{text-align:center;color:var(--muted);font-size:14px;margin-top:10px}
  .howto{
    text-align:center;color:var(--muted);font-size:13.5px;line-height:1.5;
    margin:14px auto 26px;max-width:440px;
  }
  .howto b{color:var(--cream);font-weight:600}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:20px 18px;margin-bottom:20px;
  }
  .card.bts{border-color:var(--gold-deep)}
  .rhead{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .rnum{
    font-family:Georgia,serif;font-size:26px;color:var(--gold);
    line-height:1;font-variant-numeric:tabular-nums;
  }
  .rtitle{font-family:Georgia,serif;font-size:21px;color:var(--cream);line-height:1.15}
  .chip{
    display:inline-block;margin:8px 0 16px;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--gold-deep);border:1px solid var(--line);
    border-radius:100px;padding:4px 11px;font-weight:600;
  }
  .lbl{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin:2px 0 8px;
  }
  .text{
    background:#111834;border:1px solid var(--line);border-radius:12px;
    padding:14px 15px;font-size:16px;line-height:1.62;color:#e7ebf6;
    white-space:pre-line;
  }
  .text.cap{color:#d2d9ec;font-size:15px}
  .btn{
    -webkit-appearance:none;appearance:none;border:none;cursor:pointer;
    width:100%;min-height:54px;border-radius:13px;margin:11px 0 4px;
    font-size:16px;font-weight:700;letter-spacing:.01em;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:transform .08s ease,background .2s ease,color .2s ease;
  }
  .btn:active{transform:scale(.985)}
  .btn.primary{background:var(--gold);color:#241608}
  .btn.ghost{background:transparent;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .btn.copied{background:var(--ok)!important;color:#0b2417!important;border-color:var(--ok)!important}
  .btn:focus-visible{outline:3px solid #6f8fe0;outline-offset:2px}
  .divider{height:1px;background:var(--line);border:none;margin:16px 0}
  img.cardcover{
    width:100%;max-width:250px;height:auto;display:block;margin:8px auto 0;
    border-radius:12px;border:1px solid var(--line);background:var(--navy);
  }
  .btn.save{background:#20304f;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .foot{text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;margin-top:30px}
  .foot b{color:var(--gold-deep)}
  @media (prefers-reduced-motion:reduce){.btn{transition:none}}
</style>

<div class="wrap">
  <div class="eyebrow">Mark Andrew Photography</div>
  <h1>Daily Reel Scripts</h1>
  <div class="date" id="date"></div>
  <p class="howto">Tap <b>Copy Script</b> → paste into your teleprompter. Tap <b>Copy Caption</b> → paste into Instagram. No selecting, no fighting your phone.</p>
  <div id="cards"></div>
  <p class="foot">Refreshes every morning at <b>5:30</b>. Add this page to your home screen so it opens like an app.<br>— Pickles</p>
</div>

<script>
const DATE = "Saturday, July 11, 2026 — film any 2";
// Each DATA item may carry an optional `cover:"data:image/png;base64,..."` that the routine fills daily;
// it renders as a tap-to-save image directly under that reel's caption.
const DATA = [
  {
    "n": "1",
    "title": "Phones Live in a Drawer",
    "cover": "covers/face-1.jpg",
    "format": "Studio Rule · Ep. 7",
    "script": "Your phone goes in a drawer the second you sit in my makeup chair. Studio rule number seven — and it's the one nobody expects.\nHere's why. The woman I'm here to photograph doesn't show up while you're checking texts, answering your kid's school, refereeing whatever fire is burning at home. She shows up when the outside world can't reach you for a few hours.\nMost women haven't been unreachable since before they had children. That's not an exaggeration. Think about the last time your phone was in another room and you were genuinely fine with it.\nSo it goes in the drawer. No work, no group chat, no \"one quick thing.\" Just you, a mimosa, and someone telling you where to put your chin for the first time in years.\nYou booked a photoshoot. What you actually get is three hours of nobody being able to need you.\nThe phone comes back at lunch. She won't want it.",
    "caption": "Studio rule number seven: your phone goes in a drawer the second hair and makeup starts. Not to be difficult — to hand you the thing you actually came for. Three hours where nobody can reach you, nobody needs you, and the only voice in the room is telling you you're stunning. Most women in South Bend haven't had that since before the kids. When you're ready for yours, the form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #momsofmichiana #selfcare"
  },
  {
    "n": "2",
    "title": "The Same Four Words",
    "cover": "covers/face-2.jpg",
    "format": "Overheard in the Studio",
    "script": "850 women have stood in front of my camera. The same four words come out of almost every single one.\nNot \"make me look skinny.\" Not \"hide my arms.\" Those come up too, sure. But the four words I mean happen later — at the reveal, when she's watching herself on the big screen for the first time.\nShe goes quiet. Then, almost every time: \"Is that really me?\"\nIt's not a brag about the photos. It's genuine disbelief that the woman on the screen — the confident one, the one taking up the whole frame like she owns it — is her. The same her who apologized for her body three hours earlier.\nHere's what gets me. She didn't change in three hours. Nobody airbrushed her into a stranger. That was always what she looked like. She just never had anyone build the photo to show it.\n\"Is that really me.\" Yes. It was the whole time. You just hadn't met her yet.",
    "caption": "850 women. The same four words at almost every reveal: \"Is that really me?\" She didn't change in three hours. Nobody Facetuned her into someone else. That confident woman on the screen was always there — she'd just never had a photographer build the picture to show her. If you've never really met her, that's what this afternoon is for. Form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #samedayreveal #confidence"
  },
  {
    "n": "3",
    "title": "Choosing Herself Felt Selfish",
    "cover": "covers/face-3.jpg",
    "format": "The Waiting List",
    "script": "Booking the shoot wasn't vanity. It was the first time in years she chose herself on purpose.\nShe told me that on the couch, at the reveal, halfway through crying. Not about the pictures. About the decision.\nFor a decade every yes she'd said was for someone else. Yes to the extra shift. Yes to hosting. Yes to the thing nobody else volunteered for. She was good at it. She was so good at it that she'd disappeared into it.\nAnd the first time she put something on the calendar that was only for her — no one else benefiting, no one to please, no box being checked for anybody but herself — it felt selfish. It felt wrong. Right up until it didn't.\nThat's the part no one warns you about. The hardest thing about this isn't the camera. It's letting yourself be the point for one afternoon.\nShe wasn't nervous about the photos. She was out of practice choosing herself.\nYou can practice today.",
    "caption": "She said the hardest part wasn't the camera. It was letting herself be the point for one afternoon. For years, every yes she gave belonged to someone else — the extra shift, the hosting, the thing nobody else would do. Putting one thing on the calendar just for her felt selfish, right up until it didn't. If you're out of practice choosing yourself, this is a good place to start. The form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #selflove #womenover40"
  },
  {
    "n": "4",
    "title": "You're Not Unphotogenic",
    "cover": "covers/face-4.jpg",
    "format": "Unpopular Opinion",
    "script": "Unpopular opinion: perfectionism is why you hate every photo of yourself. Not your face.\nI've photographed 850 women. The ones who swear they \"aren't photogenic\" all have the same thing in common, and it's not their nose or their arms or their age.\nIt's that they've never once looked at a photo of themselves for what it is. They scan it for the flaw. The double chin, the crease, the pound. They find it in half a second, because they've had decades of practice hunting it.\nSo of course you hate the photos. You've never actually looked at yourself — you've inspected yourself. Two completely different things.\nWhen a woman finally sees a picture where the light, the pose, and the angle were all built for her, something breaks. She runs out of flaws to land on. And for one second she just… sees a beautiful woman.\nThat reaction is the whole job. The photo is only the excuse.\nYou're not unphotogenic. You're just an expert at the wrong thing.",
    "caption": "Unpopular opinion: perfectionism is why you hate every photo of yourself — not your face. After 850 women, the ones who swear they're \"not photogenic\" all share one habit: they don't look at a photo, they inspect it for the flaw. Decades of practice hunting it. Give a woman one picture where the light and posing were actually built for her and she runs out of flaws to find. That reaction is the whole point. Form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #bodyconfidence #photogenic"
  },
  {
    "n": "★",
    "title": "The Night-Before Checklist",
    "format": "BTS Overlay · Prep List",
    "screenTrial": "The night-before checklist I give every client. Four things — and the last one has nothing to do with how you look. It's all in the caption.",
    "screenGrid": "You've booked. Here's exactly what to do the night before so shoot day feels easy — the full checklist is in the description 👇",
    "caption": "The night-before checklist, for real:\n\n1. Salt. Skip the salty dinner and the wine — both hold water and you'll feel it in the morning. Water instead.\n2. Sleep. Lay your outfits out tonight so the morning is calm, not a scramble. Rested beats rushed every time.\n3. Skin. Nothing new. No new products, no \"let me finally try this mask.\" Day-of is not the day to experiment.\n4. The one that isn't about how you look: decide, tonight, that tomorrow you're not going to apologize. Not for your body, not for taking the day, not for any of it. You already booked — the bravest part is behind you.\n\nScreenshot it. That's the whole list. The form's in my bio when you're ready for your day.\n\n#southbendphotographer #boudoirphotography #michiana #photoshootprep #selfcare",
    "bts": true
  }
];

function copy(text, btn, label){
  const done = () => {
    btn.classList.add("copied");
    const prev = btn.dataset.label;
    btn.textContent = "Copied ✓";
    setTimeout(()=>{ btn.classList.remove("copied"); btn.textContent = prev; }, 1400);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallback(text,done));
  } else { fallback(text,done); }
}
function fallback(text, done){
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{document.execCommand("copy");}catch(e){}
  document.body.removeChild(ta); done();
}
// Build a File synchronously from a data URI (no await — keeps iOS "user gesture" alive for share)
function b64ToFile(dataUri, filename){
  const c=dataUri.indexOf(","), meta=dataUri.slice(0,c), b64=dataUri.slice(c+1);
  const mime=(meta.match(/data:(.*?);/)||[,"image/jpeg"])[1];
  const bin=atob(b64), arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new File([arr], filename, {type:mime});
}
function saveImg(dataUri, name){
  const slug=(name||"reel").replace(/[^a-z0-9]+/gi,"-").toLowerCase();
  let file=null;
  try{ file=b64ToFile(dataUri, slug+"-cover.jpg"); }catch(e){}
  // Primary: iOS share sheet → "Save Image" to Photos. Called synchronously in the tap.
  if(file && navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file]}).catch(err=>{ if(!err||err.name!=="AbortError") openFull(dataUri); });
    return;
  }
  openFull(dataUri);
}
// Fallback: blow the image up full-screen so a long-press gives Save to Photos
function openFull(dataUri){
  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;z-index:99;background:#0c1322;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;gap:12px";
  const tip=document.createElement("div");
  tip.style.cssText="color:#eef0f5;font-size:15px;text-align:center;line-height:1.4";
  tip.innerHTML="Press &amp; hold the image → <b>Save to Photos</b>.<br>Tap the dark area to close.";
  const img=document.createElement("img"); img.src=dataUri;
  img.style.cssText="max-width:100%;max-height:80vh;border-radius:10px";
  ov.appendChild(tip); ov.appendChild(img);
  ov.addEventListener("click",e=>{ if(e.target===ov) document.body.removeChild(ov); });
  document.body.appendChild(ov);
}

document.getElementById("date").textContent = DATE;

const host = document.getElementById("cards");
DATA.forEach(d=>{
  const card=document.createElement("div");
  card.className="card"+(d.bts?" bts":"");
  card.innerHTML = `<div class="rhead"><span class="rnum">${d.n}</span><span class="rtitle">${d.title}</span></div><span class="chip">${d.format}</span>`;
  // BTS reels carry TWO on-screen texts (Trial + Grid); everything else is script + caption
  let blocks;
  if(d.bts && d.screenTrial && d.screenGrid){
    blocks=[
      {lbl:"On-screen text — TRIAL reel", txt:d.screenTrial, btn:"Copy Trial Text"},
      {lbl:"On-screen text — GRID post", txt:d.screenGrid, btn:"Copy Grid Text"},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  } else {
    blocks=[
      {lbl:(d.bts?"On-screen text":"Script"), txt:d.script, btn:(d.bts?"Copy On-Screen Text":"Copy Script")},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  }
  blocks.forEach((b,i)=>{
    if(i>0){ const hr=document.createElement("hr"); hr.className="divider"; card.appendChild(hr); }
    const lbl=document.createElement("div"); lbl.className="lbl"; lbl.textContent=b.lbl; card.appendChild(lbl);
    const txt=document.createElement("div"); txt.className="text"+(b.cap?" cap":""); txt.textContent=b.txt; card.appendChild(txt);
    const btn=document.createElement("button"); btn.className="btn "+(b.cap?"ghost":"primary");
    btn.dataset.label=b.btn; btn.textContent=b.btn;
    btn.addEventListener("click", ()=>copy(b.txt, btn));
    card.appendChild(btn);
  });
  if(d.cover){
    const cl=document.createElement("div"); cl.className="lbl"; cl.style.marginTop="16px";
    cl.innerHTML="Cover — press &amp; hold → Save to Photos"; card.appendChild(cl);
    const img=document.createElement("img"); img.className="cardcover"; img.src=d.cover; img.alt=d.title+" cover";
    card.appendChild(img);
  }
  host.appendChild(card);
});
</script>

</body></html>
