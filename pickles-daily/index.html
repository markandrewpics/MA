<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Daily Reel Scripts — Pickles</title>
</head>
<body>
<style>
  :root{
    --navy:#0c1322; --navy2:#161d30; --card:#1a2340; --line:#2b3557;
    --gold:#ffbf8f; --gold-deep:#e0a878; --cream:#eef0f5; --muted:#94a0bb;
    --ok:#7fd1a6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:linear-gradient(178deg,#0c1322 0%,#161d30 60%,#131a2c 100%);
    color:var(--cream); -webkit-font-smoothing:antialiased;
    min-height:100vh; padding:22px 16px 60px;
  }
  .wrap{max-width:620px;margin:0 auto}
  .eyebrow{
    font-size:12px;letter-spacing:.32em;color:var(--gold-deep);
    text-transform:uppercase;font-weight:600;text-align:center;margin-bottom:8px;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;font-weight:600;
    font-size:34px;line-height:1.05;text-align:center;color:var(--cream);
    letter-spacing:.01em;text-wrap:balance;
  }
  .date{text-align:center;color:var(--muted);font-size:14px;margin-top:10px}
  .howto{
    text-align:center;color:var(--muted);font-size:13.5px;line-height:1.5;
    margin:14px auto 26px;max-width:440px;
  }
  .howto b{color:var(--cream);font-weight:600}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:20px 18px;margin-bottom:20px;
  }
  .card.bts{border-color:var(--gold-deep)}
  .rhead{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .rnum{
    font-family:Georgia,serif;font-size:26px;color:var(--gold);
    line-height:1;font-variant-numeric:tabular-nums;
  }
  .rtitle{font-family:Georgia,serif;font-size:21px;color:var(--cream);line-height:1.15}
  .chip{
    display:inline-block;margin:8px 0 16px;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--gold-deep);border:1px solid var(--line);
    border-radius:100px;padding:4px 11px;font-weight:600;
  }
  .lbl{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin:2px 0 8px;
  }
  .text{
    background:#111834;border:1px solid var(--line);border-radius:12px;
    padding:14px 15px;font-size:16px;line-height:1.62;color:#e7ebf6;
    white-space:pre-line;
  }
  .text.cap{color:#d2d9ec;font-size:15px}
  .btn{
    -webkit-appearance:none;appearance:none;border:none;cursor:pointer;
    width:100%;min-height:54px;border-radius:13px;margin:11px 0 4px;
    font-size:16px;font-weight:700;letter-spacing:.01em;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:transform .08s ease,background .2s ease,color .2s ease;
  }
  .btn:active{transform:scale(.985)}
  .btn.primary{background:var(--gold);color:#241608}
  .btn.ghost{background:transparent;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .btn.copied{background:var(--ok)!important;color:#0b2417!important;border-color:var(--ok)!important}
  .btn:focus-visible{outline:3px solid #6f8fe0;outline-offset:2px}
  .divider{height:1px;background:var(--line);border:none;margin:16px 0}
  img.cardcover{
    width:100%;max-width:250px;height:auto;display:block;margin:8px auto 0;
    border-radius:12px;border:1px solid var(--line);background:var(--navy);
  }
  .btn.save{background:#20304f;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .foot{text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;margin-top:30px}
  .foot b{color:var(--gold-deep)}
  @media (prefers-reduced-motion:reduce){.btn{transition:none}}
</style>

<div class="wrap">
  <div class="eyebrow">Mark Andrew Photography</div>
  <h1>Daily Reel Scripts</h1>
  <div class="date" id="date"></div>
  <p class="howto">Tap <b>Copy Script</b> → paste into your teleprompter. Tap <b>Copy Caption</b> → paste into Instagram. No selecting, no fighting your phone.</p>
  <div id="cards"></div>
  <p class="foot">Refreshes every morning at <b>5:30</b>. Add this page to your home screen so it opens like an app.<br>— Pickles</p>
</div>

<script>
const DATE = "Wednesday, July 8, 2026 — film any 2. Script first, caption underneath.";
// Each DATA item may carry an optional `cover:"data:image/png;base64,..."` that the routine fills daily;
// it renders as a tap-to-save image directly under that reel's caption.
const DATA = [
  {
    n:"1",
    title:"Three People, One Reason",
    format:"Studio Rule \u00b7 Ep. 4",
    script:"I've kicked exactly three people out of my studio in 850 sessions. All for the same reason.\nNot the client. Never the client. It was the person she brought with her.\nStudio rule number four: if you make my client feel smaller, you're gone. I don't care if you're her husband, her mother, or her best friend since third grade.\nBecause here's what I've watched happen. A woman finally books the thing she's wanted for ten years. She's nervous, she's brave, she's standing in front of my camera \u2014 and one comment from the couch undoes all of it. One little \"are you really wearing that.\" One eye-roll.\nI built this studio to be the one room in her life where nobody gets to do that to her.\nSo the three people who tried? Coffee shop down the street. Every time.\nMy job is to protect the woman in front of the lens. Even from the people who love her.",
    caption:"Three people in 850 sessions. Every one of them made my client feel smaller \u2014 so every one of them got walked to the door. This room has exactly one rule that matters: she is safe here. When you're ready to feel that, the form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #womenover40 #selfworth",
    cover:"covers/face-1.jpg"
  },
  {
    n:"2",
    title:"Don't Make Me Look Sexy",
    format:"Overheard in the Studio",
    script:"\"Don't make me look sexy.\" Ma'am, that is the one thing I cannot prevent.\nI hear it almost every week. She sits down in the makeup chair, gets nervous, and out it comes \u2014 \"just don't make me look, you know\u2026 like that.\"\nAnd I get it. She's spent her whole life being told confidence is arrogance. That taking up space is too much.\nBut here's what actually happens by the third outfit. She stops asking me not to. She catches herself in the monitor and goes quiet. Then she says the other sentence I hear every week \u2014 \"I didn't know I could look like that.\"\nThat's not sexy. That's not a costume. That's just her, without twenty years of apologizing stacked on top.\nI'm not making anybody into anything. I'm getting the apologizing to sit down and be quiet long enough for the camera to see who was there the whole time.",
    caption:"\"Don't make me look sexy\" is one of the most common things women say in my chair \u2014 usually right before they realize the woman in the monitor was never a costume. She was just her, without the apologizing. The form's in my bio when you're ready to meet her.\n\n#southbendphotographer #boudoirphotography #michiana #confidence #selflove",
    cover:"covers/face-2.jpg"
  },
  {
    n:"3",
    title:"Confidence Peaks After 40",
    format:"Unpopular Opinion",
    script:"Unpopular opinion: a woman's confidence doesn't peak at twenty-five. It peaks somewhere between forty and sixty. And the research actually backs me up.\nSelf-esteem climbs for most of adult life and tops out in your fifties. Psychologists have measured it. I just get to photograph it.\nBecause the twenty-five-year-old in my studio is still asking me if she looks okay. The fifty-two-year-old walks in, looks at the set, and goes \"oh, we're going to have fun today.\"\nOne of them is performing. The other one has stopped auditioning for a life she already has.\nThe culture sells you the opposite. It tells you the clock is running out and beauty is behind you. That's not wisdom \u2014 that's a business model, and you've been the customer.\nThe women who book me at fifty aren't chasing twenty-five. They're done pretending they peaked there. And it shows in every single frame.",
    caption:"Unpopular opinion backed by actual research: self-esteem peaks in your 40s and 50s, not your 20s. I've watched it through my lens 850 times. The woman who's done auditioning photographs completely differently than the one still asking if she's enough. The form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #womenover40 #confidence",
    cover:"covers/face-3.jpg"
  },
  {
    n:"4",
    title:"You're Already The Type",
    format:"The Waiting List",
    script:"Every woman is the type. Right now, today. Not fifteen pounds from now.\nI need you to hear this, because I know what you're doing. You saw a photo like this and something in you leaned in \u2014 and then the second voice showed up. Not you. Not now. Maybe when things settle down.\nThings don't settle down. I've been doing this long enough to promise you that. The kids get older, the calendar gets fuller, and the woman who keeps waiting for the right time just collects more years of not being in a single photograph.\nYou are not too old. You are not too much. You are not too far from some finish line that was never real.\nThe right time was always going to be a decision, not a date on the calendar.\nSo make it. Not because you're ready. Because you're worth it before you feel ready.\nThat's the whole secret. There was never a list. You were always on it.",
    caption:"There's no version of you that's more \"ready\" waiting fifteen pounds or five years from now. The right time was never a date \u2014 it was a decision. You've been on the list the whole time. When you're done waiting, the form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #selfworth #everybodyisworthy",
    cover:"covers/face-4.jpg"
  },
  {
    n:"\u2605",
    title:"Just Show Up",
    format:"BTS Overlay \u00b7 text over you working",
    script:"Your only job before a shoot: show up. I handle the other 47 things.",
    caption:"People think prepping for a session is a whole project. Here's the actual list: show up. That's it.\nHair and makeup \u2014 handled here. Outfits \u2014 we planned them on your consult. Posing \u2014 I direct every finger, chin, and shoulder, so you never wonder what to do with your hands. The set, the lighting, the fur, the jewelry \u2014 my job.\nThe women who stress for two weeks beforehand always say the same thing afterward: \"that was so much easier than I built it up to be.\"\nYour only assignment is to walk in and let it happen. The form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #whattoexpect #selfcare",
    cover:"covers/reel-5.jpg",
    bts:true
  }
];

function copy(text, btn, label){
  const done = () => {
    btn.classList.add("copied");
    const prev = btn.dataset.label;
    btn.textContent = "Copied ✓";
    setTimeout(()=>{ btn.classList.remove("copied"); btn.textContent = prev; }, 1400);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallback(text,done));
  } else { fallback(text,done); }
}
function fallback(text, done){
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{document.execCommand("copy");}catch(e){}
  document.body.removeChild(ta); done();
}
// Build a File synchronously from a data URI (no await — keeps iOS "user gesture" alive for share)
function b64ToFile(dataUri, filename){
  const c=dataUri.indexOf(","), meta=dataUri.slice(0,c), b64=dataUri.slice(c+1);
  const mime=(meta.match(/data:(.*?);/)||[,"image/jpeg"])[1];
  const bin=atob(b64), arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new File([arr], filename, {type:mime});
}
function saveImg(dataUri, name){
  const slug=(name||"reel").replace(/[^a-z0-9]+/gi,"-").toLowerCase();
  let file=null;
  try{ file=b64ToFile(dataUri, slug+"-cover.jpg"); }catch(e){}
  // Primary: iOS share sheet → "Save Image" to Photos. Called synchronously in the tap.
  if(file && navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file]}).catch(err=>{ if(!err||err.name!=="AbortError") openFull(dataUri); });
    return;
  }
  openFull(dataUri);
}
// Fallback: blow the image up full-screen so a long-press gives Save to Photos
function openFull(dataUri){
  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;z-index:99;background:#0c1322;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;gap:12px";
  const tip=document.createElement("div");
  tip.style.cssText="color:#eef0f5;font-size:15px;text-align:center;line-height:1.4";
  tip.innerHTML="Press &amp; hold the image → <b>Save to Photos</b>.<br>Tap the dark area to close.";
  const img=document.createElement("img"); img.src=dataUri;
  img.style.cssText="max-width:100%;max-height:80vh;border-radius:10px";
  ov.appendChild(tip); ov.appendChild(img);
  ov.addEventListener("click",e=>{ if(e.target===ov) document.body.removeChild(ov); });
  document.body.appendChild(ov);
}

document.getElementById("date").textContent = DATE;

const host = document.getElementById("cards");
DATA.forEach(d=>{
  const card=document.createElement("div");
  card.className="card"+(d.bts?" bts":"");
  const scriptLbl = d.bts ? "On-screen text" : "Script";
  const scriptBtn = d.bts ? "Copy On-Screen Text" : "Copy Script";
  card.innerHTML = `
    <div class="rhead"><span class="rnum">${d.n}</span><span class="rtitle">${d.title}</span></div>
    <span class="chip">${d.format}</span>
    <div class="lbl">${scriptLbl}</div>
    <div class="text"></div>
    <button class="btn primary" data-label="${scriptBtn}">${scriptBtn}</button>
    <hr class="divider">
    <div class="lbl">Caption</div>
    <div class="text cap"></div>
    <button class="btn ghost" data-label="Copy Caption">Copy Caption</button>
    ${d.cover ? `<div class="lbl" style="margin-top:16px">Cover — press &amp; hold → Save to Photos</div><img class="cardcover" src="${d.cover}" alt="${d.title} cover">` : ""}
  `;
  card.querySelectorAll(".text")[0].textContent = d.script;
  card.querySelectorAll(".text")[1].textContent = d.caption;
  card.querySelector(".btn.primary").addEventListener("click", e=>copy(d.script, e.currentTarget));
  card.querySelector(".btn.ghost").addEventListener("click", e=>copy(d.caption, e.currentTarget));
  const saveBtn = card.querySelector(".btn.save");
  if(saveBtn) saveBtn.addEventListener("click", ()=>saveImg(d.cover, d.title, saveBtn));
  host.appendChild(card);
});
</script>

</body>
</html>
