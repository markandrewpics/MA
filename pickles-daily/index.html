<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Daily Reel Scripts — Mark Andrew</title></head><body>
<style>
  :root{
    --navy:#0c1322; --navy2:#161d30; --card:#1a2340; --line:#2b3557;
    --gold:#ffbf8f; --gold-deep:#e0a878; --cream:#eef0f5; --muted:#94a0bb;
    --ok:#7fd1a6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:linear-gradient(178deg,#0c1322 0%,#161d30 60%,#131a2c 100%);
    color:var(--cream); -webkit-font-smoothing:antialiased;
    min-height:100vh; padding:22px 16px 60px;
  }
  .wrap{max-width:620px;margin:0 auto}
  .eyebrow{
    font-size:12px;letter-spacing:.32em;color:var(--gold-deep);
    text-transform:uppercase;font-weight:600;text-align:center;margin-bottom:8px;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;font-weight:600;
    font-size:34px;line-height:1.05;text-align:center;color:var(--cream);
    letter-spacing:.01em;text-wrap:balance;
  }
  .date{text-align:center;color:var(--muted);font-size:14px;margin-top:10px}
  .howto{
    text-align:center;color:var(--muted);font-size:13.5px;line-height:1.5;
    margin:14px auto 26px;max-width:440px;
  }
  .howto b{color:var(--cream);font-weight:600}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:20px 18px;margin-bottom:20px;
  }
  .card.bts{border-color:var(--gold-deep)}
  .rhead{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .rnum{
    font-family:Georgia,serif;font-size:26px;color:var(--gold);
    line-height:1;font-variant-numeric:tabular-nums;
  }
  .rtitle{font-family:Georgia,serif;font-size:21px;color:var(--cream);line-height:1.15}
  .chip{
    display:inline-block;margin:8px 0 16px;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--gold-deep);border:1px solid var(--line);
    border-radius:100px;padding:4px 11px;font-weight:600;
  }
  .lbl{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin:2px 0 8px;
  }
  .text{
    background:#111834;border:1px solid var(--line);border-radius:12px;
    padding:14px 15px;font-size:16px;line-height:1.62;color:#e7ebf6;
    white-space:pre-line;
  }
  .text.cap{color:#d2d9ec;font-size:15px}
  .btn{
    -webkit-appearance:none;appearance:none;border:none;cursor:pointer;
    width:100%;min-height:54px;border-radius:13px;margin:11px 0 4px;
    font-size:16px;font-weight:700;letter-spacing:.01em;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:transform .08s ease,background .2s ease,color .2s ease;
  }
  .btn:active{transform:scale(.985)}
  .btn.primary{background:var(--gold);color:#241608}
  .btn.ghost{background:transparent;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .btn.copied{background:var(--ok)!important;color:#0b2417!important;border-color:var(--ok)!important}
  .btn:focus-visible{outline:3px solid #6f8fe0;outline-offset:2px}
  .divider{height:1px;background:var(--line);border:none;margin:16px 0}
  img.cardcover{
    width:100%;max-width:250px;height:auto;display:block;margin:8px auto 0;
    border-radius:12px;border:1px solid var(--line);background:var(--navy);
  }
  .btn.save{background:#20304f;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .foot{text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;margin-top:30px}
  .foot b{color:var(--gold-deep)}
  @media (prefers-reduced-motion:reduce){.btn{transition:none}}
</style>

<div class="wrap">
  <div class="eyebrow">Mark Andrew Photography</div>
  <h1>Daily Reel Scripts</h1>
  <div class="date" id="date"></div>
  <p class="howto">Tap <b>Copy Script</b> → paste into your teleprompter. Tap <b>Copy Caption</b> → paste into Instagram. No selecting, no fighting your phone.</p>
  <div id="cards"></div>
  <p class="foot">Refreshes every morning at <b>5:30</b>. Add this page to your home screen so it opens like an app.<br>— Pickles</p>
</div>

<script>
const DATE = "Sunday, July 20, 2026 — film any 2. Script first, caption underneath.";
// Each DATA item may carry an optional `cover:"data:image/png;base64,..."` that the routine fills daily;
// it renders as a tap-to-save image directly under that reel's caption.
const DATA = [
  {
    "n": "1",
    "title": "The Proof You Lived",
    "format": "Unpopular Opinion",
    "cover": "covers/face-1.jpg",
    "script": "The freckles, the laugh lines, the soft part of your stomach — that's the photograph. Not the thing I'm supposed to erase.\nUnpopular opinion: airbrushing a woman into someone smoother didn't make the photo better. It made it a lie you paid me for.\nI've photographed over 850 women, and not one of them has ever cried at the reveal because I turned her into a stranger. They cry because for the first time they see themselves — really themselves — and it's beautiful.\nThe laugh lines are proof you laughed. The scar is proof you healed. The stomach that carried your kids or carried you through a brutal year — that's not a flaw to retouch. That's a life. I'm not going to paint over it.\nRetouch you into somebody you're not, and in thirty years your granddaughter looks at that photo and never actually meets you.\nI photograph the woman who's here. She's already enough.",
    "caption": "Unpopular opinion: airbrushing you into a smoother, thinner, younger stranger isn't editing. It's a lie you paid for.\nThe freckles, the laugh lines, the soft stomach that carried your kids or carried you through a brutal year — that's not a flaw list. That's the photograph. I've shot 850+ women here and never once made someone cry by turning her into somebody else. They cry because they finally see themselves. Retouch her out and in 30 years your granddaughter never actually meets you.\nYou're already enough. The form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #bodyconfidence #everybodyisworthy"
  },
  {
    "n": "2",
    "title": "There She Is",
    "format": "Overheard · A True Story",
    "cover": "covers/face-2.jpg",
    "script": "A woman booked a session three days after her divorce was final. She told me at the door, \"I'm not here to feel sexy. I'm here to remember I still exist.\"\nFor the first hour she apologized for her body constantly. Sucked in. Called her arms \"the problem.\" Looked at the floor between every pose.\nI didn't argue with her. I just kept shooting, kept directing, kept showing her small things on the screen.\nSomewhere around noon, something shifted. She stopped hiding. Her shoulders dropped. She started moving like the room belonged to her.\nAt the reveal that afternoon she went completely silent. Just stared at the screen. And then she whispered it — three times, quieter each time. \"There she is. There she is. There she is.\"\nShe didn't lose a pound between nine a.m. and three p.m. She just met the woman the last few years had convinced her was gone.\nThat's the whole job. I don't make you someone new. I hand you back the one you misplaced.",
    "caption": "She booked three days after her divorce was final. \"I'm not here to feel sexy — I'm here to remember I still exist.\"\nShe apologized for her body the entire first hour. By the reveal she was silent, staring at the screen, whispering three words: there she is. She didn't lose a pound between 9am and 3pm — she just met the woman the last few years told her was gone. That's the whole job. I don't make you someone new; I hand you back the one you misplaced. Michiana, when you're ready, the form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #divorcerecovery #selfworth"
  },
  {
    "n": "3",
    "title": "“No” Is a Complete Sentence",
    "format": "Studio Rule · Ep. 13",
    "cover": "covers/face-3.jpg",
    "script": "I ask before I move a single strand of your hair. Every pose, every adjustment, I ask first. Studio rule.\nConsent in my studio isn't a form you signed once at the door and forgot about. It's the entire session. Start to finish.\nIf I want to tuck a strap or turn your chin, you hear me ask — and \"no\" is a complete sentence in this room. You never have to explain it.\nHere's why that matters more than people think: a woman can't relax into being photographed if some part of her is bracing for a hand she didn't see coming. The nerves you walked in with don't melt because I told you to trust me. They melt because you learn, minute by minute, that you're the one in charge of this room.\nThe best photos of you don't come from control. They come from safety.\nYou set the terms. I just make sure the camera's ready when you do.",
    "caption": "Studio rule: I ask before I move a single strand of your hair. Every pose, every adjustment — and \"no\" is a complete sentence in this room.\nConsent here isn't a form you sign once at the door. It's the entire session. A woman can't relax into the camera while part of her is bracing for a hand she didn't see coming. The nerves don't melt because I said \"trust me\" — they melt because minute by minute you learn you're the one running this room. The best photos don't come from control. They come from safety. Form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #safespace #womenover40"
  },
  {
    "n": "4",
    "title": "You Already Earned It",
    "format": "The Waiting List",
    "cover": "covers/face-4.jpg",
    "script": "You keep saying you'll do this once you've earned it. After the weight. After the promotion. After you've fixed whatever you've decided is broken.\nYou already earned it.\nYou survived the year that should have flattened you and you're still standing here, still showing up for everyone. That was the milestone. Nobody threw you a party for it. Nobody handed you a photo to remember it by.\nI've photographed over 850 women, and the ones who wait for permission wait forever — because the permission was never coming from a scale or a calendar. It only ever comes from you.\nSo stop treating your own life like a reward you haven't unlocked yet. You're not a before picture. You're not a work in progress that has to be finished before it's allowed to be seen.\nThe woman who made it through is the one who deserves the photographs. She's standing in your mirror tonight.\nBook it for her.",
    "caption": "You keep saying you'll do this once you've earned it. You already earned it.\nYou survived the year that should have flattened you and you're still showing up for everyone. That was the milestone — nobody threw you a party, nobody handed you a photo to remember it by. 850+ women later, I can tell you the ones who wait for permission wait forever, because it was never coming from a scale or a calendar. You're not a before picture. The woman who made it through is the one who deserves the photographs, and she's in your mirror tonight. Book it for her — form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #selfworth #womenover40"
  },
  {
    "n": "★",
    "title": "The Prep That Backfires",
    "format": "BTS Overlay · Prep List",
    "bts": true,
    "cover": "covers/reel-5.jpg",
    "screenTrial": "There's one popular skincare “prep” that quietly wrecks women's photos — and almost everyone does it the week of. What to do instead is in the caption 👇",
    "screenGrid": "My clients get a prep list before every session. The #1 rule on it is the opposite of what you'd guess — I put the whole thing in the description 👇",
    "caption": "Here's the prep nobody warns you about: do NOT book a facial the week of your shoot.\nI know it feels like the responsible move. It's the one that backfires. A fresh facial pulls everything to the surface — congestion, redness, the little bumps you didn't know were coming — and they show up right when the camera does. Any esthetician will tell you the same thing: skin needs time to settle.\nWhat actually works:\n— Dermaplane about 7 days out. Smooth skin, makeup sits like glass, fully healed by shoot day.\n— Wax or shave 2 days out, never the morning of — strap and razor marks need time to fade.\n— Drink water like it's your job. Hydrated skin photographs better than any product.\n— Skip the brand-new product you've \"been meaning to try.\" Shoot week is not the week to find out you're allergic.\nScreenshot it. Your future self on my couch at the reveal will thank you. Form's in my bio when you're ready.\n\n#southbendphotographer #boudoirphotography #michiana #photoshootprep #skinprep"
  }
];

function copy(text, btn, label){
  const done = () => {
    btn.classList.add("copied");
    const prev = btn.dataset.label;
    btn.textContent = "Copied ✓";
    setTimeout(()=>{ btn.classList.remove("copied"); btn.textContent = prev; }, 1400);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallback(text,done));
  } else { fallback(text,done); }
}
function fallback(text, done){
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{document.execCommand("copy");}catch(e){}
  document.body.removeChild(ta); done();
}
// Build a File synchronously from a data URI (no await — keeps iOS "user gesture" alive for share)
function b64ToFile(dataUri, filename){
  const c=dataUri.indexOf(","), meta=dataUri.slice(0,c), b64=dataUri.slice(c+1);
  const mime=(meta.match(/data:(.*?);/)||[,"image/jpeg"])[1];
  const bin=atob(b64), arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new File([arr], filename, {type:mime});
}
function saveImg(dataUri, name){
  const slug=(name||"reel").replace(/[^a-z0-9]+/gi,"-").toLowerCase();
  let file=null;
  try{ file=b64ToFile(dataUri, slug+"-cover.jpg"); }catch(e){}
  // Primary: iOS share sheet → "Save Image" to Photos. Called synchronously in the tap.
  if(file && navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file]}).catch(err=>{ if(!err||err.name!=="AbortError") openFull(dataUri); });
    return;
  }
  openFull(dataUri);
}
// Fallback: blow the image up full-screen so a long-press gives Save to Photos
function openFull(dataUri){
  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;z-index:99;background:#0c1322;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;gap:12px";
  const tip=document.createElement("div");
  tip.style.cssText="color:#eef0f5;font-size:15px;text-align:center;line-height:1.4";
  tip.innerHTML="Press &amp; hold the image → <b>Save to Photos</b>.<br>Tap the dark area to close.";
  const img=document.createElement("img"); img.src=dataUri;
  img.style.cssText="max-width:100%;max-height:80vh;border-radius:10px";
  ov.appendChild(tip); ov.appendChild(img);
  ov.addEventListener("click",e=>{ if(e.target===ov) document.body.removeChild(ov); });
  document.body.appendChild(ov);
}

document.getElementById("date").textContent = DATE;

const host = document.getElementById("cards");
DATA.forEach(d=>{
  const card=document.createElement("div");
  card.className="card"+(d.bts?" bts":"");
  card.innerHTML = `<div class="rhead"><span class="rnum">${d.n}</span><span class="rtitle">${d.title}</span></div><span class="chip">${d.format}</span>`;
  // BTS reels carry TWO on-screen texts (Trial + Grid); everything else is script + caption
  let blocks;
  if(d.bts && d.screenTrial && d.screenGrid){
    blocks=[
      {lbl:"On-screen text — TRIAL reel", txt:d.screenTrial, btn:"Copy Trial Text"},
      {lbl:"On-screen text — GRID post", txt:d.screenGrid, btn:"Copy Grid Text"},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  } else {
    blocks=[
      {lbl:(d.bts?"On-screen text":"Script"), txt:d.script, btn:(d.bts?"Copy On-Screen Text":"Copy Script")},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  }
  blocks.forEach((b,i)=>{
    if(i>0){ const hr=document.createElement("hr"); hr.className="divider"; card.appendChild(hr); }
    const lbl=document.createElement("div"); lbl.className="lbl"; lbl.textContent=b.lbl; card.appendChild(lbl);
    const txt=document.createElement("div"); txt.className="text"+(b.cap?" cap":""); txt.textContent=b.txt; card.appendChild(txt);
    const btn=document.createElement("button"); btn.className="btn "+(b.cap?"ghost":"primary");
    btn.dataset.label=b.btn; btn.textContent=b.btn;
    btn.addEventListener("click", ()=>copy(b.txt, btn));
    card.appendChild(btn);
  });
  if(d.cover){
    const cl=document.createElement("div"); cl.className="lbl"; cl.style.marginTop="16px";
    cl.innerHTML="Cover — press &amp; hold → Save to Photos"; card.appendChild(cl);
    const img=document.createElement("img"); img.className="cardcover"; img.src=d.cover; img.alt=d.title+" cover";
    card.appendChild(img);
  }
  host.appendChild(card);
});
</script>

</body></html>
