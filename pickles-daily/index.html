<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Daily Reel Scripts — Mark Andrew</title></head><body>
<style>
  :root{
    --navy:#0c1322; --navy2:#161d30; --card:#1a2340; --line:#2b3557;
    --gold:#ffbf8f; --gold-deep:#e0a878; --cream:#eef0f5; --muted:#94a0bb;
    --ok:#7fd1a6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:linear-gradient(178deg,#0c1322 0%,#161d30 60%,#131a2c 100%);
    color:var(--cream); -webkit-font-smoothing:antialiased;
    min-height:100vh; padding:22px 16px 60px;
  }
  .wrap{max-width:620px;margin:0 auto}
  .eyebrow{
    font-size:12px;letter-spacing:.32em;color:var(--gold-deep);
    text-transform:uppercase;font-weight:600;text-align:center;margin-bottom:8px;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;font-weight:600;
    font-size:34px;line-height:1.05;text-align:center;color:var(--cream);
    letter-spacing:.01em;text-wrap:balance;
  }
  .date{text-align:center;color:var(--muted);font-size:14px;margin-top:10px}
  .howto{
    text-align:center;color:var(--muted);font-size:13.5px;line-height:1.5;
    margin:14px auto 26px;max-width:440px;
  }
  .howto b{color:var(--cream);font-weight:600}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:20px 18px;margin-bottom:20px;
  }
  .card.bts{border-color:var(--gold-deep)}
  .rhead{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .rnum{
    font-family:Georgia,serif;font-size:26px;color:var(--gold);
    line-height:1;font-variant-numeric:tabular-nums;
  }
  .rtitle{font-family:Georgia,serif;font-size:21px;color:var(--cream);line-height:1.15}
  .chip{
    display:inline-block;margin:8px 0 16px;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--gold-deep);border:1px solid var(--line);
    border-radius:100px;padding:4px 11px;font-weight:600;
  }
  .lbl{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin:2px 0 8px;
  }
  .text{
    background:#111834;border:1px solid var(--line);border-radius:12px;
    padding:14px 15px;font-size:16px;line-height:1.62;color:#e7ebf6;
    white-space:pre-line;
  }
  .text.cap{color:#d2d9ec;font-size:15px}
  .btn{
    -webkit-appearance:none;appearance:none;border:none;cursor:pointer;
    width:100%;min-height:54px;border-radius:13px;margin:11px 0 4px;
    font-size:16px;font-weight:700;letter-spacing:.01em;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:transform .08s ease,background .2s ease,color .2s ease;
  }
  .btn:active{transform:scale(.985)}
  .btn.primary{background:var(--gold);color:#241608}
  .btn.ghost{background:transparent;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .btn.copied{background:var(--ok)!important;color:#0b2417!important;border-color:var(--ok)!important}
  .btn:focus-visible{outline:3px solid #6f8fe0;outline-offset:2px}
  .divider{height:1px;background:var(--line);border:none;margin:16px 0}
  img.cardcover{
    width:100%;max-width:250px;height:auto;display:block;margin:8px auto 0;
    border-radius:12px;border:1px solid var(--line);background:var(--navy);
  }
  .btn.save{background:#20304f;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .foot{text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;margin-top:30px}
  .foot b{color:var(--gold-deep)}
  @media (prefers-reduced-motion:reduce){.btn{transition:none}}
</style>

<div class="wrap">
  <div class="eyebrow">Mark Andrew Photography</div>
  <h1>Daily Reel Scripts</h1>
  <div class="date" id="date"></div>
  <p class="howto">Tap <b>Copy Script</b> → paste into your teleprompter. Tap <b>Copy Caption</b> → paste into Instagram. No selecting, no fighting your phone.</p>
  <div id="cards"></div>
  <p class="foot">Refreshes every morning at <b>5:30</b>. Add this page to your home screen so it opens like an app.<br>— Pickles</p>
</div>

<script>
const DATE = "Saturday, July 18, 2026 — film any 2";
// Each DATA item may carry an optional `cover:"data:image/png;base64,..."` that the routine fills daily;
// it renders as a tap-to-save image directly under that reel's caption.
const DATA = [
  {n:"1", title:"Photographed Like a Man", format:"Unpopular Opinion", cover:"covers/face-1.jpg", script:"You're not nervous that I'm a man behind the camera. You're nervous I'll photograph you the way a man would — for someone else's eyes.\nI get it. Almost every image of a woman you've ever seen was built for somebody else to look at. So when a guy picks up the camera, you brace for it.\nHere's what actually happens in my studio. I'm not photographing the woman your husband sees. I'm photographing the woman YOU see on your best day and never get proof of — the one who lives in your head. That's the whole assignment.\n850 sessions in, I've learned the male gaze isn't a camera setting. It's a choice. And I made the opposite one a long time ago.\nThe women who leave here in tears aren't crying because they look desirable. They're crying because for once they look like themselves, turned all the way up.\nYou're not the object in the photo. You're the point of it.\nIf that's the version you want, the form's in my bio.", caption:"The number one thing women tell me they're scared of when they book a man: that I'll photograph them for someone else. After 850 sessions I can tell you the male gaze isn't a lens — it's a decision, and I made the opposite one. The woman I photograph is the one YOU see on your best day, not the one anyone else does. You're not the object in the photo. You're the point of it. When you want proof she exists, the form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #womenover40 #selfconfidence"},
  {n:"2", title:"The Banned Word", format:"Studio Rule · Ep. 11", cover:"covers/face-2.jpg", script:"The word 'un-photogenic' is banned in my studio. You can say almost anything in here — not that.\nYou want to swear? Go ahead. You want to tell me your whole life story between outfits? I'm listening. But the second 'I'm just not photogenic' comes out of your mouth, I stop you.\nBecause it isn't a real thing. 'Photogenic' is a word the industry invented to make women believe the camera is telling the truth about them, and they're failing it.\nThe camera isn't a mirror. It's a tool — and whether it flatters you is my job, not your genetics. The light, the angle, the timing, the exact half-second I press the shutter. That's on me.\n850 women have stood where you're standing and said that same sentence. Every one of them watched it fall apart on a 65-inch screen the same afternoon.\nSo bring anything into my studio. Just not that word. Studio rule number eleven.\nWhen you're ready to have it proven wrong, the form's in my bio.", caption:"Studio rule number eleven: the word 'un-photogenic' is banned in here. Say anything else you want — swear, overshare, tell me your life story between outfits. But not that one. 'Photogenic' isn't real. Whether the camera flatters you is my job — the light, the angle, the exact half-second — not your genetics. 850 women have said that sentence to me and watched it fall apart on the reveal screen the same day. When you want yours proven wrong, the form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #confidence #womenover40"},
  {n:"3", title:"Taking Up Space", format:"Overheard in the Studio", cover:"covers/face-3.jpg", script:"'I've never taken up this much space in a room without apologizing for it.' A woman said that to me at her reveal, and I've thought about it every day since.\nShe wasn't talking about the couch, or the studio. She meant her whole life.\nSomewhere along the way she'd learned to make herself smaller. Quieter. Easier to be around. Take up less room, need less, want less.\nAnd then she sat on my couch and watched 130 images of herself on a 65-inch screen — big, lit, unmissable, the center of every single frame — and that sentence just fell out of her.\nI photograph a lot of women who've spent decades shrinking. The reveal isn't really about the pictures. It's the first time in years they've seen themselves take up space and not immediately say sorry for it.\nShe booked a session. She left with permission.\nThat's the part I can't put on a price sheet. It's the part they remember.\nIf you've forgotten what it feels like to take up room, the form's in my bio.", caption:"'I've never taken up this much space in a room without apologizing for it.' She said it at her reveal, not the shoot — watching 130 images of herself, lit and unmissable, on a 65-inch screen. She wasn't talking about the couch. She meant her whole life. So many women spend decades making themselves smaller. The reveal is the first time in years they see themselves take up space and don't say sorry for it. That's the part I can't put on a price sheet. Form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #selfworth #womenover40"},
  {n:"4", title:"The Seven Went First", format:"The Waiting List", cover:"covers/face-4.jpg", script:"Ninety-three out of a hundred women walk into my studio nervous. Seven feel ready. You keep waiting to become one of the seven — but the seven don't exist. They just went first.\nI've kept an honest count across 850 sessions. Almost nobody arrives feeling ready. The confident-looking ones? They were shaking in the parking lot too. They just decided the nerves weren't a reason to stay home.\nYou've built this idea that one day you'll wake up feeling worthy of being photographed, and then you'll book. That day isn't coming. Worthiness isn't the ticket you buy at the door — it's what you walk out holding.\nHere's what actually happens. The nerves last about ninety seconds. Then hair and makeup, then the first frame, and by the same-day reveal you're a different person than the one who almost cancelled.\nNot because your body changed. Because you stopped waiting to feel ready and just went.\nThe seven aren't braver than you. They're three hours ahead of you.\nWhen you're done waiting, the form's in my bio.", caption:"Ninety-three out of a hundred women walk into my studio nervous. Seven feel ready — and honestly, even they were shaking in the parking lot. I've kept the count across 850 sessions: almost nobody arrives feeling worthy of the camera. Worthiness isn't the ticket you buy at the door. It's what you walk out holding. The nerves last about ninety seconds; the proof lasts the rest of your life. The 'ready' ones aren't braver than you — they're just a few hours ahead of you. When you're done waiting, the form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #selfconfidence #everybodyisworthy"},
  {n:"★", title:"Your Real Homework", format:"BTS Overlay · Prep List · text over you working", cover:"covers/reel-5.jpg", bts:true, screenTrial:"Before your shoot, I don't want your outfits. I want one thing most women never think to bring — it's in the caption.", screenGrid:"The homework I give every client has nothing to do with clothes. What I actually ask them to bring is in the description 👇", caption:"Everyone thinks prepping for a shoot means picking outfits. It doesn't. The one thing I ask you to bring has nothing to do with clothes: a written brief for the version of you nobody's ever photographed.\nNot what you want to wear — who you want to be for a day. The era. The mood. The woman who lives in your head and never gets to come out. Is she 1950s old-Hollywood? A woman in a fur coat who answers to no one? The version of you from before everyone needed something from you?\nWrite her down. Three sentences is enough. I read it before you arrive and build the whole day around her — the light, the sets, the music, the poses. The outfits are the easy part; I handle those with you at the consult.\nYour only homework is to remember who she is. I'll make sure the camera finally meets her.\nForm's in my bio when you're ready.\n\n#southbendphotographer #boudoirphotography #michiana #womenover40 #selfconfidence"}
];

function copy(text, btn, label){
  const done = () => {
    btn.classList.add("copied");
    const prev = btn.dataset.label;
    btn.textContent = "Copied ✓";
    setTimeout(()=>{ btn.classList.remove("copied"); btn.textContent = prev; }, 1400);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallback(text,done));
  } else { fallback(text,done); }
}
function fallback(text, done){
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{document.execCommand("copy");}catch(e){}
  document.body.removeChild(ta); done();
}
// Build a File synchronously from a data URI (no await — keeps iOS "user gesture" alive for share)
function b64ToFile(dataUri, filename){
  const c=dataUri.indexOf(","), meta=dataUri.slice(0,c), b64=dataUri.slice(c+1);
  const mime=(meta.match(/data:(.*?);/)||[,"image/jpeg"])[1];
  const bin=atob(b64), arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new File([arr], filename, {type:mime});
}
function saveImg(dataUri, name){
  const slug=(name||"reel").replace(/[^a-z0-9]+/gi,"-").toLowerCase();
  let file=null;
  try{ file=b64ToFile(dataUri, slug+"-cover.jpg"); }catch(e){}
  // Primary: iOS share sheet → "Save Image" to Photos. Called synchronously in the tap.
  if(file && navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file]}).catch(err=>{ if(!err||err.name!=="AbortError") openFull(dataUri); });
    return;
  }
  openFull(dataUri);
}
// Fallback: blow the image up full-screen so a long-press gives Save to Photos
function openFull(dataUri){
  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;z-index:99;background:#0c1322;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;gap:12px";
  const tip=document.createElement("div");
  tip.style.cssText="color:#eef0f5;font-size:15px;text-align:center;line-height:1.4";
  tip.innerHTML="Press &amp; hold the image → <b>Save to Photos</b>.<br>Tap the dark area to close.";
  const img=document.createElement("img"); img.src=dataUri;
  img.style.cssText="max-width:100%;max-height:80vh;border-radius:10px";
  ov.appendChild(tip); ov.appendChild(img);
  ov.addEventListener("click",e=>{ if(e.target===ov) document.body.removeChild(ov); });
  document.body.appendChild(ov);
}

document.getElementById("date").textContent = DATE;

const host = document.getElementById("cards");
DATA.forEach(d=>{
  const card=document.createElement("div");
  card.className="card"+(d.bts?" bts":"");
  card.innerHTML = `<div class="rhead"><span class="rnum">${d.n}</span><span class="rtitle">${d.title}</span></div><span class="chip">${d.format}</span>`;
  // BTS reels carry TWO on-screen texts (Trial + Grid); everything else is script + caption
  let blocks;
  if(d.bts && d.screenTrial && d.screenGrid){
    blocks=[
      {lbl:"On-screen text — TRIAL reel", txt:d.screenTrial, btn:"Copy Trial Text"},
      {lbl:"On-screen text — GRID post", txt:d.screenGrid, btn:"Copy Grid Text"},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  } else {
    blocks=[
      {lbl:(d.bts?"On-screen text":"Script"), txt:d.script, btn:(d.bts?"Copy On-Screen Text":"Copy Script")},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  }
  blocks.forEach((b,i)=>{
    if(i>0){ const hr=document.createElement("hr"); hr.className="divider"; card.appendChild(hr); }
    const lbl=document.createElement("div"); lbl.className="lbl"; lbl.textContent=b.lbl; card.appendChild(lbl);
    const txt=document.createElement("div"); txt.className="text"+(b.cap?" cap":""); txt.textContent=b.txt; card.appendChild(txt);
    const btn=document.createElement("button"); btn.className="btn "+(b.cap?"ghost":"primary");
    btn.dataset.label=b.btn; btn.textContent=b.btn;
    btn.addEventListener("click", ()=>copy(b.txt, btn));
    card.appendChild(btn);
  });
  if(d.cover){
    const cl=document.createElement("div"); cl.className="lbl"; cl.style.marginTop="16px";
    cl.innerHTML="Cover — press &amp; hold → Save to Photos"; card.appendChild(cl);
    const img=document.createElement("img"); img.className="cardcover"; img.src=d.cover; img.alt=d.title+" cover";
    card.appendChild(img);
  }
  host.appendChild(card);
});
</script>
</body></html>
