<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Daily Reel Scripts — Mark Andrew</title></head><body>
<style>
  :root{
    --navy:#0c1322; --navy2:#161d30; --card:#1a2340; --line:#2b3557;
    --gold:#ffbf8f; --gold-deep:#e0a878; --cream:#eef0f5; --muted:#94a0bb;
    --ok:#7fd1a6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:linear-gradient(178deg,#0c1322 0%,#161d30 60%,#131a2c 100%);
    color:var(--cream); -webkit-font-smoothing:antialiased;
    min-height:100vh; padding:22px 16px 60px;
  }
  .wrap{max-width:620px;margin:0 auto}
  .eyebrow{
    font-size:12px;letter-spacing:.32em;color:var(--gold-deep);
    text-transform:uppercase;font-weight:600;text-align:center;margin-bottom:8px;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;font-weight:600;
    font-size:34px;line-height:1.05;text-align:center;color:var(--cream);
    letter-spacing:.01em;text-wrap:balance;
  }
  .date{text-align:center;color:var(--muted);font-size:14px;margin-top:10px}
  .howto{
    text-align:center;color:var(--muted);font-size:13.5px;line-height:1.5;
    margin:14px auto 26px;max-width:440px;
  }
  .howto b{color:var(--cream);font-weight:600}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:20px 18px;margin-bottom:20px;
  }
  .card.bts{border-color:var(--gold-deep)}
  .rhead{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .rnum{
    font-family:Georgia,serif;font-size:26px;color:var(--gold);
    line-height:1;font-variant-numeric:tabular-nums;
  }
  .rtitle{font-family:Georgia,serif;font-size:21px;color:var(--cream);line-height:1.15}
  .chip{
    display:inline-block;margin:8px 0 16px;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--gold-deep);border:1px solid var(--line);
    border-radius:100px;padding:4px 11px;font-weight:600;
  }
  .lbl{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin:2px 0 8px;
  }
  .text{
    background:#111834;border:1px solid var(--line);border-radius:12px;
    padding:14px 15px;font-size:16px;line-height:1.62;color:#e7ebf6;
    white-space:pre-line;
  }
  .text.cap{color:#d2d9ec;font-size:15px}
  .btn{
    -webkit-appearance:none;appearance:none;border:none;cursor:pointer;
    width:100%;min-height:54px;border-radius:13px;margin:11px 0 4px;
    font-size:16px;font-weight:700;letter-spacing:.01em;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:transform .08s ease,background .2s ease,color .2s ease;
  }
  .btn:active{transform:scale(.985)}
  .btn.primary{background:var(--gold);color:#241608}
  .btn.ghost{background:transparent;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .btn.copied{background:var(--ok)!important;color:#0b2417!important;border-color:var(--ok)!important}
  .btn:focus-visible{outline:3px solid #6f8fe0;outline-offset:2px}
  .divider{height:1px;background:var(--line);border:none;margin:16px 0}
  img.cardcover{
    width:100%;max-width:250px;height:auto;display:block;margin:8px auto 0;
    border-radius:12px;border:1px solid var(--line);background:var(--navy);
  }
  .btn.save{background:#20304f;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .foot{text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;margin-top:30px}
  .foot b{color:var(--gold-deep)}
  @media (prefers-reduced-motion:reduce){.btn{transition:none}}
</style>

<div class="wrap">
  <div class="eyebrow">Mark Andrew Photography</div>
  <h1>Daily Reel Scripts</h1>
  <div class="date" id="date"></div>
  <p class="howto">Tap <b>Copy Script</b> → paste into your teleprompter. Tap <b>Copy Caption</b> → paste into Instagram. No selecting, no fighting your phone.</p>
  <div id="cards"></div>
  <p class="foot">Refreshes every morning at <b>5:30</b>. Add this page to your home screen so it opens like an app.<br>— Pickles</p>
</div>

<script>
const DATE = "Thursday, July 23, 2026 — film any 2";
// Each DATA item may carry an optional `cover:"data:image/png;base64,..."` that the routine fills daily;
// it renders as a tap-to-save image directly under that reel's caption.
const DATA = [
  {
    "n": "1",
    "title": "The Sentence I Banned",
    "format": "Studio Rule · Ep. 15",
    "script": "Nothing in my studio happens to you. It happens with you. Studio rule number fifteen.\nYou will never hear me say “just trust me” while nudging you past something you already said no to. “Try it, you’ll like it” is a salesman’s sentence, and I’m not selling you a pose.\nHere’s how it actually works. Before your session, we build the shot list together — what’s on the table, what’s off the table, and what you’d rather decide on the day.\nThen the day comes, and that list belongs to you. You can strike anything off it at any moment, mid-set, no explanation required.\nAnd here’s the part that surprises people: no woman has ever gotten braver because I pushed. It’s the opposite. Zero pressure is exactly why women try the bold stuff — because it was their idea.\nCourage shows up where pressure isn’t.\nIf that’s the room you’ve been looking for, the form’s in my bio.",
    "caption": "“Just trust me” is banned in my studio. Every image we make was agreed on before the robe ever left the hanger — and you can strike anything off the list mid-session, no explanation owed. In 850 sessions, pressure has never once made a woman feel beautiful. Safety has. The form’s in my bio when you’re ready.\n\n#southbendphotographer #boudoirphotography #michiana #womenempowerment #southbendindiana",
    "cover": "covers/face-1.jpg"
  },
  {
    "n": "2",
    "title": "She Underlined Her Stomach",
    "format": "Overheard in the Studio · A True Story",
    "script": "A woman once handed me a list of everything I was not allowed to photograph. Written down. Folded twice. Her stomach was underlined.\nTwo kids and a surgery, and fifteen years of angling herself behind counters and car doors in every family picture. That list was how she made booking survivable, so I didn’t argue with it. I photographed around it all morning, exactly as written, because the list was hers to keep.\nThen at lunch, she watched me light the next set and asked, quietly, “What would you shoot… if the list didn’t exist?” So I told her. She stood there for a second — and then she tore the paper in half herself. Nobody asked her to.\nAt the reveal, the image she bought biggest was the exact photograph that list was built to prevent.\nSome women arrive with a list. Nobody’s ever left with one.\nThe form’s in my bio.",
    "caption": "Six out of ten women tell me the same body part almost kept them from booking. She wrote hers down so I couldn’t miss it — and by the reveal, the photograph she loved most was the one the list existed to prevent. Nothing about her body changed at lunch. The story she told about it did. The form’s in my bio.\n\n#southbendphotographer #boudoir #bodyconfidence #michiana #mishawaka",
    "cover": "covers/face-2.jpg"
  },
  {
    "n": "3",
    "title": "It Outsells the Fur Coat",
    "format": "Unpopular Opinion",
    "script": "Unpopular opinion: the plainest photograph from your session will outsell the fantasy shot every single time. I have the receipts.\nI own the fur coats. The painted backdrops, the feather wings, the velvet sofa, a jewelry case that could stock a store. Women book for those sets. We shoot them. They’re stunning.\nBut when it’s time to pick the picture that goes big on the wall, almost every month the winner is the same: bare shoulders, one light, no set. The frame with nothing in it but her.\nIt took me 850 sessions to understand why. The fantasy shots prove what we built that day. The plain one proves something better — that she never needed any of it.\nYou can’t outdress the thing women actually come here to find.\nThe props are the appetizer. You’re the meal.\nWhen you want to see it for yourself, the form’s in my bio.",
    "caption": "Every month the same thing happens at reveals: the fur, the wings, and the gowns get the gasps — and the simplest frame gets the wall. Bare shoulders, one light, nobody in it but her. That’s the photograph women can’t stop looking at, because it isn’t about what we added. It’s about what was already there. The form’s in my bio.\n\n#southbendphotographer #glamourphotography #michiana #selflove #grangerindiana",
    "cover": "covers/face-3.jpg"
  },
  {
    "n": "4",
    "title": "Every Name But Yours",
    "format": "The Waiting List",
    "script": "You’ve paid for everyone in your house to feel special except one person.\nBraces. Cleats. The good birthday parties. His golf trip, her dance season, the dog’s surgery. You found the money every single time, and you never once called it selfish.\nThen it’s something for you, and suddenly you’re a lawyer for the other side. “It’s a lot right now.” “Maybe after the holidays.” You’ll cover four hundred dollars of everyone else’s Tuesday and interrogate twenty spent on yourself.\nHere’s what 850 sessions have shown me: the women who finally book don’t suddenly have more money. They just stop pleading guilty for existing in their own budget.\nAnd afterward? Not one has told me her family ate less that month. What changed is that her family watched her treat herself like she mattered — and took notes.\nThe family budget has a line for everyone. Put your name back on it.",
    "caption": "You have never once flinched at what it costs for everyone else to feel celebrated. The guilt only shows up when the receipt has your name on it — and that math isn’t responsibility, it’s a habit of going last. Payment plans exist here for exactly this reason. The form’s in my bio.\n\n#southbendphotographer #boudoirphotography #michianamoms #selfworth #elkhartindiana",
    "cover": "covers/face-4.jpg"
  },
  {
    "n": "★",
    "title": "Skip the Spray Tan",
    "format": "Prep List · BTS Overlay · Myth-Bust",
    "bts": true,
    "screenTrial": "Everyone thinks a spray tan the day before a photoshoot is smart prep. It’s the one thing that can wreck an entire gallery — what to do instead is in the description.",
    "screenGrid": "My clients get a “do nothing” list the week before their shoot. It’s saved more galleries than any product ever has — I put the whole list in the caption 👇",
    "caption": "The week-of list, in full:\nNo spray tan. Studio strobes turn even a good one orange and streaky — your real skin photographs richer than anything from a bottle.\nNo new skincare. This is not the week to experiment; your face will have opinions.\nNo product in your hair on shoot day. Arrive clean and dry — Aletheia builds the volume, and product only fights her.\nNo crash anything. Water and sleep outperform every last-minute fix ever invented.\nHair color or a cut? A full week out, minimum.\nThe whole secret of camera-ready is arriving as yourself. We handle the rest in the chair. The form’s in my bio.\n\n#southbendphotographer #boudoirprep #michiana #nilesmichigan #photoshoottips",
    "cover": "covers/reel-5.jpg"
  }
];

function copy(text, btn, label){
  const done = () => {
    btn.classList.add("copied");
    const prev = btn.dataset.label;
    btn.textContent = "Copied ✓";
    setTimeout(()=>{ btn.classList.remove("copied"); btn.textContent = prev; }, 1400);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallback(text,done));
  } else { fallback(text,done); }
}
function fallback(text, done){
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{document.execCommand("copy");}catch(e){}
  document.body.removeChild(ta); done();
}
// Build a File synchronously from a data URI (no await — keeps iOS "user gesture" alive for share)
function b64ToFile(dataUri, filename){
  const c=dataUri.indexOf(","), meta=dataUri.slice(0,c), b64=dataUri.slice(c+1);
  const mime=(meta.match(/data:(.*?);/)||[,"image/jpeg"])[1];
  const bin=atob(b64), arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new File([arr], filename, {type:mime});
}
function saveImg(dataUri, name){
  const slug=(name||"reel").replace(/[^a-z0-9]+/gi,"-").toLowerCase();
  let file=null;
  try{ file=b64ToFile(dataUri, slug+"-cover.jpg"); }catch(e){}
  // Primary: iOS share sheet → "Save Image" to Photos. Called synchronously in the tap.
  if(file && navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file]}).catch(err=>{ if(!err||err.name!=="AbortError") openFull(dataUri); });
    return;
  }
  openFull(dataUri);
}
// Fallback: blow the image up full-screen so a long-press gives Save to Photos
function openFull(dataUri){
  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;z-index:99;background:#0c1322;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;gap:12px";
  const tip=document.createElement("div");
  tip.style.cssText="color:#eef0f5;font-size:15px;text-align:center;line-height:1.4";
  tip.innerHTML="Press &amp; hold the image → <b>Save to Photos</b>.<br>Tap the dark area to close.";
  const img=document.createElement("img"); img.src=dataUri;
  img.style.cssText="max-width:100%;max-height:80vh;border-radius:10px";
  ov.appendChild(tip); ov.appendChild(img);
  ov.addEventListener("click",e=>{ if(e.target===ov) document.body.removeChild(ov); });
  document.body.appendChild(ov);
}

document.getElementById("date").textContent = DATE;

const host = document.getElementById("cards");
DATA.forEach(d=>{
  const card=document.createElement("div");
  card.className="card"+(d.bts?" bts":"");
  card.innerHTML = `<div class="rhead"><span class="rnum">${d.n}</span><span class="rtitle">${d.title}</span></div><span class="chip">${d.format}</span>`;
  // BTS reels carry TWO on-screen texts (Trial + Grid); everything else is script + caption
  let blocks;
  if(d.bts && d.screenTrial && d.screenGrid){
    blocks=[
      {lbl:"On-screen text — TRIAL reel", txt:d.screenTrial, btn:"Copy Trial Text"},
      {lbl:"On-screen text — GRID post", txt:d.screenGrid, btn:"Copy Grid Text"},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  } else {
    blocks=[
      {lbl:(d.bts?"On-screen text":"Script"), txt:d.script, btn:(d.bts?"Copy On-Screen Text":"Copy Script")},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  }
  blocks.forEach((b,i)=>{
    if(i>0){ const hr=document.createElement("hr"); hr.className="divider"; card.appendChild(hr); }
    const lbl=document.createElement("div"); lbl.className="lbl"; lbl.textContent=b.lbl; card.appendChild(lbl);
    const txt=document.createElement("div"); txt.className="text"+(b.cap?" cap":""); txt.textContent=b.txt; card.appendChild(txt);
    const btn=document.createElement("button"); btn.className="btn "+(b.cap?"ghost":"primary");
    btn.dataset.label=b.btn; btn.textContent=b.btn;
    btn.addEventListener("click", ()=>copy(b.txt, btn));
    card.appendChild(btn);
  });
  if(d.cover){
    const cl=document.createElement("div"); cl.className="lbl"; cl.style.marginTop="16px";
    cl.innerHTML="Cover — press &amp; hold → Save to Photos"; card.appendChild(cl);
    const img=document.createElement("img"); img.className="cardcover"; img.src=d.cover; img.alt=d.title+" cover";
    card.appendChild(img);
  }
  host.appendChild(card);
});
</script>

</body></html>
