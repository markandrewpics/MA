<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Daily Reel Scripts — Mark Andrew</title></head><body>
<style>
  :root{
    --navy:#0c1322; --navy2:#161d30; --card:#1a2340; --line:#2b3557;
    --gold:#ffbf8f; --gold-deep:#e0a878; --cream:#eef0f5; --muted:#94a0bb;
    --ok:#7fd1a6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:linear-gradient(178deg,#0c1322 0%,#161d30 60%,#131a2c 100%);
    color:var(--cream); -webkit-font-smoothing:antialiased;
    min-height:100vh; padding:22px 16px 60px;
  }
  .wrap{max-width:620px;margin:0 auto}
  .eyebrow{
    font-size:12px;letter-spacing:.32em;color:var(--gold-deep);
    text-transform:uppercase;font-weight:600;text-align:center;margin-bottom:8px;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;font-weight:600;
    font-size:34px;line-height:1.05;text-align:center;color:var(--cream);
    letter-spacing:.01em;text-wrap:balance;
  }
  .date{text-align:center;color:var(--muted);font-size:14px;margin-top:10px}
  .howto{
    text-align:center;color:var(--muted);font-size:13.5px;line-height:1.5;
    margin:14px auto 26px;max-width:440px;
  }
  .howto b{color:var(--cream);font-weight:600}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:20px 18px;margin-bottom:20px;
  }
  .card.bts{border-color:var(--gold-deep)}
  .rhead{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .rnum{
    font-family:Georgia,serif;font-size:26px;color:var(--gold);
    line-height:1;font-variant-numeric:tabular-nums;
  }
  .rtitle{font-family:Georgia,serif;font-size:21px;color:var(--cream);line-height:1.15}
  .chip{
    display:inline-block;margin:8px 0 16px;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--gold-deep);border:1px solid var(--line);
    border-radius:100px;padding:4px 11px;font-weight:600;
  }
  .lbl{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin:2px 0 8px;
  }
  .text{
    background:#111834;border:1px solid var(--line);border-radius:12px;
    padding:14px 15px;font-size:16px;line-height:1.62;color:#e7ebf6;
    white-space:pre-line;
  }
  .text.cap{color:#d2d9ec;font-size:15px}
  .btn{
    -webkit-appearance:none;appearance:none;border:none;cursor:pointer;
    width:100%;min-height:54px;border-radius:13px;margin:11px 0 4px;
    font-size:16px;font-weight:700;letter-spacing:.01em;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:transform .08s ease,background .2s ease,color .2s ease;
  }
  .btn:active{transform:scale(.985)}
  .btn.primary{background:var(--gold);color:#241608}
  .btn.ghost{background:transparent;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .btn.copied{background:var(--ok)!important;color:#0b2417!important;border-color:var(--ok)!important}
  .btn:focus-visible{outline:3px solid #6f8fe0;outline-offset:2px}
  .divider{height:1px;background:var(--line);border:none;margin:16px 0}
  img.cardcover{
    width:100%;max-width:250px;height:auto;display:block;margin:8px auto 0;
    border-radius:12px;border:1px solid var(--line);background:var(--navy);
  }
  .btn.save{background:#20304f;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .foot{text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;margin-top:30px}
  .foot b{color:var(--gold-deep)}
  @media (prefers-reduced-motion:reduce){.btn{transition:none}}
</style>

<div class="wrap">
  <div class="eyebrow">Mark Andrew Photography</div>
  <h1>Daily Reel Scripts</h1>
  <div class="date" id="date"></div>
  <p class="howto">Tap <b>Copy Script</b> → paste into your teleprompter. Tap <b>Copy Caption</b> → paste into Instagram. No selecting, no fighting your phone.</p>
  <div id="cards"></div>
  <p class="foot">Refreshes every morning at <b>5:30</b>. Add this page to your home screen so it opens like an app.<br>— Pickles</p>
</div>

<script>
const DATE = "Thursday, July 16, 2026 — film any 2";
// Each DATA item may carry an optional `cover:"data:image/png;base64,..."` that the routine fills daily;
// it renders as a tap-to-save image directly under that reel's caption.
const DATA = [
  {
    n:"1", title:"The Woman Who's Coming", format:"Waiting List",
    cover:"covers/face-1.jpg",
    script:`You're waiting to become a woman who won't need these photos. She's not coming.
You picture her all the time — fifteen pounds lighter, calmer, finally sure of herself. Once she shows up, you tell yourself, then you'll book.
Here's what nobody says out loud: that woman doesn't need proof she was here. She's already fine. The one who actually needs these pictures is the woman standing in your bathroom tonight, avoiding her own reflection.
I've photographed over 850 women here in South Bend. Not one of them walked in as her finished self. They came in tired, unsure, fifteen pounds from "ready" — and walked out having met someone they'd been postponing for years.
You don't take these photos because you've finally arrived. You take them because you're done waiting to.
The woman in the mirror right now is the one who deserves them. Not the imaginary one who never shows.
The form's in my bio when you're ready.`,
    caption:`You keep waiting to become the woman who won't need these photos. She doesn't exist — and she was never the one who needed them. The woman in your mirror tonight is. When you're done postponing her, the form's in my bio.

#southbendphotographer #boudoirphotography #michiana #womenover40 #selfworth`
  },
  {
    n:"2", title:"The Little Screen Lies", format:"Studio Rule · Ep. 10",
    cover:"covers/face-2.jpg",
    script:`You don't get to look at the back of my camera during your session. Not once. Studio rule number ten.
Every instinct you have will fight me on this. You'll want to peek after every pose, check the little screen, make sure you don't look "weird."
That two-inch preview has talked more women out of their own beauty than any mirror ever has. It's tiny, it's lit wrong, it freezes you mid-blink — and your brain treats it like a verdict.
So we don't do it. You trust the process, you stay in the moment, and the first time you truly see yourself is at the reveal — 130 finished images on a sixty-five-inch screen, the same afternoon.
That's not me hiding anything. That's me refusing to let one bad half-second on a phone-sized screen decide how you feel about your whole shoot.
You came here to be seen properly. Not squinted at on a two-inch screen.
The full experience is in my bio.`,
    caption:`Studio rule number ten: you don't see the back of my camera during your session. That tiny screen has talked more women out of their own beauty than any mirror. The first time you see yourself, it's 130 images on a 65-inch screen — same day. Full experience in my bio.

#southbendphotographer #boudoirphotography #samedayreveal #michiana #confidence`
  },
  {
    n:"3", title:"Stop Rehearsing the Poses", format:"Prep List",
    cover:"covers/face-3.jpg",
    script:`Stop practicing poses in your bathroom mirror the week before your shoot. Every one of them falls apart the second you're in front of me.
I know why you do it. You want to walk in prepared, in control, not wasting my time. It feels responsible.
But here's what actually happens: you show up with twelve rehearsed angles, your body goes stiff trying to remember them, and you spend the first thirty minutes fighting a script instead of just being in the room.
I've directed over 850 women. Posing is my job, not yours. I'll move your chin a quarter-inch, turn your hip, tell you exactly where your hands go — and hand you the three poses that actually work for your body, not the twelve you memorized off Pinterest.
The best thing you can bring isn't preparation. It's permission to let me lead.
Show up rested. Show up open. I've got the rest.
The full prep list is in my bio.`,
    caption:`The night before your shoot, put the mirror down. The poses you rehearse always stiffen up the second the camera's on you — posing is my job, not yours. Show up rested and open, and I'll hand you the three that actually work. Full prep list in my bio.

#southbendphotographer #boudoirphotography #michiana #photoshootprep #womenover40`
  },
  {
    n:"4", title:"You Don't Need Confidence First", format:"Unpopular Opinion",
    cover:"covers/face-4.jpg",
    script:`Unpopular opinion: you don't need to be confident to book me. Confidence is what I hand you at the reveal — not what you're supposed to bring.
Somewhere along the way, the industry taught women they had to feel ready first. Love your body first. Fix the arms, drop the weight, get your act together — then you're allowed in front of a camera.
That's backwards. I've photographed over 850 women, and almost none of them walked in confident. They walked in nervous, apologizing, certain they'd be my hardest client ever.
Confidence isn't the ticket you buy to get in the door. It's the thing you carry out of it — built one directed pose at a time, cemented the second you see 130 finished images on a sixty-five-inch screen.
You're not supposed to arrive sure of yourself. You're supposed to leave that way.
Bring the nerves. I'll trade them for something better.
The form's in my bio.`,
    caption:`Unpopular opinion: confidence isn't the price of admission — it's what you walk out with. Almost none of the 850+ women I've photographed felt ready walking in. Bring the nerves. You'll trade them for proof. Form's in my bio.

#southbendphotographer #boudoirphotography #michiana #bodyconfidence #selflove`
  },
  {
    n:"★", title:"The Sentence I Can't Stop Thinking About", format:"BTS Overlay · Overheard", bts:true,
    cover:"covers/reel-5.jpg",
    screenTrial:`A woman said one sentence to me last week that I can't stop thinking about. The rest is in the caption 👇`,
    screenGrid:`After 850 sessions I thought I'd heard it all. Then she said this — I put the whole story in the description.`,
    caption:`"I've never let anyone really look at me."
She wasn't talking about her body. She was talking about her whole life — thirty years of being the one who takes the photo, packs the lunches, holds everyone together, and quietly steps out of frame.
She didn't need me to make her sexy. She needed one afternoon where she was the only person in the room worth looking at. Where somebody paid attention on purpose.
That's what this actually is. The rest is just the excuse. The real thing is being seen — and most of these women haven't been, not really, in years.
She cried at the reveal. Not because she looked different. Because for once, she let herself look.
If you've been out of frame for a while, the form's in my bio.

#southbendphotographer #boudoirphotography #michiana #womenover40 #selfworth`
  }
];

function copy(text, btn, label){
  const done = () => {
    btn.classList.add("copied");
    const prev = btn.dataset.label;
    btn.textContent = "Copied ✓";
    setTimeout(()=>{ btn.classList.remove("copied"); btn.textContent = prev; }, 1400);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallback(text,done));
  } else { fallback(text,done); }
}
function fallback(text, done){
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{document.execCommand("copy");}catch(e){}
  document.body.removeChild(ta); done();
}
// Build a File synchronously from a data URI (no await — keeps iOS "user gesture" alive for share)
function b64ToFile(dataUri, filename){
  const c=dataUri.indexOf(","), meta=dataUri.slice(0,c), b64=dataUri.slice(c+1);
  const mime=(meta.match(/data:(.*?);/)||[,"image/jpeg"])[1];
  const bin=atob(b64), arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new File([arr], filename, {type:mime});
}
function saveImg(dataUri, name){
  const slug=(name||"reel").replace(/[^a-z0-9]+/gi,"-").toLowerCase();
  let file=null;
  try{ file=b64ToFile(dataUri, slug+"-cover.jpg"); }catch(e){}
  // Primary: iOS share sheet → "Save Image" to Photos. Called synchronously in the tap.
  if(file && navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file]}).catch(err=>{ if(!err||err.name!=="AbortError") openFull(dataUri); });
    return;
  }
  openFull(dataUri);
}
// Fallback: blow the image up full-screen so a long-press gives Save to Photos
function openFull(dataUri){
  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;z-index:99;background:#0c1322;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;gap:12px";
  const tip=document.createElement("div");
  tip.style.cssText="color:#eef0f5;font-size:15px;text-align:center;line-height:1.4";
  tip.innerHTML="Press &amp; hold the image → <b>Save to Photos</b>.<br>Tap the dark area to close.";
  const img=document.createElement("img"); img.src=dataUri;
  img.style.cssText="max-width:100%;max-height:80vh;border-radius:10px";
  ov.appendChild(tip); ov.appendChild(img);
  ov.addEventListener("click",e=>{ if(e.target===ov) document.body.removeChild(ov); });
  document.body.appendChild(ov);
}

document.getElementById("date").textContent = DATE;

const host = document.getElementById("cards");
DATA.forEach(d=>{
  const card=document.createElement("div");
  card.className="card"+(d.bts?" bts":"");
  card.innerHTML = `<div class="rhead"><span class="rnum">${d.n}</span><span class="rtitle">${d.title}</span></div><span class="chip">${d.format}</span>`;
  // BTS reels carry TWO on-screen texts (Trial + Grid); everything else is script + caption
  let blocks;
  if(d.bts && d.screenTrial && d.screenGrid){
    blocks=[
      {lbl:"On-screen text — TRIAL reel", txt:d.screenTrial, btn:"Copy Trial Text"},
      {lbl:"On-screen text — GRID post", txt:d.screenGrid, btn:"Copy Grid Text"},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  } else {
    blocks=[
      {lbl:(d.bts?"On-screen text":"Script"), txt:d.script, btn:(d.bts?"Copy On-Screen Text":"Copy Script")},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  }
  blocks.forEach((b,i)=>{
    if(i>0){ const hr=document.createElement("hr"); hr.className="divider"; card.appendChild(hr); }
    const lbl=document.createElement("div"); lbl.className="lbl"; lbl.textContent=b.lbl; card.appendChild(lbl);
    const txt=document.createElement("div"); txt.className="text"+(b.cap?" cap":""); txt.textContent=b.txt; card.appendChild(txt);
    const btn=document.createElement("button"); btn.className="btn "+(b.cap?"ghost":"primary");
    btn.dataset.label=b.btn; btn.textContent=b.btn;
    btn.addEventListener("click", ()=>copy(b.txt, btn));
    card.appendChild(btn);
  });
  if(d.cover){
    const cl=document.createElement("div"); cl.className="lbl"; cl.style.marginTop="16px";
    cl.innerHTML="Cover — press &amp; hold → Save to Photos"; card.appendChild(cl);
    const img=document.createElement("img"); img.className="cardcover"; img.src=d.cover; img.alt=d.title+" cover";
    card.appendChild(img);
  }
  host.appendChild(card);
});
</script></body></html>
