<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Daily Reel Scripts — Mark Andrew</title></head><body>
<style>
  :root{
    --navy:#0c1322; --navy2:#161d30; --card:#1a2340; --line:#2b3557;
    --gold:#ffbf8f; --gold-deep:#e0a878; --cream:#eef0f5; --muted:#94a0bb;
    --ok:#7fd1a6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:linear-gradient(178deg,#0c1322 0%,#161d30 60%,#131a2c 100%);
    color:var(--cream); -webkit-font-smoothing:antialiased;
    min-height:100vh; padding:22px 16px 60px;
  }
  .wrap{max-width:620px;margin:0 auto}
  .eyebrow{
    font-size:12px;letter-spacing:.32em;color:var(--gold-deep);
    text-transform:uppercase;font-weight:600;text-align:center;margin-bottom:8px;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;font-weight:600;
    font-size:34px;line-height:1.05;text-align:center;color:var(--cream);
    letter-spacing:.01em;text-wrap:balance;
  }
  .date{text-align:center;color:var(--muted);font-size:14px;margin-top:10px}
  .howto{
    text-align:center;color:var(--muted);font-size:13.5px;line-height:1.5;
    margin:14px auto 26px;max-width:440px;
  }
  .howto b{color:var(--cream);font-weight:600}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:20px 18px;margin-bottom:20px;
  }
  .card.bts{border-color:var(--gold-deep)}
  .rhead{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .rnum{
    font-family:Georgia,serif;font-size:26px;color:var(--gold);
    line-height:1;font-variant-numeric:tabular-nums;
  }
  .rtitle{font-family:Georgia,serif;font-size:21px;color:var(--cream);line-height:1.15}
  .chip{
    display:inline-block;margin:8px 0 16px;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--gold-deep);border:1px solid var(--line);
    border-radius:100px;padding:4px 11px;font-weight:600;
  }
  .lbl{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin:2px 0 8px;
  }
  .text{
    background:#111834;border:1px solid var(--line);border-radius:12px;
    padding:14px 15px;font-size:16px;line-height:1.62;color:#e7ebf6;
    white-space:pre-line;
  }
  .text.cap{color:#d2d9ec;font-size:15px}
  .btn{
    -webkit-appearance:none;appearance:none;border:none;cursor:pointer;
    width:100%;min-height:54px;border-radius:13px;margin:11px 0 4px;
    font-size:16px;font-weight:700;letter-spacing:.01em;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:transform .08s ease,background .2s ease,color .2s ease;
  }
  .btn:active{transform:scale(.985)}
  .btn.primary{background:var(--gold);color:#241608}
  .btn.ghost{background:transparent;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .btn.copied{background:var(--ok)!important;color:#0b2417!important;border-color:var(--ok)!important}
  .btn:focus-visible{outline:3px solid #6f8fe0;outline-offset:2px}
  .divider{height:1px;background:var(--line);border:none;margin:16px 0}
  img.cardcover{
    width:100%;max-width:250px;height:auto;display:block;margin:8px auto 0;
    border-radius:12px;border:1px solid var(--line);background:var(--navy);
  }
  .btn.save{background:#20304f;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .foot{text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;margin-top:30px}
  .foot b{color:var(--gold-deep)}
  @media (prefers-reduced-motion:reduce){.btn{transition:none}}
</style>

<div class="wrap">
  <div class="eyebrow">Mark Andrew Photography</div>
  <h1>Daily Reel Scripts</h1>
  <div class="date" id="date"></div>
  <p class="howto">Tap <b>Copy Script</b> → paste into your teleprompter. Tap <b>Copy Caption</b> → paste into Instagram. No selecting, no fighting your phone.</p>
  <div id="cards"></div>
  <p class="foot">Refreshes every morning at <b>5:30</b>. Add this page to your home screen so it opens like an app.<br>— Pickles</p>
</div>

<script>
const DATE = "Wednesday, July 22, 2026 — film any 2";
// Each DATA item may carry an optional `cover:"data:image/png;base64,..."` that the routine fills daily;
// it renders as a tap-to-save image directly under that reel's caption.
const DATA = [
  {
    "n": "1",
    "title": "You Leave With Motion",
    "cover": "covers/face-1.jpg",
    "format": "Studio Rule · Ep. 14",
    "script": "Every woman who shoots with me leaves with movement now — not just stills. Studio rule number fourteen.\nThirty seconds of you laughing. Turning. Tucking your hair behind your ear. Fixing the strap that didn't need fixing.\nHere's why I made it a rule and not an option.\nA photograph shows how you looked. Movement shows what it was like to be in the room with you. And in thirty years, your daughter won't just want a picture of you. She'll want to watch you move. Hear the pause before you laugh. See you roll your eyes at me for making you do it.\nI've watched women study their grandmother's photograph like it might start breathing.\nImagine if they could press play.\nSo no, the motion isn't an upsell. It's the part of you a photograph physically can't hold.\nStills prove you were beautiful. Motion proves you were alive.",
    "caption": "In thirty years, your daughter won't just want a photo of you — she'll want to watch you move. That's why every session ends with thirty seconds of motion now: you laughing, turning, being alive on camera. Stills prove you were beautiful. Motion proves you were here. When you're ready, the form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #womenover40 #samedayreveal"
  },
  {
    "n": "2",
    "title": "Bad at Pictures Isn't a Thing",
    "cover": "covers/face-2.jpg",
    "format": "Unpopular Opinion",
    "script": "\"Bad at pictures\" isn't a thing. It's just a job nobody's ever done for you.\nYou're not bad at pictures. You've been handed a phone at arm's length, no direction, harsh kitchen light, half a second's warning — and you concluded the problem was your face.\nUnpopular opinion: knowing how to pose was never your job. It's mine.\nOver 850 women have stood in front of my camera, and maybe five of them knew what to do with their hands. Didn't matter. I tell you where the light wants your chin. When to breathe. What to do with the shoulder you keep apologizing with.\nAnd here's the part nobody believes until they're standing there.\nThe women who swear they're the least photogenic are usually the ones crying the good tears at the reveal — because nobody ever built a photograph around them before.\nYou were never bad at pictures. The pictures were bad at you.",
    "caption": "\"I'm bad at pictures\" — no. You've spent twenty years being photographed with zero direction and one warning. Posing is my job, not yours. Show up, and I'll handle every angle, every hand, every \"what do I do with my face.\" 850+ women can confirm. The form's in my bio when you're ready to retire the phrase.\n\n#southbendphotographer #boudoirshoot #mishawaka #bodyconfidence #glamourphotography"
  },
  {
    "n": "3",
    "title": "The Calm Isn't Coming",
    "cover": "covers/face-3.jpg",
    "format": "The Waiting List",
    "script": "You'll do it when the kids are older. When work slows down. When life finally calms down.\nLife doesn't calm down. It just gets quieter about what it's taking.\nI hear it in consults every single week — from nurses, business owners, moms running three schedules at once. Never \"no.\" Always \"after.\"\nAnd I've photographed enough women to tell you what \"after\" actually costs.\nThe year you were forty-four and didn't know how good you looked. The decade your kids grew up with a mother who exists in six photos. Gone quietly. Nothing dramatic. Just never documented.\nOne woman told me at her reveal, \"I waited nine years for a calm that never came.\" She'd booked on a random Tuesday, in the middle of the chaos. Some of the best photographs I've ever taken.\nThe calm isn't a season that arrives. It's a room you decide to walk into.\nThe door's open.",
    "caption": "\"When life calms down\" is the most expensive sentence I hear. Life doesn't calm down — it just quietly stops waiting for you. You don't need a calm season to do this. You need one afternoon. The form's in my bio.\n\n#southbendphotographer #boudoirphotography #grangerindiana #selflovejourney #michianamoms"
  },
  {
    "n": "4",
    "title": "Show Up in Pajamas",
    "cover": "covers/face-4.jpg",
    "format": "The Prep List",
    "script": "Wear the ugliest, loosest thing you own to your photoshoot. I'm completely serious.\nEveryone thinks showing up put-together is the move — cute jeans, a real bra, the good outfit. That's the prep that backfires.\nHere's what nobody warns you about: elastic. Denim seams. Bra straps. They press lines into your skin that take an hour or more to fade — and that's the first hour of your session. I've watched women lose their favorite set waiting for a waistband mark to disappear.\nSo here's what my clients actually get told the night before.\nBaggy sweats. No bra under a zip-up hoodie. Loose slides, no tight socks. Show up looking like a Sunday morning, and your skin shows up flawless.\nHair and makeup happens here anyway. Nobody sees you arrive. There's a mimosa waiting either way.\nThe women who show up polished spend the first hour waiting for their skin to forget their jeans. The ones in pajamas walk straight into the best photos of their life.",
    "caption": "Save this for the night before your shoot: baggy sweats, no bra under a zip-up, loose slides, no tight socks. Strap marks and denim seams take an hour to fade on camera — and that's an hour of your session. Show up like a Sunday morning; hair and makeup happens here anyway, mimosa included. Screenshot it — and when you're ready to actually need this list, the form's in my bio.\n\n#southbendphotographer #boudoirshoot #michiana #photoshoottips #southbendindiana"
  },
  {
    "n": "★",
    "title": "The Lights Low",
    "format": "BTS Overlay · Overheard in the Studio",
    "bts": true,
    "screenTrial": "A woman asked me to keep the lights low. What she asked for two hours later is the reason I do this job. It's all in the description.",
    "screenGrid": "850 sessions in, one moment still gets me every single time. It happened again last week — I put the whole story in the caption 👇",
    "caption": "She walked in and asked if we could start with the lights low.\nSo we did. No questions. Half the lamps, soft music, easy poses.\nTwo hours later she stopped me mid-set and asked me to turn every single one of them all the way up.\nHere's the thing — she didn't get more beautiful in those two hours. Nothing about her changed. She just stopped hiding.\nThat's the whole job. Not the lighting. Not the posing. Watching a woman decide, somewhere between the first frame and the last, that she's done apologizing for taking up light.\nIf some version of you has been waiting to feel that — the form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #confidencejourney #southbendindiana",
    "cover": "covers/reel-5.jpg"
  }
];

function copy(text, btn, label){
  const done = () => {
    btn.classList.add("copied");
    const prev = btn.dataset.label;
    btn.textContent = "Copied ✓";
    setTimeout(()=>{ btn.classList.remove("copied"); btn.textContent = prev; }, 1400);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallback(text,done));
  } else { fallback(text,done); }
}
function fallback(text, done){
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{document.execCommand("copy");}catch(e){}
  document.body.removeChild(ta); done();
}
// Build a File synchronously from a data URI (no await — keeps iOS "user gesture" alive for share)
function b64ToFile(dataUri, filename){
  const c=dataUri.indexOf(","), meta=dataUri.slice(0,c), b64=dataUri.slice(c+1);
  const mime=(meta.match(/data:(.*?);/)||[,"image/jpeg"])[1];
  const bin=atob(b64), arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new File([arr], filename, {type:mime});
}
function saveImg(dataUri, name){
  const slug=(name||"reel").replace(/[^a-z0-9]+/gi,"-").toLowerCase();
  let file=null;
  try{ file=b64ToFile(dataUri, slug+"-cover.jpg"); }catch(e){}
  // Primary: iOS share sheet → "Save Image" to Photos. Called synchronously in the tap.
  if(file && navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file]}).catch(err=>{ if(!err||err.name!=="AbortError") openFull(dataUri); });
    return;
  }
  openFull(dataUri);
}
// Fallback: blow the image up full-screen so a long-press gives Save to Photos
function openFull(dataUri){
  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;z-index:99;background:#0c1322;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;gap:12px";
  const tip=document.createElement("div");
  tip.style.cssText="color:#eef0f5;font-size:15px;text-align:center;line-height:1.4";
  tip.innerHTML="Press &amp; hold the image → <b>Save to Photos</b>.<br>Tap the dark area to close.";
  const img=document.createElement("img"); img.src=dataUri;
  img.style.cssText="max-width:100%;max-height:80vh;border-radius:10px";
  ov.appendChild(tip); ov.appendChild(img);
  ov.addEventListener("click",e=>{ if(e.target===ov) document.body.removeChild(ov); });
  document.body.appendChild(ov);
}

document.getElementById("date").textContent = DATE;

const host = document.getElementById("cards");
DATA.forEach(d=>{
  const card=document.createElement("div");
  card.className="card"+(d.bts?" bts":"");
  card.innerHTML = `<div class="rhead"><span class="rnum">${d.n}</span><span class="rtitle">${d.title}</span></div><span class="chip">${d.format}</span>`;
  // BTS reels carry TWO on-screen texts (Trial + Grid); everything else is script + caption
  let blocks;
  if(d.bts && d.screenTrial && d.screenGrid){
    blocks=[
      {lbl:"On-screen text — TRIAL reel", txt:d.screenTrial, btn:"Copy Trial Text"},
      {lbl:"On-screen text — GRID post", txt:d.screenGrid, btn:"Copy Grid Text"},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  } else {
    blocks=[
      {lbl:(d.bts?"On-screen text":"Script"), txt:d.script, btn:(d.bts?"Copy On-Screen Text":"Copy Script")},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  }
  blocks.forEach((b,i)=>{
    if(i>0){ const hr=document.createElement("hr"); hr.className="divider"; card.appendChild(hr); }
    const lbl=document.createElement("div"); lbl.className="lbl"; lbl.textContent=b.lbl; card.appendChild(lbl);
    const txt=document.createElement("div"); txt.className="text"+(b.cap?" cap":""); txt.textContent=b.txt; card.appendChild(txt);
    const btn=document.createElement("button"); btn.className="btn "+(b.cap?"ghost":"primary");
    btn.dataset.label=b.btn; btn.textContent=b.btn;
    btn.addEventListener("click", ()=>copy(b.txt, btn));
    card.appendChild(btn);
  });
  if(d.cover){
    const cl=document.createElement("div"); cl.className="lbl"; cl.style.marginTop="16px";
    cl.innerHTML="Cover — press &amp; hold → Save to Photos"; card.appendChild(cl);
    const img=document.createElement("img"); img.className="cardcover"; img.src=d.cover; img.alt=d.title+" cover";
    card.appendChild(img);
  }
  host.appendChild(card);
});
</script>

</body></html>
