<style>
  :root{
    --navy:#0c1322; --navy2:#161d30; --card:#1a2340; --line:#2b3557;
    --gold:#ffbf8f; --gold-deep:#e0a878; --cream:#eef0f5; --muted:#94a0bb;
    --ok:#7fd1a6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:linear-gradient(178deg,#0c1322 0%,#161d30 60%,#131a2c 100%);
    color:var(--cream); -webkit-font-smoothing:antialiased;
    min-height:100vh; padding:22px 16px 60px;
  }
  .wrap{max-width:620px;margin:0 auto}
  .eyebrow{
    font-size:12px;letter-spacing:.32em;color:var(--gold-deep);
    text-transform:uppercase;font-weight:600;text-align:center;margin-bottom:8px;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;font-weight:600;
    font-size:34px;line-height:1.05;text-align:center;color:var(--cream);
    letter-spacing:.01em;text-wrap:balance;
  }
  .date{text-align:center;color:var(--muted);font-size:14px;margin-top:10px}
  .howto{
    text-align:center;color:var(--muted);font-size:13.5px;line-height:1.5;
    margin:14px auto 26px;max-width:440px;
  }
  .howto b{color:var(--cream);font-weight:600}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:20px 18px;margin-bottom:20px;
  }
  .card.bts{border-color:var(--gold-deep)}
  .rhead{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .rnum{
    font-family:Georgia,serif;font-size:26px;color:var(--gold);
    line-height:1;font-variant-numeric:tabular-nums;
  }
  .rtitle{font-family:Georgia,serif;font-size:21px;color:var(--cream);line-height:1.15}
  .chip{
    display:inline-block;margin:8px 0 16px;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--gold-deep);border:1px solid var(--line);
    border-radius:100px;padding:4px 11px;font-weight:600;
  }
  .lbl{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin:2px 0 8px;
  }
  .text{
    background:#111834;border:1px solid var(--line);border-radius:12px;
    padding:14px 15px;font-size:16px;line-height:1.62;color:#e7ebf6;
    white-space:pre-line;
  }
  .text.cap{color:#d2d9ec;font-size:15px}
  .btn{
    -webkit-appearance:none;appearance:none;border:none;cursor:pointer;
    width:100%;min-height:54px;border-radius:13px;margin:11px 0 4px;
    font-size:16px;font-weight:700;letter-spacing:.01em;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:transform .08s ease,background .2s ease,color .2s ease;
  }
  .btn:active{transform:scale(.985)}
  .btn.primary{background:var(--gold);color:#241608}
  .btn.ghost{background:transparent;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .btn.copied{background:var(--ok)!important;color:#0b2417!important;border-color:var(--ok)!important}
  .btn:focus-visible{outline:3px solid #6f8fe0;outline-offset:2px}
  .divider{height:1px;background:var(--line);border:none;margin:16px 0}
  img.cardcover{
    width:100%;max-width:250px;height:auto;display:block;margin:8px auto 0;
    border-radius:12px;border:1px solid var(--line);background:var(--navy);
  }
  .btn.save{background:#20304f;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .foot{text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;margin-top:30px}
  .foot b{color:var(--gold-deep)}
  @media (prefers-reduced-motion:reduce){.btn{transition:none}}
</style>

<div class="wrap">
  <div class="eyebrow">Mark Andrew Photography</div>
  <h1>Daily Reel Scripts</h1>
  <div class="date" id="date"></div>
  <p class="howto">Tap <b>Copy Script</b> → paste into your teleprompter. Tap <b>Copy Caption</b> → paste into Instagram. No selecting, no fighting your phone.</p>
  <div id="cards"></div>
  <p class="foot">Refreshes every morning at <b>5:30</b>. Add this page to your home screen so it opens like an app.<br>— Pickles</p>
</div>

<script>
const DATE = "Tuesday, July 7, 2026 — film any 2";
// Each DATA item may carry an optional `cover:"data:image/png;base64,..."` that the routine fills daily;
// it renders as a tap-to-save image directly under that reel's caption.
const DATA = [
  {
    n:"1", title:"You're Not Staying",
    cover:"covers/face-1.jpg", format:"Studio Rule · Ep. 1",
    script:`If you're not being photographed, you're not staying during the shoot.
Not your husband. Not your best friend. Not your mom who "just wants to watch."
I mean it, and here's why the rule exists.
The version of you I photograph shows up about twenty minutes after the robe comes off the hanger — when you stop performing for the room and start being in it. An audience of one keeps that woman hidden. She checks his face after every pose. She apologizes with her shoulders.
But alone with me and my wife on set? Different person entirely. Taller. Louder. Fifteen years lighter.
So the rule isn't me being difficult. The rule is me protecting the exact thing you came here to find.
Whoever drove you can wait at the coffee shop down the street. They get the surprise of their life at the reveal.
You didn't come here to be watched. You came here to be seen.`,
    caption:`The rule that shocks every husband: if you're not being photographed, you're not staying. It's not attitude — it's protection. The woman I'm here to photograph only shows up when the audience leaves. If you're ready to meet her, the form's in my bio.

#southbendphotographer #boudoirphotography #michiana #selfconfidence #womenover40`
  },
  {
    n:"2", title:"No Kids Allowed",
    cover:"covers/face-2.jpg", format:"Studio Rule · Ep. 2",
    script:`No kids allowed in my studio. Period. And it's the most loving rule I have.
Not because I don't like kids. I've got a house full of chaos myself.
It's because I know exactly what happens the second your daughter walks in. You stop being the subject and go right back to being the snack-getter, the referee, the "one second, honey" machine.
You've been that woman for fifteen years. Beautifully. Faithfully. On four hours of sleep.
But this whole day exists so you can remember who she was before everyone needed her.
Hair and makeup with a mimosa in your hand. Ninety minutes of someone directing every pose. An afternoon where the only name anyone says is yours.
Therefore: no kids. Not for my sake — for hers. For the woman who's about to see herself again.
The mom walks in. The woman walks out. That's the whole point.`,
    caption:`When we say no kids allowed, we mean NO. KIDS. ALLOWED. And every mother who's done a session with me eventually says the same thing: thank you for that rule. One day where nobody needs you. Imagine it. The form's in my bio when you're ready.

#southbendphotographer #boudoir #michianamoms #momlife #selfcare`
  },
  {
    n:"3", title:"3 Hours, Not 3 Weeks",
    cover:"covers/face-3.jpg", format:"Unpopular Opinion",
    script:`Most photographers make you wait two to four weeks to see your photos. You'll see 130 of yours the same afternoon.
Same day. Fully edited. On a 65-inch screen in 4K, hours after your last outfit.
Photographers hear this and tell me it's impossible. It's not impossible — it just requires getting the shot right when it happens.
Weeks of editing usually means fixing in a computer what should've been fixed in the room. The light. The pose. The angle. I fix those live, while you're standing in front of me, because that's the job.
So while you're at lunch, my editing finishes. By two o'clock you're on my couch watching yourself on a movie screen, ugly-crying the good tears.
And you take everything home the same day. No waiting by the phone. No wondering if they turned out.
You walk in nervous at nine. You leave holding proof by four.`,
    caption:`Two to four weeks of waiting means they didn't get the shot when it mattered. You'll watch 130 fully edited images on a 65-inch screen the same afternoon you shoot. That's not a brag — that's the standard. Form's in my bio.

#southbendphotographer #boudoirphotography #samedayreveal #michiana #luxuryexperience`
  },
  {
    n:"4", title:"The 15-Pound Lie",
    cover:"covers/face-4.jpg", format:"Waiting List",
    script:`The fifteen pounds isn't the reason you haven't booked. It's the excuse that feels the most responsible.
I've photographed over 850 women. You know how many lost the weight first? Almost none. You know how many wished they'd waited longer? Zero.
One client told me she'd been "fifteen pounds away" for six years. Six years of walking past mirrors fast. Six years of cropping herself out of family photos.
Her body didn't change before her session. The story she told about it did — in one afternoon, watching herself on a 65-inch screen.
Because here's what the scale never told her: the weight was never the thing in the way. The waiting was.
You don't earn the right to feel beautiful by shrinking first. You just decide to stop postponing it.
Right now. Today. Not fifteen pounds from now.`,
    caption:`"After I lose 15 pounds" is the most common sentence in my inbox — and the most expensive one. It's cost women in this town years. Your body isn't the obstacle. The waiting is. When you're done waiting, the form's in my bio.

#southbendphotographer #boudoir #bodyconfidence #michiana #everybodyisworthy`
  },
  {
    n:"★", title:"Reveal Reaction",
    cover:"covers/reel-5.jpg", format:"BTS Overlay · text over you working", bts:true,
    screenTrial:`Every woman says the same 4 words the second she sees her photos. They're never the ones you'd guess — I put them in the caption.`,
    screenGrid:`I've watched 850 women see themselves for the first time. What they say out loud every single time is in the description 👇`,
    caption:`"I had no idea."
Not "I had no idea the photos would be this good." That's not what they mean.
I had no idea I still looked like that. I had no idea she was still in there. I had no idea what my husband's been seeing this whole time.
850 women, and that sentence never stops landing the same way. That's the actual product — the photos are just the evidence.

#southbendphotographer #boudoirphotography #samedayreveal #michiana #confidence`
  }
];

function copy(text, btn, label){
  const done = () => {
    btn.classList.add("copied");
    const prev = btn.dataset.label;
    btn.textContent = "Copied ✓";
    setTimeout(()=>{ btn.classList.remove("copied"); btn.textContent = prev; }, 1400);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallback(text,done));
  } else { fallback(text,done); }
}
function fallback(text, done){
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{document.execCommand("copy");}catch(e){}
  document.body.removeChild(ta); done();
}
// Build a File synchronously from a data URI (no await — keeps iOS "user gesture" alive for share)
function b64ToFile(dataUri, filename){
  const c=dataUri.indexOf(","), meta=dataUri.slice(0,c), b64=dataUri.slice(c+1);
  const mime=(meta.match(/data:(.*?);/)||[,"image/jpeg"])[1];
  const bin=atob(b64), arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new File([arr], filename, {type:mime});
}
function saveImg(dataUri, name){
  const slug=(name||"reel").replace(/[^a-z0-9]+/gi,"-").toLowerCase();
  let file=null;
  try{ file=b64ToFile(dataUri, slug+"-cover.jpg"); }catch(e){}
  // Primary: iOS share sheet → "Save Image" to Photos. Called synchronously in the tap.
  if(file && navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file]}).catch(err=>{ if(!err||err.name!=="AbortError") openFull(dataUri); });
    return;
  }
  openFull(dataUri);
}
// Fallback: blow the image up full-screen so a long-press gives Save to Photos
function openFull(dataUri){
  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;z-index:99;background:#0c1322;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;gap:12px";
  const tip=document.createElement("div");
  tip.style.cssText="color:#eef0f5;font-size:15px;text-align:center;line-height:1.4";
  tip.innerHTML="Press &amp; hold the image → <b>Save to Photos</b>.<br>Tap the dark area to close.";
  const img=document.createElement("img"); img.src=dataUri;
  img.style.cssText="max-width:100%;max-height:80vh;border-radius:10px";
  ov.appendChild(tip); ov.appendChild(img);
  ov.addEventListener("click",e=>{ if(e.target===ov) document.body.removeChild(ov); });
  document.body.appendChild(ov);
}

document.getElementById("date").textContent = DATE;

const host = document.getElementById("cards");
DATA.forEach(d=>{
  const card=document.createElement("div");
  card.className="card"+(d.bts?" bts":"");
  card.innerHTML = `<div class="rhead"><span class="rnum">${d.n}</span><span class="rtitle">${d.title}</span></div><span class="chip">${d.format}</span>`;
  // BTS reels carry TWO on-screen texts (Trial + Grid); everything else is script + caption
  let blocks;
  if(d.bts && d.screenTrial && d.screenGrid){
    blocks=[
      {lbl:"On-screen text — TRIAL reel", txt:d.screenTrial, btn:"Copy Trial Text"},
      {lbl:"On-screen text — GRID post", txt:d.screenGrid, btn:"Copy Grid Text"},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  } else {
    blocks=[
      {lbl:(d.bts?"On-screen text":"Script"), txt:d.script, btn:(d.bts?"Copy On-Screen Text":"Copy Script")},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  }
  blocks.forEach((b,i)=>{
    if(i>0){ const hr=document.createElement("hr"); hr.className="divider"; card.appendChild(hr); }
    const lbl=document.createElement("div"); lbl.className="lbl"; lbl.textContent=b.lbl; card.appendChild(lbl);
    const txt=document.createElement("div"); txt.className="text"+(b.cap?" cap":""); txt.textContent=b.txt; card.appendChild(txt);
    const btn=document.createElement("button"); btn.className="btn "+(b.cap?"ghost":"primary");
    btn.dataset.label=b.btn; btn.textContent=b.btn;
    btn.addEventListener("click", ()=>copy(b.txt, btn));
    card.appendChild(btn);
  });
  if(d.cover){
    const cl=document.createElement("div"); cl.className="lbl"; cl.style.marginTop="16px";
    cl.innerHTML="Cover — press &amp; hold → Save to Photos"; card.appendChild(cl);
    const img=document.createElement("img"); img.className="cardcover"; img.src=d.cover; img.alt=d.title+" cover";
    card.appendChild(img);
  }
  host.appendChild(card);
});
</script>

<script>
const AD_DATA = [{"n": "A", "title": "Hiding in Every Family Photo", "angle": "Brutal callout", "hooks": ["Look at your last family photo. You're hiding half your body behind your husband. Again.", "Every family photo you're in — and I mean every one — you're standing BEHIND somebody.", "Your kids have 4,000 photos of their childhood and their mom is in nine of them. Nine.", "You have a pose you do in pictures. It's called the human shield. Kid in front. Arm across. Angle away.", "Someday your kids will look for pictures of you. What are they going to find?"], "script": "So here's what me and my team do about that — and it's not what you think.\nYou spend one day with us. Hair. Makeup. And you don't have to know how to pose — I pose you head to toe, every single shot. Hands, chin, breath. That part's my job.\nAnd then, the same afternoon, something happens that most women don't believe until they're sitting there.\nA hundred and thirty finished images. On a 65-inch screen. That day. Not next month — before dinner.\nAnd the woman on that screen isn't hiding behind anybody.\nFill out the form below for more information — and you'll get 50% off your photo shoot."}, {"n": "B", "title": "The Parking Lot", "angle": "Story", "hooks": ["A woman sat in the parking lot for twenty minutes last month, deciding whether to come in.", "She cancelled on me three times. THREE. What she said at her reveal is why I'm making this video.", "\"I'll book it when I lose ten pounds.\" She said that two years ago. She's still waiting. The weight isn't the problem.", "The most confident woman I photographed this year almost didn't get out of her car.", "I watched a woman cry looking at a photo of herself. Not the sad kind. Let me tell you what happened in the six hours before that."], "script": "I know, because she told me at her reveal — while she was looking at a version of herself she hadn't seen in fifteen years.\nShe almost cancelled three times. Said she wanted to lose ten pounds first. Said she didn't have the body for it.\nHere's what she didn't know.\nThere's no body type for a boudoir shoot. Me and my team have photographed women from 21 into their 70s — every body, every story.\nHair and makeup takes an hour. I direct every single pose. And the same afternoon — this is the part she didn't believe —\nshe watched 130 finished images of herself on a 65-inch screen, and cried in the good way.\nTwenty minutes in the parking lot. Fifteen years of avoiding cameras. Gone in one day.\nFill out the form below for more information, and you'll get 50% off your shoot."}, {"n": "C", "title": "Not For Your Husband", "angle": "Contrarian / myth-bust", "hooks": ["Boudoir photos are not for your husband. I said what I said.", "Husbands don't book boudoir shoots. Women who are done hiding do. The album's just a bonus for him.", "The biggest myth in boudoir photography? That it's a gift for HIM.", "Every woman says the same thing when she books: \"It's for my husband.\" By the reveal, none of them are talking about their husband.", "There's a 65-inch TV in my reveal room, and every week it makes a grown woman cry. In the good way."], "script": "Yes — he can have the album. He will lose his mind over the album.\nBut me and my team have photographed hundreds of women, and I'll tell you what actually happens at the reveal —\nbecause there's a moment, every single time, when the first image comes up on that 65-inch screen. Same day. Full hair and makeup. Posed by me, so she never had to guess what to do.\nAnd in that moment, she's not thinking about him at all.\nShe's thinking: \"THAT's what I look like?\"\nThat's who these are for.\nFill out the form below for more information — 50% off your shoot when you do."}];
(function(){
  const host = document.getElementById("cards");
  const hd = document.createElement("div");
  hd.style.cssText = "margin:34px 0 18px;text-align:center;";
  hd.innerHTML = '<div class="eyebrow" style="margin-bottom:6px">Facebook Ad Scripts</div>'
    + '<div style="font-family:Georgia,serif;font-size:24px;color:var(--cream)">50% Off Campaign — 3 Reels</div>'
    + '<div style="color:var(--muted);font-size:13px;margin-top:6px">Pick ONE hook per reel, then read the script. These stay put at <b style="color:var(--gold-deep)">/pickles-daily/ads/</b> after tonight.</div>';
  host.appendChild(hd);
  AD_DATA.forEach(d=>{
    const card=document.createElement("div");
    card.className="card";
    card.style.borderColor="#5a6c9e";
    card.innerHTML = `<div class="rhead"><span class="rnum">${d.n}</span><span class="rtitle">${d.title}</span></div><span class="chip">AD &middot; ${d.angle}</span>`;
    const hl=document.createElement("div"); hl.className="lbl"; hl.textContent="Hooks — pick one (tap to copy)"; card.appendChild(hl);
    d.hooks.forEach((h,idx)=>{
      const row=document.createElement("div"); row.className="text"; row.style.cssText="margin-bottom:7px;cursor:pointer;font-size:15px;";
      row.textContent = (idx+1)+". "+h;
      row.addEventListener("click",()=>{ copy(h,{classList:{add(){},remove(){}},dataset:{}}); row.style.borderColor="var(--ok)"; row.style.color="#bfeeD5".toLowerCase(); setTimeout(()=>{row.style.borderColor="";row.style.color="";},1200); });
      card.appendChild(row);
    });
    const hr=document.createElement("hr"); hr.className="divider"; card.appendChild(hr);
    const sl=document.createElement("div"); sl.className="lbl"; sl.textContent="Script (everything after the hook)"; card.appendChild(sl);
    const txt=document.createElement("div"); txt.className="text"; txt.textContent=d.script; card.appendChild(txt);
    const btn=document.createElement("button"); btn.className="btn primary"; btn.dataset.label="Copy Script"; btn.textContent="Copy Script";
    btn.addEventListener("click",()=>copy(d.script,btn)); card.appendChild(btn);
    host.appendChild(card);
  });
})();
</script>
