<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Daily Reel Scripts — Mark Andrew</title></head><body>
<style>
  :root{
    --navy:#0c1322; --navy2:#161d30; --card:#1a2340; --line:#2b3557;
    --gold:#ffbf8f; --gold-deep:#e0a878; --cream:#eef0f5; --muted:#94a0bb;
    --ok:#7fd1a6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:linear-gradient(178deg,#0c1322 0%,#161d30 60%,#131a2c 100%);
    color:var(--cream); -webkit-font-smoothing:antialiased;
    min-height:100vh; padding:22px 16px 60px;
  }
  .wrap{max-width:620px;margin:0 auto}
  .eyebrow{
    font-size:12px;letter-spacing:.32em;color:var(--gold-deep);
    text-transform:uppercase;font-weight:600;text-align:center;margin-bottom:8px;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;font-weight:600;
    font-size:34px;line-height:1.05;text-align:center;color:var(--cream);
    letter-spacing:.01em;text-wrap:balance;
  }
  .date{text-align:center;color:var(--muted);font-size:14px;margin-top:10px}
  .howto{
    text-align:center;color:var(--muted);font-size:13.5px;line-height:1.5;
    margin:14px auto 26px;max-width:440px;
  }
  .howto b{color:var(--cream);font-weight:600}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:20px 18px;margin-bottom:20px;
  }
  .card.bts{border-color:var(--gold-deep)}
  .rhead{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .rnum{
    font-family:Georgia,serif;font-size:26px;color:var(--gold);
    line-height:1;font-variant-numeric:tabular-nums;
  }
  .rtitle{font-family:Georgia,serif;font-size:21px;color:var(--cream);line-height:1.15}
  .chip{
    display:inline-block;margin:8px 0 16px;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--gold-deep);border:1px solid var(--line);
    border-radius:100px;padding:4px 11px;font-weight:600;
  }
  .lbl{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin:2px 0 8px;
  }
  .text{
    background:#111834;border:1px solid var(--line);border-radius:12px;
    padding:14px 15px;font-size:16px;line-height:1.62;color:#e7ebf6;
    white-space:pre-line;
  }
  .text.cap{color:#d2d9ec;font-size:15px}
  .btn{
    -webkit-appearance:none;appearance:none;border:none;cursor:pointer;
    width:100%;min-height:54px;border-radius:13px;margin:11px 0 4px;
    font-size:16px;font-weight:700;letter-spacing:.01em;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:transform .08s ease,background .2s ease,color .2s ease;
  }
  .btn:active{transform:scale(.985)}
  .btn.primary{background:var(--gold);color:#241608}
  .btn.ghost{background:transparent;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .btn.copied{background:var(--ok)!important;color:#0b2417!important;border-color:var(--ok)!important}
  .btn:focus-visible{outline:3px solid #6f8fe0;outline-offset:2px}
  .divider{height:1px;background:var(--line);border:none;margin:16px 0}
  img.cardcover{
    width:100%;max-width:250px;height:auto;display:block;margin:8px auto 0;
    border-radius:12px;border:1px solid var(--line);background:var(--navy);
  }
  .btn.save{background:#20304f;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .foot{text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;margin-top:30px}
  .foot b{color:var(--gold-deep)}
  @media (prefers-reduced-motion:reduce){.btn{transition:none}}
</style>

<div class="wrap">
  <div class="eyebrow">Mark Andrew Photography</div>
  <h1>Daily Reel Scripts</h1>
  <div class="date" id="date"></div>
  <p class="howto">Tap <b>Copy Script</b> → paste into your teleprompter. Tap <b>Copy Caption</b> → paste into Instagram. No selecting, no fighting your phone.</p>
  <div id="cards"></div>
  <p class="foot">Refreshes every morning at <b>5:30</b>. Add this page to your home screen so it opens like an app.<br>— Pickles</p>
</div>

<script>
const DATE = "Friday, July 10, 2026 — film any 2";
// Each DATA item may carry an optional `cover:"data:image/png;base64,..."` that the routine fills daily;
// it renders as a tap-to-save image directly under that reel's caption.
const DATA = [
  {
    n:"1", title:"He Doesn't Get a Preview", format:"Studio Rule · Ep. 6", cover:"covers/face-1.jpg",
    script:`If you're not being photographed here, your husband finds out what you shot at the reveal — not one second before. That's studio rule number six.
No sneak peeks texted from the parking lot. No "just one" to hold him over. Nothing until you decide.
And I'm strict about it for a reason that has nothing to do with him. It's for you.
The second a woman knows someone has already seen the photos, she starts performing for that person instead of being herself with me. She poses for his reaction. She shrinks the parts she thinks he'll judge.
But when these images are a sealed surprise? She shoots for herself. That's the whole difference, and it's why the reveal lands the way it does.
Here's what actually happens: he sees them for the first time when you hand them over, on your terms, in your moment. You control it. You always did.
The photos are the gift. The rule is what keeps them one.
When you're ready, the form's in my bio.`,
    caption:`Studio rule number six: nobody gets a preview — not even him. When a woman knows someone's already peeked, she stops shooting for herself and starts performing. Sealed surprise, every time. You decide who sees them and when. When you're ready, the form's in my bio.

#southbendphotographer #boudoirphotography #michiana #womenover40 #samedayreveal`
  },
  {
    n:"2", title:"They Profit Off 'Not Yet'", format:"Unpopular Opinion", cover:"covers/face-2.jpg",
    script:`Unpopular opinion: the photography industry makes money off women feeling like they're not ready yet.
Not ready until you lose the weight. Not ready until the kids are older. Not ready until you "get yourself together." Every one of those is a delay, and delay is good for business. It keeps you scrolling, comparing, waiting for a version of you that never quite arrives.
I've photographed over 850 women. You want to know how many were actually ready? None of them. They just stopped believing they had to be.
Ready is a moving target somebody sells you so you keep chasing it. The women who book aren't more confident than you are. They just called the bluff.
Here's what I'll say that most won't: you are not a before picture waiting for an after. You are already the subject.
Stop waiting for ready. Ready was never the price of admission.
When you decide, the form's in my bio.`,
    caption:`Unpopular opinion: a whole industry profits off women believing they're not ready yet. Not thin enough, not young enough, not "together" enough. I've photographed 850 women and not one of them was ready — they just stopped waiting to be. You're not a before picture. The form's in my bio when you're done waiting.

#southbendphotographer #boudoirphotography #michiana #bodyconfidence #womenempowerment`
  },
  {
    n:"3", title:"You Won't Remember the Number", format:"The Waiting List", cover:"covers/face-3.jpg",
    script:`In thirty years, you won't remember what the scale said this morning. You'll have proof of how you actually looked.
Think about that. The number you've let run your whole week — the one that decided whether you felt allowed to be in a photo today — you won't be able to recall it. Not the digit, not the mood it put you in. Gone.
But a photograph doesn't disappear. Thirty years from now your daughter is holding one, and she isn't counting pounds. She's looking at her mother, in her prime, finally letting herself be seen.
That's the part the scale never tells you. It measures the one thing time erases and ignores the one thing that lasts.
You are not too much and you are not too little. You are, right now, exactly the woman someone will one day wish they had more pictures of.
Don't make them go looking and come up short.
When you're ready, the form's in my bio.`,
    caption:`In thirty years you won't remember what the scale said today. But someone will be holding a photograph of you — and they won't be counting pounds. They'll be looking at their mother, in her prime, finally letting herself be seen. Don't make them go looking and come up short. The form's in my bio.

#southbendphotographer #boudoirphotography #michiana #selflove #womenover40`
  },
  {
    n:"4", title:"Relaxed in 90 Seconds", format:"Prep List", cover:"covers/face-4.jpg",
    script:`The one thing I do in the first ninety seconds is why every woman relaxes — and most photographers skip it entirely.
I don't pick up the camera. Not right away.
Ninety percent of the nerves you walk in with aren't about your body. They're about not knowing what happens next — where to stand, what to do with your hands, whether you're doing it wrong. So before a single frame, I walk you through the whole thing. Every pose is directed. You never have to guess. You never have to invent anything.
Once your brain knows you can't get it wrong, your shoulders drop. Your face softens. That's the woman I photograph.
Most shooters raise the camera first and wonder why she looks stiff. She's stiff because she's lost. Give her the map, and she's home.
So if you've been scared you'll be bad at it — you can't be. That's my job, not yours.
When you're ready, the form's in my bio.`,
    caption:`The reason every woman relaxes in the first 90 seconds? I don't pick up the camera yet. Most of the nerves aren't about your body — they're about not knowing what to do next. So I direct every pose. You never guess, you never invent. Once you know you can't get it wrong, your whole body lets go. You can't be bad at this. That's my job. The form's in my bio.

#southbendphotographer #boudoirphotography #michiana #posingtips #luxuryexperience`
  },
  {
    n:"★", title:"Overheard Mid-Shoot", format:"BTS Overlay · Overheard in the Studio", bts:true,
    screenTrial:`Real things women have said to me mid-shoot. Number three got my wife involved — they're all in the caption.`,
    screenGrid:`850 women in front of my camera, and these are the lines I'll never forget. Every one is in the description 👇`,
    caption:`Real things women have actually said to me mid-shoot:
1. "Don't make me look sexy." Ma'am, that's the one thing I can't prevent.
2. "My husband is going to love these. My boyfriend is going to lose his mind." (I did not ask.)
3. "Wait — can my wife come see? I need a witness that I looked like THIS." That's the one that got my wife on set. She agreed.
4. "I almost cancelled this morning. Thank God I'm bad at cancelling."
Eight hundred and fifty women, and the room says something honest every single time. The photos are the product. The conversations are the reason I still love the job.
Which one's you? Tell me in the comments.

#southbendphotographer #boudoirphotography #michiana #womenover40 #confidence`
  }
];

function copy(text, btn, label){
  const done = () => {
    btn.classList.add("copied");
    const prev = btn.dataset.label;
    btn.textContent = "Copied ✓";
    setTimeout(()=>{ btn.classList.remove("copied"); btn.textContent = prev; }, 1400);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallback(text,done));
  } else { fallback(text,done); }
}
function fallback(text, done){
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{document.execCommand("copy");}catch(e){}
  document.body.removeChild(ta); done();
}
// Build a File synchronously from a data URI (no await — keeps iOS "user gesture" alive for share)
function b64ToFile(dataUri, filename){
  const c=dataUri.indexOf(","), meta=dataUri.slice(0,c), b64=dataUri.slice(c+1);
  const mime=(meta.match(/data:(.*?);/)||[,"image/jpeg"])[1];
  const bin=atob(b64), arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new File([arr], filename, {type:mime});
}
function saveImg(dataUri, name){
  const slug=(name||"reel").replace(/[^a-z0-9]+/gi,"-").toLowerCase();
  let file=null;
  try{ file=b64ToFile(dataUri, slug+"-cover.jpg"); }catch(e){}
  // Primary: iOS share sheet → "Save Image" to Photos. Called synchronously in the tap.
  if(file && navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file]}).catch(err=>{ if(!err||err.name!=="AbortError") openFull(dataUri); });
    return;
  }
  openFull(dataUri);
}
// Fallback: blow the image up full-screen so a long-press gives Save to Photos
function openFull(dataUri){
  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;z-index:99;background:#0c1322;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;gap:12px";
  const tip=document.createElement("div");
  tip.style.cssText="color:#eef0f5;font-size:15px;text-align:center;line-height:1.4";
  tip.innerHTML="Press &amp; hold the image → <b>Save to Photos</b>.<br>Tap the dark area to close.";
  const img=document.createElement("img"); img.src=dataUri;
  img.style.cssText="max-width:100%;max-height:80vh;border-radius:10px";
  ov.appendChild(tip); ov.appendChild(img);
  ov.addEventListener("click",e=>{ if(e.target===ov) document.body.removeChild(ov); });
  document.body.appendChild(ov);
}

document.getElementById("date").textContent = DATE;

const host = document.getElementById("cards");
DATA.forEach(d=>{
  const card=document.createElement("div");
  card.className="card"+(d.bts?" bts":"");
  card.innerHTML = `<div class="rhead"><span class="rnum">${d.n}</span><span class="rtitle">${d.title}</span></div><span class="chip">${d.format}</span>`;
  // BTS reels carry TWO on-screen texts (Trial + Grid); everything else is script + caption
  let blocks;
  if(d.bts && d.screenTrial && d.screenGrid){
    blocks=[
      {lbl:"On-screen text — TRIAL reel", txt:d.screenTrial, btn:"Copy Trial Text"},
      {lbl:"On-screen text — GRID post", txt:d.screenGrid, btn:"Copy Grid Text"},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  } else {
    blocks=[
      {lbl:(d.bts?"On-screen text":"Script"), txt:d.script, btn:(d.bts?"Copy On-Screen Text":"Copy Script")},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  }
  blocks.forEach((b,i)=>{
    if(i>0){ const hr=document.createElement("hr"); hr.className="divider"; card.appendChild(hr); }
    const lbl=document.createElement("div"); lbl.className="lbl"; lbl.textContent=b.lbl; card.appendChild(lbl);
    const txt=document.createElement("div"); txt.className="text"+(b.cap?" cap":""); txt.textContent=b.txt; card.appendChild(txt);
    const btn=document.createElement("button"); btn.className="btn "+(b.cap?"ghost":"primary");
    btn.dataset.label=b.btn; btn.textContent=b.btn;
    btn.addEventListener("click", ()=>copy(b.txt, btn));
    card.appendChild(btn);
  });
  if(d.cover){
    const cl=document.createElement("div"); cl.className="lbl"; cl.style.marginTop="16px";
    cl.innerHTML="Cover — press &amp; hold → Save to Photos"; card.appendChild(cl);
    const img=document.createElement("img"); img.className="cardcover"; img.src=d.cover; img.alt=d.title+" cover";
    card.appendChild(img);
  }
  host.appendChild(card);
});
</script>

</body></html>
