<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="robots" content="noindex,nofollow"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Daily Reel Scripts — Mark Andrew</title></head><body>
<style>
  :root{
    --navy:#0c1322; --navy2:#161d30; --card:#1a2340; --line:#2b3557;
    --gold:#ffbf8f; --gold-deep:#e0a878; --cream:#eef0f5; --muted:#94a0bb;
    --ok:#7fd1a6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:linear-gradient(178deg,#0c1322 0%,#161d30 60%,#131a2c 100%);
    color:var(--cream); -webkit-font-smoothing:antialiased;
    min-height:100vh; padding:22px 16px 60px;
  }
  .wrap{max-width:620px;margin:0 auto}
  .eyebrow{
    font-size:12px;letter-spacing:.32em;color:var(--gold-deep);
    text-transform:uppercase;font-weight:600;text-align:center;margin-bottom:8px;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;font-weight:600;
    font-size:34px;line-height:1.05;text-align:center;color:var(--cream);
    letter-spacing:.01em;text-wrap:balance;
  }
  .date{text-align:center;color:var(--muted);font-size:14px;margin-top:10px}
  .howto{
    text-align:center;color:var(--muted);font-size:13.5px;line-height:1.5;
    margin:14px auto 26px;max-width:440px;
  }
  .howto b{color:var(--cream);font-weight:600}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:20px 18px;margin-bottom:20px;
  }
  .card.bts{border-color:var(--gold-deep)}
  .rhead{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .rnum{
    font-family:Georgia,serif;font-size:26px;color:var(--gold);
    line-height:1;font-variant-numeric:tabular-nums;
  }
  .rtitle{font-family:Georgia,serif;font-size:21px;color:var(--cream);line-height:1.15}
  .chip{
    display:inline-block;margin:8px 0 16px;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--gold-deep);border:1px solid var(--line);
    border-radius:100px;padding:4px 11px;font-weight:600;
  }
  .lbl{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin:2px 0 8px;
  }
  .text{
    background:#111834;border:1px solid var(--line);border-radius:12px;
    padding:14px 15px;font-size:16px;line-height:1.62;color:#e7ebf6;
    white-space:pre-line;
  }
  .text.cap{color:#d2d9ec;font-size:15px}
  .btn{
    -webkit-appearance:none;appearance:none;border:none;cursor:pointer;
    width:100%;min-height:54px;border-radius:13px;margin:11px 0 4px;
    font-size:16px;font-weight:700;letter-spacing:.01em;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:transform .08s ease,background .2s ease,color .2s ease;
  }
  .btn:active{transform:scale(.985)}
  .btn.primary{background:var(--gold);color:#241608}
  .btn.ghost{background:transparent;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .btn.copied{background:var(--ok)!important;color:#0b2417!important;border-color:var(--ok)!important}
  .btn:focus-visible{outline:3px solid #6f8fe0;outline-offset:2px}
  .divider{height:1px;background:var(--line);border:none;margin:16px 0}
  img.cardcover{
    width:100%;max-width:250px;height:auto;display:block;margin:8px auto 0;
    border-radius:12px;border:1px solid var(--line);background:var(--navy);
  }
  .btn.save{background:#20304f;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .foot{text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;margin-top:30px}
  .foot b{color:var(--gold-deep)}
  @media (prefers-reduced-motion:reduce){.btn{transition:none}}
</style>

<div class="wrap">
  <div class="eyebrow">Mark Andrew Photography</div>
  <h1>Daily Reel Scripts</h1>
  <div class="date" id="date"></div>
  <p class="howto">Tap <b>Copy Script</b> → paste into your teleprompter. Tap <b>Copy Caption</b> → paste into Instagram. No selecting, no fighting your phone.</p>
  <div id="cards"></div>
  <p class="foot">Refreshes every morning at <b>5:30</b>. Add this page to your home screen so it opens like an app.<br>— Pickles</p>
</div>

<script>
const DATE = "Wednesday, July 15, 2026 — film any 2";
// Each DATA item may carry an optional `cover:"data:image/png;base64,..."` that the routine fills daily;
// it renders as a tap-to-save image directly under that reel's caption.
const DATA = [
  {
    "n": "1",
    "title": "It Was Never a Gift for Him",
    "cover": "covers/face-1.jpg",
    "format": "Unpopular Opinion",
    "script": "Unpopular opinion: this was never a gift for your husband.\nI know that's how it gets sold. Wrap it up, put a bow on it, hand him the album on your anniversary. And look — he's going to love it. That's not the part I'm arguing with.\nI'm arguing with the idea that you needed a reason. That the only way you could justify three hours of somebody's full attention was to turn yourself into a present for another person.\nHere's what actually happens. You walk in apologizing. You sit in my chair at nine in the morning and list every single thing you'd change about yourself. And by three o'clock you're staring at a hundred and forty finished photos of a woman you haven't seen in about a decade — and your husband hasn't walked through the door yet. He wasn't in the room for the part that mattered.\nHe gets a beautiful album. You get yourself back.\nGive him the album. Keep the rest.",
    "caption": "Unpopular opinion: this was never a gift for your husband.\n\nThat's just how it gets sold — wrap it up, hand it over, call it an anniversary present. And he'll love it. That's not what I'm arguing with. I'm arguing with the idea that you needed a reason at all.\n\nYou walk in at 9 a.m. apologizing for your body. By 3 p.m. you're looking at 140 finished photos of a woman you haven't seen in ten years — and he hasn't walked in the door yet. He wasn't there for the part that mattered.\n\nHe gets a beautiful album. You get yourself back. The form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #womenover40 #selflovejourney"
  },
  {
    "n": "2",
    "title": "The Lights Stay On",
    "cover": "covers/face-2.jpg",
    "format": "Studio Rule · Ep. 9",
    "script": "The lights stay on the entire session. Studio rule number nine, and it's the one people ask me to break the most.\nSomebody always asks. Can we dim it? Can we do the moody thing, the shadow across the middle, the lighting that hides me a little? And I understand it. If you've spent twenty years being told that flattering means hidden, a dark room feels like mercy.\nHere's why the answer is no. Shadow doesn't make you look better. It makes you harder to see. And if you spend three hours being carefully obscured, you don't leave with proof that you're beautiful — you leave with proof that I agreed you needed covering up.\nSo I light you. Fully, deliberately, the way they lit women in the old films. Bold, bright, nothing hidden, nothing apologized for.\nYou didn't drive all the way here to disappear into a flattering shadow.\nYou came here to be seen. So the lights stay on.",
    "caption": "Studio rule number nine: the lights stay on the whole session. It's the rule people ask me to break the most.\n\n\"Can we dim it? Can we do the moody thing, the shadow that hides me a little?\" I get it — if you've spent twenty years being told flattering means hidden, a dark room feels like mercy.\n\nBut shadow doesn't make you look better. It makes you harder to see. Three hours of being carefully obscured doesn't prove you're beautiful — it proves I agreed you needed covering.\n\nSo I light you like they lit women in the old films. Bold. Bright. Nothing hidden. You came here to be seen. The form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #glamourphotography #southbendindiana"
  },
  {
    "n": "3",
    "title": "They Just Need You In It",
    "cover": "covers/face-3.jpg",
    "format": "The Waiting List",
    "script": "You keep saying you'll do it when you lose the weight.\nI want to sit with that for a second, because I've heard that sentence more times than I can count, and I have never once heard it end.\nYour kids are not waiting for a thinner mom to show up in the photographs. They are not going to open an album in twenty years and think, thank god she waited until she was smaller. They're going to look for you. And they're going to find four thousand pictures of birthdays and beaches and Christmas mornings — and you're behind the camera in every single one of them.\nThat's the real cost of waiting. It was never the weight. It's the absence.\nYou don't need a smaller body to be worth a photograph. You need one afternoon where you stop negotiating with yourself and let somebody take the picture.\nYour kids don't need a thinner mom in the pictures.\nThey need one who's in them.",
    "caption": "\"I'll do it when I lose the weight.\" I've heard that sentence more times than I can count — and I've never once heard it end.\n\nYour kids aren't waiting for a thinner mom to show up in the photos. In twenty years they won't open an album and think \"thank god she waited.\" They'll look for you. And they'll find 4,000 pictures of birthdays and beaches and Christmas mornings with you behind the camera in every one.\n\nThat's the real cost of waiting. It was never the weight. It's the absence.\n\nYour kids don't need a thinner mom in the pictures. They need one who's in them. The form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #momsofinstagram #womenover40"
  },
  {
    "n": "4",
    "title": "She Almost Drove Home",
    "cover": "covers/face-4.jpg",
    "format": "Overheard in the Studio",
    "script": "\"I almost cancelled in the parking lot.\" Four different women said that to me last month.\nNever in the parking lot, though. Always after. At the reveal, sitting in front of the screen, usually crying a little, and it comes out like a confession. I sat out there for ten minutes. I had my hand on the gear shift. I almost drove home.\nAnd every time I tell them the same thing. You're not the first one, and you're not brave for walking in. You just did the last hard part.\nBecause that parking lot is the whole thing. Everything you're afraid of lives out there — the doubt, the excuses, the voice telling you this is ridiculous. The second you're through the door you're not nervous anymore, you're busy. Hair, makeup, music, laughing at yourself in a mirror.\nFour women. One month. Same parking lot, same ending.\nAll four cried at the reveal. Not one of them cried in the car.",
    "caption": "\"I almost cancelled in the parking lot.\" Four different women told me that last month.\n\nNever in the parking lot, though — always after. At the reveal, in front of the screen, usually crying a little, and it comes out like a confession. \"I sat out there ten minutes. I almost drove home.\"\n\nHere's what I tell every one of them: you're not brave for walking in. You just did the last hard part. That parking lot IS the thing. Every fear you have lives out there. The second you're through the door you're not nervous, you're busy — hair, makeup, music, laughing at yourself in the mirror.\n\nFour women, one month, same ending. All four cried at the reveal. Not one cried in the car. The form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #mishawaka #womensconfidence"
  },
  {
    "n": "★",
    "title": "The Question I Stopped Asking",
    "format": "BTS Overlay · Prep List",
    "cover": "covers/reel-5.jpg",
    "screenTrial": "I don't ask women what they want to look like. After 850 sessions I ask one different question instead — and it changes every photo we take. The question is in the caption.",
    "screenGrid": "There's one question I ask before I ever pick up a camera, and it's the reason my clients cry at the reveal. Most photographers never ask it — it's all in the description 👇",
    "caption": "The question is: what do you want to FEEL?\n\nNot what do you want to look like. Every photographer asks that one, and it gets you a list — thinner arms, better angle, hide this, fix that. It's a list of everything she's been taught to be embarrassed about, and if I build a session off that list, I'm just photographing her insecurities in better lighting.\n\nSo I stopped asking it. Now I ask what she wants to feel. Powerful. Untouchable. Soft, for once. Like the version of herself she was before everybody needed something from her.\n\nThat answer decides everything — the light, the set, the music, the pace, which of the 140 photos I put in front of her first. \"Thinner arms\" gives me nothing to build. \"I want to feel like I'm not invisible anymore\" gives me a whole day.\n\nCome ready to answer that one. It's the only prep that actually matters. The form's in my bio.\n\n#southbendphotographer #boudoirphotography #michiana #photoshootprep #womenover40",
    "bts": true
  }
];

function copy(text, btn, label){
  const done = () => {
    btn.classList.add("copied");
    const prev = btn.dataset.label;
    btn.textContent = "Copied ✓";
    setTimeout(()=>{ btn.classList.remove("copied"); btn.textContent = prev; }, 1400);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallback(text,done));
  } else { fallback(text,done); }
}
function fallback(text, done){
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{document.execCommand("copy");}catch(e){}
  document.body.removeChild(ta); done();
}
// Build a File synchronously from a data URI (no await — keeps iOS "user gesture" alive for share)
function b64ToFile(dataUri, filename){
  const c=dataUri.indexOf(","), meta=dataUri.slice(0,c), b64=dataUri.slice(c+1);
  const mime=(meta.match(/data:(.*?);/)||[,"image/jpeg"])[1];
  const bin=atob(b64), arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new File([arr], filename, {type:mime});
}
function saveImg(dataUri, name){
  const slug=(name||"reel").replace(/[^a-z0-9]+/gi,"-").toLowerCase();
  let file=null;
  try{ file=b64ToFile(dataUri, slug+"-cover.jpg"); }catch(e){}
  // Primary: iOS share sheet → "Save Image" to Photos. Called synchronously in the tap.
  if(file && navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file]}).catch(err=>{ if(!err||err.name!=="AbortError") openFull(dataUri); });
    return;
  }
  openFull(dataUri);
}
// Fallback: blow the image up full-screen so a long-press gives Save to Photos
function openFull(dataUri){
  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;z-index:99;background:#0c1322;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;gap:12px";
  const tip=document.createElement("div");
  tip.style.cssText="color:#eef0f5;font-size:15px;text-align:center;line-height:1.4";
  tip.innerHTML="Press &amp; hold the image → <b>Save to Photos</b>.<br>Tap the dark area to close.";
  const img=document.createElement("img"); img.src=dataUri;
  img.style.cssText="max-width:100%;max-height:80vh;border-radius:10px";
  ov.appendChild(tip); ov.appendChild(img);
  ov.addEventListener("click",e=>{ if(e.target===ov) document.body.removeChild(ov); });
  document.body.appendChild(ov);
}

document.getElementById("date").textContent = DATE;

const host = document.getElementById("cards");
DATA.forEach(d=>{
  const card=document.createElement("div");
  card.className="card"+(d.bts?" bts":"");
  card.innerHTML = `<div class="rhead"><span class="rnum">${d.n}</span><span class="rtitle">${d.title}</span></div><span class="chip">${d.format}</span>`;
  // BTS reels carry TWO on-screen texts (Trial + Grid); everything else is script + caption
  let blocks;
  if(d.bts && d.screenTrial && d.screenGrid){
    blocks=[
      {lbl:"On-screen text — TRIAL reel", txt:d.screenTrial, btn:"Copy Trial Text"},
      {lbl:"On-screen text — GRID post", txt:d.screenGrid, btn:"Copy Grid Text"},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  } else {
    blocks=[
      {lbl:(d.bts?"On-screen text":"Script"), txt:d.script, btn:(d.bts?"Copy On-Screen Text":"Copy Script")},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  }
  blocks.forEach((b,i)=>{
    if(i>0){ const hr=document.createElement("hr"); hr.className="divider"; card.appendChild(hr); }
    const lbl=document.createElement("div"); lbl.className="lbl"; lbl.textContent=b.lbl; card.appendChild(lbl);
    const txt=document.createElement("div"); txt.className="text"+(b.cap?" cap":""); txt.textContent=b.txt; card.appendChild(txt);
    const btn=document.createElement("button"); btn.className="btn "+(b.cap?"ghost":"primary");
    btn.dataset.label=b.btn; btn.textContent=b.btn;
    btn.addEventListener("click", ()=>copy(b.txt, btn));
    card.appendChild(btn);
  });
  if(d.cover){
    const cl=document.createElement("div"); cl.className="lbl"; cl.style.marginTop="16px";
    cl.innerHTML="Cover — press &amp; hold → Save to Photos"; card.appendChild(cl);
    const img=document.createElement("img"); img.className="cardcover"; img.src=d.cover; img.alt=d.title+" cover";
    card.appendChild(img);
  }
  host.appendChild(card);
});
</script>

</body></html>
