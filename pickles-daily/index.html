<style>
  :root{
    --navy:#0c1322; --navy2:#161d30; --card:#1a2340; --line:#2b3557;
    --gold:#ffbf8f; --gold-deep:#e0a878; --cream:#eef0f5; --muted:#94a0bb;
    --ok:#7fd1a6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:linear-gradient(178deg,#0c1322 0%,#161d30 60%,#131a2c 100%);
    color:var(--cream); -webkit-font-smoothing:antialiased;
    min-height:100vh; padding:22px 16px 60px;
  }
  .wrap{max-width:620px;margin:0 auto}
  .eyebrow{
    font-size:12px;letter-spacing:.32em;color:var(--gold-deep);
    text-transform:uppercase;font-weight:600;text-align:center;margin-bottom:8px;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;font-weight:600;
    font-size:34px;line-height:1.05;text-align:center;color:var(--cream);
    letter-spacing:.01em;text-wrap:balance;
  }
  .date{text-align:center;color:var(--muted);font-size:14px;margin-top:10px}
  .howto{
    text-align:center;color:var(--muted);font-size:13.5px;line-height:1.5;
    margin:14px auto 26px;max-width:440px;
  }
  .howto b{color:var(--cream);font-weight:600}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:20px 18px;margin-bottom:20px;
  }
  .card.bts{border-color:var(--gold-deep)}
  .rhead{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .rnum{
    font-family:Georgia,serif;font-size:26px;color:var(--gold);
    line-height:1;font-variant-numeric:tabular-nums;
  }
  .rtitle{font-family:Georgia,serif;font-size:21px;color:var(--cream);line-height:1.15}
  .chip{
    display:inline-block;margin:8px 0 16px;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--gold-deep);border:1px solid var(--line);
    border-radius:100px;padding:4px 11px;font-weight:600;
  }
  .lbl{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin:2px 0 8px;
  }
  .text{
    background:#111834;border:1px solid var(--line);border-radius:12px;
    padding:14px 15px;font-size:16px;line-height:1.62;color:#e7ebf6;
    white-space:pre-line;
  }
  .text.cap{color:#d2d9ec;font-size:15px}
  .btn{
    -webkit-appearance:none;appearance:none;border:none;cursor:pointer;
    width:100%;min-height:54px;border-radius:13px;margin:11px 0 4px;
    font-size:16px;font-weight:700;letter-spacing:.01em;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:transform .08s ease,background .2s ease,color .2s ease;
  }
  .btn:active{transform:scale(.985)}
  .btn.primary{background:var(--gold);color:#241608}
  .btn.ghost{background:transparent;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .btn.copied{background:var(--ok)!important;color:#0b2417!important;border-color:var(--ok)!important}
  .btn:focus-visible{outline:3px solid #6f8fe0;outline-offset:2px}
  .divider{height:1px;background:var(--line);border:none;margin:16px 0}
  img.cardcover{
    width:100%;max-width:250px;height:auto;display:block;margin:8px auto 0;
    border-radius:12px;border:1px solid var(--line);background:var(--navy);
  }
  .btn.save{background:#20304f;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .foot{text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;margin-top:30px}
  .foot b{color:var(--gold-deep)}
  @media (prefers-reduced-motion:reduce){.btn{transition:none}}
</style>

<div class="wrap">
  <div class="eyebrow">Mark Andrew Photography</div>
  <h1>Daily Reel Scripts</h1>
  <div class="date" id="date"></div>
  <p class="howto">Tap <b>Copy Script</b> → paste into your teleprompter. Tap <b>Copy Caption</b> → paste into Instagram. No selecting, no fighting your phone.</p>
  <div id="cards"></div>
  <p class="foot">Refreshes every morning at <b>5:30</b>. Add this page to your home screen so it opens like an app.<br>— Pickles</p>
</div>

<script>
const DATE = "Wednesday, July 8, 2026 — film any 2";
// Each DATA item may carry an optional `cover:"data:image/png;base64,..."` that the routine fills daily;
// it renders as a tap-to-save image directly under that reel's caption.
const DATA = [
  {
    n:"1", title:"The Reveal Rule",
    cover:"covers/face-1.jpg", format:"Studio Rule · Ep. 5",
    script:`Your husband doesn't get to see a single photo before you do. That's studio rule number five.
Not at the reveal. Not over your shoulder. Not a sneak peek texted from the parking lot.
And here's why it has nothing to do with him. When a woman thinks her partner is watching, she performs. She picks the "safe" images and second-guesses the ones that actually made her feel powerful — because she's editing for someone else's eyes before she's even seen herself.
So we take him out of the equation. You see all 130 first. You decide what he sees, what your best friend sees, what the world sees — or what nobody sees.
Most women choose more than they expect to. But that's the point: it was their call, made after they met the woman in the photos.
He'll be blown away whenever you're ready. The order is the whole thing. You first. Always you first.`,
    caption:`Studio rule number five: your husband doesn't see a single image before you do. Not because he isn't welcome — because you can't choose freely when you think someone's watching. You see all 130 first. You decide the rest. The form's in my bio.

#southbendphotographer #boudoirphotography #michiana #womenover40 #selfconfidence`
  },
  {
    n:"2", title:"4,000 Photos",
    cover:"covers/face-2.jpg", format:"The Waiting List",
    script:`You've taken four thousand photos this year. You're in six of them.
I did the math with a client last week. Four thousand shots on her phone — birthdays, soccer games, the dog, the sunset she pulled over for. She was in six. And in five of those, she was holding someone else.
This is how a woman disappears from her own family's story. Not all at once. One "delete that, I look terrible" at a time.
Someday your kids are going to go looking for you. In the albums. In the frames on the wall. And they won't want the version of you that lost fifteen pounds first. They'll want you. The one who was actually there.
Be findable. That's the whole reason I do this.
You don't have to feel ready. You just have to decide you're allowed to be in the picture.`,
    caption:`Four thousand photos on your phone this year. You're in six of them — holding someone else in five. This is how a woman quietly vanishes from her own family's story. Someday your kids will go looking for you. Be findable. The form's in my bio.

#southbendphotographer #michiana #womenover40 #confidence #selfconfidence`
  },
  {
    n:"3", title:"'Photogenic' Isn't Real",
    cover:"covers/face-3.jpg", format:"Unpopular Opinion",
    script:`Unpopular opinion: being photogenic isn't real. I've disproven it 850 times.
"I'm just not photogenic" is the most common thing women say before a shoot. It's never true. What's actually happening is nobody ever built a photo for you.
Photogenic isn't a gift some women are born with. It's three things you can't see: light placed for your specific face, an angle chosen on purpose, and a photographer telling you exactly what to do with your chin, your hands, your weight.
The woman who "photographs badly" at a barbecue under overhead sun is the same woman who gasps at herself on my screen three hours later. Nothing about her changed. The light did. The direction did.
So no — you're not un-photogenic. You've just never been photographed by someone whose entire job is making sure you are.
Come find out what you actually look like.`,
    caption:`"I'm just not photogenic" is the most common thing I hear — and it's never true. Photogenic isn't a gift. It's light built for your face, an angle chosen on purpose, and someone directing every move. Nobody ever built a photo for you. Let me. The form's in my bio.

#southbendphotographer #boudoirphotography #michiana #womenover40 #photoshoot`
  },
  {
    n:"4", title:"It Starts With Sorry",
    cover:"covers/face-4.jpg", format:"Overheard in the Studio",
    script:`The most common sentence in my studio isn't about posing. It's an apology.
"Sorry, I know this arm looks huge." "Sorry, ignore my stomach." "Sorry, I haven't done this in years." Within the first ten minutes, almost every woman apologizes for her own body to a man holding a camera.
And I get it. You've spent decades being told which parts to hide. That doesn't switch off because you booked a session.
So I don't argue with it. I just start showing her the back of the camera. The first real image — the one where she forgot to suck in — usually ends the apologizing for good. It's hard to say sorry for a body while you're staring at proof it's beautiful.
By outfit three, the sorrys are gone. By the reveal, she's the one telling me which ones are her favorites.
The apology was never about her body. It was about never having seen it done right.`,
    caption:`The most common sentence in my studio isn't about posing — it's "sorry." Sorry for her arm, her stomach, the years since she felt seen. By outfit three, the apologizing stops. It was never about her body. It was about never seeing it done right. The form's in my bio.

#southbendphotographer #michiana #womenover40 #bodyconfidence #selflove`
  },
  {
    n:"★", title:"The One Thing to Bring", format:"BTS Overlay · text over you working", bts:true,
    cover:"covers/reel-5.jpg",
    screenTrial:`There's one thing every woman should bring to her photoshoot that has nothing to do with an outfit. Almost nobody thinks of it — I put it in the caption.`,
    screenGrid:`After 850 shoots, the women who love their photos most all did one small thing before they walked in. It's not what you'd guess. The whole thing's in the description.`,
    caption:`The one thing? A song that makes you feel unstoppable. Text it to me before your session and it's playing the second you walk in. The women who love their photos most don't show up hoping to feel confident — they bring it with them. I handle the other 47 things. The form's in my bio.

#southbendphotographer #michiana #womenover40 #photoshoot #confidence`
  }
];

function copy(text, btn, label){
  const done = () => {
    btn.classList.add("copied");
    const prev = btn.dataset.label;
    btn.textContent = "Copied ✓";
    setTimeout(()=>{ btn.classList.remove("copied"); btn.textContent = prev; }, 1400);
  };
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>fallback(text,done));
  } else { fallback(text,done); }
}
function fallback(text, done){
  const ta=document.createElement("textarea");
  ta.value=text; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{document.execCommand("copy");}catch(e){}
  document.body.removeChild(ta); done();
}
// Build a File synchronously from a data URI (no await — keeps iOS "user gesture" alive for share)
function b64ToFile(dataUri, filename){
  const c=dataUri.indexOf(","), meta=dataUri.slice(0,c), b64=dataUri.slice(c+1);
  const mime=(meta.match(/data:(.*?);/)||[,"image/jpeg"])[1];
  const bin=atob(b64), arr=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return new File([arr], filename, {type:mime});
}
function saveImg(dataUri, name){
  const slug=(name||"reel").replace(/[^a-z0-9]+/gi,"-").toLowerCase();
  let file=null;
  try{ file=b64ToFile(dataUri, slug+"-cover.jpg"); }catch(e){}
  // Primary: iOS share sheet → "Save Image" to Photos. Called synchronously in the tap.
  if(file && navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file]}).catch(err=>{ if(!err||err.name!=="AbortError") openFull(dataUri); });
    return;
  }
  openFull(dataUri);
}
// Fallback: blow the image up full-screen so a long-press gives Save to Photos
function openFull(dataUri){
  const ov=document.createElement("div");
  ov.style.cssText="position:fixed;inset:0;z-index:99;background:#0c1322;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px;gap:12px";
  const tip=document.createElement("div");
  tip.style.cssText="color:#eef0f5;font-size:15px;text-align:center;line-height:1.4";
  tip.innerHTML="Press &amp; hold the image → <b>Save to Photos</b>.<br>Tap the dark area to close.";
  const img=document.createElement("img"); img.src=dataUri;
  img.style.cssText="max-width:100%;max-height:80vh;border-radius:10px";
  ov.appendChild(tip); ov.appendChild(img);
  ov.addEventListener("click",e=>{ if(e.target===ov) document.body.removeChild(ov); });
  document.body.appendChild(ov);
}

document.getElementById("date").textContent = DATE;

const host = document.getElementById("cards");
DATA.forEach(d=>{
  const card=document.createElement("div");
  card.className="card"+(d.bts?" bts":"");
  card.innerHTML = `<div class="rhead"><span class="rnum">${d.n}</span><span class="rtitle">${d.title}</span></div><span class="chip">${d.format}</span>`;
  // BTS reels carry TWO on-screen texts (Trial + Grid); everything else is script + caption
  let blocks;
  if(d.bts && d.screenTrial && d.screenGrid){
    blocks=[
      {lbl:"On-screen text — TRIAL reel", txt:d.screenTrial, btn:"Copy Trial Text"},
      {lbl:"On-screen text — GRID post", txt:d.screenGrid, btn:"Copy Grid Text"},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  } else {
    blocks=[
      {lbl:(d.bts?"On-screen text":"Script"), txt:d.script, btn:(d.bts?"Copy On-Screen Text":"Copy Script")},
      {lbl:"Caption", txt:d.caption, btn:"Copy Caption", cap:true}
    ];
  }
  blocks.forEach((b,i)=>{
    if(i>0){ const hr=document.createElement("hr"); hr.className="divider"; card.appendChild(hr); }
    const lbl=document.createElement("div"); lbl.className="lbl"; lbl.textContent=b.lbl; card.appendChild(lbl);
    const txt=document.createElement("div"); txt.className="text"+(b.cap?" cap":""); txt.textContent=b.txt; card.appendChild(txt);
    const btn=document.createElement("button"); btn.className="btn "+(b.cap?"ghost":"primary");
    btn.dataset.label=b.btn; btn.textContent=b.btn;
    btn.addEventListener("click", ()=>copy(b.txt, btn));
    card.appendChild(btn);
  });
  if(d.cover){
    const cl=document.createElement("div"); cl.className="lbl"; cl.style.marginTop="16px";
    cl.innerHTML="Cover — press &amp; hold → Save to Photos"; card.appendChild(cl);
    const img=document.createElement("img"); img.className="cardcover"; img.src=d.cover; img.alt=d.title+" cover";
    card.appendChild(img);
  }
  host.appendChild(card);
});
</script>
