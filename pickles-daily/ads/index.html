<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Ad Scripts — Pickles</title>
<style>
  :root{
    --navy:#0c1322; --navy2:#161d30; --card:#1a2340; --line:#2b3557;
    --gold:#ffbf8f; --gold-deep:#e0a878; --cream:#eef0f5; --muted:#94a0bb;
    --ok:#7fd1a6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
    background:linear-gradient(178deg,#0c1322 0%,#161d30 60%,#131a2c 100%);
    color:var(--cream); -webkit-font-smoothing:antialiased;
    min-height:100vh; padding:22px 16px 60px;
  }
  .wrap{max-width:620px;margin:0 auto}
  .eyebrow{
    font-size:12px;letter-spacing:.32em;color:var(--gold-deep);
    text-transform:uppercase;font-weight:600;text-align:center;margin-bottom:8px;
  }
  h1{
    font-family:Georgia,"Times New Roman",serif;font-weight:600;
    font-size:34px;line-height:1.05;text-align:center;color:var(--cream);
    letter-spacing:.01em;text-wrap:balance;
  }
  .date{text-align:center;color:var(--muted);font-size:14px;margin-top:10px}
  .howto{
    text-align:center;color:var(--muted);font-size:13.5px;line-height:1.5;
    margin:14px auto 26px;max-width:440px;
  }
  .howto b{color:var(--cream);font-weight:600}
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    padding:20px 18px;margin-bottom:20px;
  }
  .card.bts{border-color:var(--gold-deep)}
  .rhead{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
  .rnum{
    font-family:Georgia,serif;font-size:26px;color:var(--gold);
    line-height:1;font-variant-numeric:tabular-nums;
  }
  .rtitle{font-family:Georgia,serif;font-size:21px;color:var(--cream);line-height:1.15}
  .chip{
    display:inline-block;margin:8px 0 16px;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;color:var(--gold-deep);border:1px solid var(--line);
    border-radius:100px;padding:4px 11px;font-weight:600;
  }
  .lbl{
    font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);
    font-weight:700;margin:2px 0 8px;
  }
  .text{
    background:#111834;border:1px solid var(--line);border-radius:12px;
    padding:14px 15px;font-size:16px;line-height:1.62;color:#e7ebf6;
    white-space:pre-line;
  }
  .text.cap{color:#d2d9ec;font-size:15px}
  .btn{
    -webkit-appearance:none;appearance:none;border:none;cursor:pointer;
    width:100%;min-height:54px;border-radius:13px;margin:11px 0 4px;
    font-size:16px;font-weight:700;letter-spacing:.01em;
    display:flex;align-items:center;justify-content:center;gap:9px;
    transition:transform .08s ease,background .2s ease,color .2s ease;
  }
  .btn:active{transform:scale(.985)}
  .btn.primary{background:var(--gold);color:#241608}
  .btn.ghost{background:transparent;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .btn.copied{background:var(--ok)!important;color:#0b2417!important;border-color:var(--ok)!important}
  .btn:focus-visible{outline:3px solid #6f8fe0;outline-offset:2px}
  .divider{height:1px;background:var(--line);border:none;margin:16px 0}
  img.cardcover{
    width:100%;max-width:250px;height:auto;display:block;margin:8px auto 0;
    border-radius:12px;border:1px solid var(--line);background:var(--navy);
  }
  .btn.save{background:#20304f;color:var(--gold);border:1.5px solid var(--gold-deep)}
  .foot{text-align:center;color:var(--muted);font-size:12.5px;line-height:1.6;margin-top:30px}
  .foot b{color:var(--gold-deep)}
  @media (prefers-reduced-motion:reduce){.btn{transition:none}}
</style>
<div class="wrap">
  <div class="eyebrow">Mark Andrew Photography</div>
  <h1>Facebook Ad Scripts</h1>
  <div class="date">50% Off Campaign · 3 reels × 5 hooks · July 2026</div>
  <p class="howto">Pick <b>one hook</b> per reel (tap it to copy), then <b>Copy Script</b> for the rest. Film all three — Meta picks the winner.</p>
  <div id="cards"></div>
  <p class="foot">Permanent page — tomorrow's 5:30 refresh won't touch it.<br>— Pickles</p>
</div>

<script>
function copy(text, btn){
  navigator.clipboard.writeText(text).then(()=>{ if(btn&&btn.classList){btn.classList.add("copied");btn.textContent="Copied ✓";setTimeout(()=>{btn.classList.remove("copied");btn.textContent=btn.dataset.label;},1400);} })
  .catch(()=>{ const ta=document.createElement("textarea");ta.value=text;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta); if(btn&&btn.classList){btn.classList.add("copied");btn.textContent="Copied ✓";setTimeout(()=>{btn.classList.remove("copied");btn.textContent=btn.dataset.label;},1400);} });
}
</script>

<script>
const AD_DATA = [{"n": "A", "title": "The Camera Roll", "angle": "Interactive do-this-now", "hooks": ["Open your camera roll right now and count how many photos have YOU in them. Not your kids. Not your dog. You.", "Try this: scroll back one year in your phone and find five pictures of yourself. I'll wait.", "Your phone has four thousand photos on it. Count how many show your whole face.", "Do me a favor. Open your photos app and search your own name. That empty feeling? Keep watching.", "Pull up the last family picture you took. Now find yourself in it. Look harder."], "script": "It's a small number, isn't it.\nThousands of pictures on that phone, and the woman who took all of them is missing from almost every single one.\nHere's the part nobody tells you. You're not camera shy. You've been running the same three moves for years — kid in front, arm across, step behind your husband. The human shield. You do it without thinking now.\nSo here's what me and my team do about it.\nOne day. Hair and makeup with a mimosa in your hand. Then I pose you head to toe in every single shot — hands, chin, breath. You never have to know what to do, because knowing what to do is my job.\nAnd the same afternoon — not next month, that day — you sit in front of a 65-inch screen and watch 130 finished images of a woman who isn't hiding behind anybody.\nThe goal was never sexy pictures. It was proof. Proof you were here. Proof you looked like THAT. Proof your kids can hold in their hands when you're eighty.\nFill out the form below and you'll get 50% off your shoot."}, {"n": "B", "title": "Grandma's Photo", "angle": "Abstract-visual", "hooks": ["There's one photo of my grandmother that stops every single person who walks into our house.", "Put your grandma's old photo on the kitchen table and watch what it does to grown adults.", "The most valuable thing in your mom's house is in the bottom of a drawer. And it's not jewelry.", "In thirty years, somebody is going to tear your house apart looking for one thing. It isn't money.", "A picture of a twenty-something woman from 1962 made my dinner guests go completely silent."], "script": "She's in her twenties. Dressed up. Looking straight into the camera like she owns the place.\nNobody alive remembers her like that. Everybody stops anyway.\nHere's why that matters to you. In thirty years, somebody is going to look for that photo of YOU. And right now, it doesn't exist.\nYou weren't lazy. You were sold a lie — that photos of yourself are vanity. So you spent fifteen years behind the camera and called it humility.\nHere's what me and my team do about it.\nOne day. Hair and makeup. I pose you head to toe — hands, chin, breath — you never guess what to do. And the same afternoon, you watch 130 finished images of yourself on a 65-inch screen.\nSome women cry. Most say the same four words: \"I had no idea.\"\nThis was never about lingerie. It's about the photo that stops the room in thirty years. Yours.\nFill out the form below — 50% off your shoot when you do."}, {"n": "C", "title": "The Fifteen Pounds", "angle": "Misattribution flip", "hooks": ["It's not the fifteen pounds. It's not your age. It's not \"when things calm down.\"", "The fifteen pounds isn't the reason. It's the excuse that feels the most responsible.", "You don't have a body problem. You have a waiting problem. There's a huge difference.", "\"I'll book it when I lose the weight.\" You said that two years ago. The weight isn't the thing in the way.", "Stop trying to shrink before the camera finds you. That's backwards, and here's why."], "script": "How many years have you been fifteen pounds away now? Five? Ten?\nHere's the part nobody tells you. I've photographed over 850 women, from 21 into their 70s. Almost none of them lost the weight first. Zero of them wished they'd waited longer.\nBecause the weight was never the thing in the way. The waiting was.\nThere's no body type for a boudoir shoot. There's light, and angles, and posing — and those are my job, not yours. Hands. Chin. Breath. I direct every single one.\nHair and makeup in the morning. Shooting by ten. And the same afternoon, you're watching 130 finished images of yourself on a 65-inch screen — the version of you the mirror has been lying to you about for years.\nNot fifteen pounds from now. Now.\nThe goal was never a smaller body in the pictures. It was proof the woman in them existed — while she was busy taking care of everyone else.\nFill out the form below for more information — and 50% off your shoot."}];
(function(){
  const host = document.getElementById("cards");
  const hd = document.createElement("div");
  hd.style.cssText = "margin:34px 0 18px;text-align:center;";
  hd.innerHTML = '<div class="eyebrow" style="margin-bottom:6px">Facebook Ad Scripts</div>'
    + '<div style="font-family:Georgia,serif;font-size:24px;color:var(--cream)">50% Off Campaign — 3 Reels</div>'
    + '<div style="color:var(--muted);font-size:13px;margin-top:6px">Pick ONE hook per reel, then read the script. These stay put at <b style="color:var(--gold-deep)">/pickles-daily/ads/</b> always.</div>';
  host.appendChild(hd);
  AD_DATA.forEach(d=>{
    const card=document.createElement("div");
    card.className="card";
    card.style.borderColor="#5a6c9e";
    card.innerHTML = `<div class="rhead"><span class="rnum">${d.n}</span><span class="rtitle">${d.title}</span></div><span class="chip">AD &middot; ${d.angle}</span>`;
    const hl=document.createElement("div"); hl.className="lbl"; hl.textContent="Hooks — pick one (tap to copy)"; card.appendChild(hl);
    d.hooks.forEach((h,idx)=>{
      const row=document.createElement("div"); row.className="text"; row.style.cssText="margin-bottom:7px;cursor:pointer;font-size:15px;";
      row.textContent = (idx+1)+". "+h;
      row.addEventListener("click",()=>{ copy(h,{classList:{add(){},remove(){}},dataset:{}}); row.style.borderColor="var(--ok)"; row.style.color="#bfeeD5".toLowerCase(); setTimeout(()=>{row.style.borderColor="";row.style.color="";},1200); });
      card.appendChild(row);
    });
    const hr=document.createElement("hr"); hr.className="divider"; card.appendChild(hr);
    const sl=document.createElement("div"); sl.className="lbl"; sl.textContent="Script (everything after the hook)"; card.appendChild(sl);
    const txt=document.createElement("div"); txt.className="text"; txt.textContent=d.script; card.appendChild(txt);
    const btn=document.createElement("button"); btn.className="btn primary"; btn.dataset.label="Copy Script"; btn.textContent="Copy Script";
    btn.addEventListener("click",()=>copy(d.script,btn)); card.appendChild(btn);
    host.appendChild(card);
  });
})();
</script>
